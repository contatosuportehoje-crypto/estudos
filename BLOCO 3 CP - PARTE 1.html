async function storageSet(key, value){
  try{
    if (window.storage && typeof window.storage.set === 'function'){
      await window.storage.set(key, JSON.stringify(value), false);
      return;
    }
  }catch(e){ console.error('storage.set failed, falling back to localStorage', e); }
  try{ localStorage.setItem('pq_'+key, JSON.stringify(value)); }catch(e){ console.error(e); }
}
async function storageGet(key){
  try{
    if (window.storage && typeof window.storage.get === 'function'){
      const r = await window.storage.get(key, false);
      return r ? JSON.parse(r.value) : null;
    }
  }catch(e){ /* key not found or storage unavailable */ }
  try{
    const v = localStorage.getItem('pq_'+key);
    return v ? JSON.parse(v) : null;
  }catch(e){ return null; }
}

/* ============ STATE ============ */
let STATE = {
  progress: {},      // { [questionId]: {chosen:'V'|'F', correct:bool, guess:'sabia'|'chute'|null} }
  screen: 'home',     // home | quiz | review
  filter: 'ALL',
  order: [],          // array of question ids in current filtered session
  index: 0,
  currentChoice: null, // selection before confirm
  confirmed: false
};

function filteredQuestions(filter){
  if (filter === 'ALL') return QUESTIONS;
  return QUESTIONS.filter(q => q.blk === filter);
}

function computeStats(filter){
  const qs = filteredQuestions(filter);
  let answered=0, correct=0;
  qs.forEach(q=>{
    const p = STATE.progress[q.id];
    if (p){ answered++; if (p.correct) correct++; }
  });
  return { total: qs.length, answered, correct, pct: answered ? Math.round(correct/answered*100) : 0 };
}

function globalStats(){ return computeStats('ALL'); }

/* ============ PERSIST / LOAD ============ */
async function saveState(){
  await storageSet('progress', {
    progress: STATE.progress,
    filter: STATE.filter,
    screen: STATE.screen === 'quiz' ? 'quiz' : 'home',
    order: STATE.order,
    index: STATE.index
  });
}
async function loadState(){
  const s = await storageGet('progress');
  if (s){
    STATE.progress = s.progress || {};
    STATE.filter = s.filter || 'ALL';
    STATE.order = s.order || [];
    STATE.index = s.index || 0;
    if (s.screen === 'quiz' && STATE.order.length){
      STATE.screen = 'quiz';
    }
  }
}

/* ============ TOAST ============ */
let toastTimer=null;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 1800);
}

/* ============ NAVIGATION HELPERS ============ */
function startQuiz(filter){
  STATE.filter = filter;
  STATE.order = filteredQuestions(filter).map(q=>q.id);
  STATE.index = 0;
  STATE.screen = 'quiz';
  resetSelection();
  saveState();
  render();
}
function resetSelection(){
  const q = currentQuestion();
  const existing = q ? STATE.progress[q.id] : null;
  STATE.currentChoice = existing ? existing.chosen : null;
  STATE.confirmed = !!existing;
}
function currentQuestion(){
  const id = STATE.order[STATE.index];
  return QUESTIONS.find(q=>q.id===id);
}
function goHome(){
  STATE.screen='home';
  saveState();
  render();
}
function goPrev(){
  if (STATE.index>0){ STATE.index--; resetSelection(); saveState(); render(); }
}
function goNext(){
  if (STATE.index < STATE.order.length-1){ STATE.index++; resetSelection(); saveState(); render(); }
}
function selectChoice(v){
  if (STATE.confirmed) return;
  STATE.currentChoice = v;
  render();
}
function confirmAnswer(){
  const q = currentQuestion();
  if (!q || !STATE.currentChoice) return;
  const correct = (STATE.currentChoice === 'V') === (q.a === true);
  STATE.progress[q.id] = { chosen: STATE.currentChoice, correct, guess: null };
  STATE.confirmed = true;
  saveState();
  render();
}
function markGuess(kind){
  const q = currentQuestion();
  if (!q) return;
  const p = STATE.progress[q.id];
  if (!p || !p.correct) return;
  p.guess = kind;
  saveState();
  render();
}
function resetAll(){
  if (!confirm('Isso vai apagar todo o seu progresso salvo. Confirma?')) return;
  STATE.progress = {};
  STATE.screen='home';
  STATE.order=[];
  STATE.index=0;
  saveState();
  render();
  showToast('Progresso reiniciado.');
}

/* ============ DOWNLOAD STANDALONE HTML ============ */
function downloadHtml(){
  const html = '<!DOCTYPE html>\\n' + document.documentElement.outerHTML;
  const blob = new Blob([html], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'quiz-direito-penal.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Arquivo baixado! Abra-o direto no navegador — o progresso salva localmente nesse arquivo.');
}

/* ============ RENDER: HOME ============ */
function renderHome(){
  const gs = globalStats();
  let html = `
    <div class="card">
      <h1 class="title">Escolha um tema para praticar</h1>
      <p class="sub">251 questões Verdadeiro/Falso, extraídas 100% do seu material. Progresso salvo automaticamente.</p>
      <div class="toolbar">
        <button class="tool-btn" onclick="goReview()">📋 Ver revisão (erros e chutes)</button>
        <button class="tool-btn" onclick="downloadHtml()">⬇️ Baixar HTML</button>
        <button class="tool-btn" onclick="resetAll()">♻️ Reiniciar progresso</button>
      </div>
      <div class="blocklist">
        <button class="block-btn all" onclick="startQuiz('ALL')">
          <span class="bnum">★</span>
          <span class="bname">Todos os temas (${QUESTIONS.length} questões)</span>
          <span class="bmeta">${gs.answered}/${gs.total} · ${gs.pct}%</span>
        </button>
  `;
  BLOCKS.forEach(b=>{
    const s = computeStats(b.id);
    const pct = s.total ? Math.round(s.answered/s.total*100) : 0;
    html += `
        <button class="block-btn" onclick="startQuiz('${b.id}')">
          <span class="bnum">${b.id.replace('B','')}</span>
          <span class="bname">${b.name}
            <div class="progress-mini"><div style="width:${pct}%"></div></div>
          </span>
          <span class="bmeta">${s.answered}/${s.total}${s.answered? ' · '+s.pct+'%':''}</span>
        </button>
    `;
  });
  html += `</div></div>
    <footer class="foot">Quiz gerado a partir do seu material de estudo — Direito Penal.<br>Toque em um tema para começar ou continuar de onde parou.</footer>
  `;
  document.getElementById('app').innerHTML = html;
}

/* ============ RENDER: QUIZ ============ */
function renderQuiz(){
  const q = currentQuestion();
  if (!q){ goHome(); return; }
  const blockName = BLOCKS.find(b=>b.id===q.blk).name;
  const total = STATE.order.length;
  const s = computeStats(STATE.filter);
  const existing = STATE.progress[q.id];
  const confirmed = !!existing;
  const choice = STATE.currentChoice;

  let choicesHtml = `
    <div class="choices">
      <button class="choice-btn V ${choice==='V'?'selected V':''} ${confirmed && q.a===true ? 'correct-reveal':''} ${confirmed && choice==='V' && q.a!==true ? 'wrong-reveal':''}"
        ${confirmed?'disabled':''} onclick="selectChoice('V')">VERDADEIRO</button>
      <button class="choice-btn F ${choice==='F'?'selected F':''} ${confirmed && q.a===false ? 'correct-reveal':''} ${confirmed && choice==='F' && q.a!==false ? 'wrong-reveal':''}"
        ${confirmed?'disabled':''} onclick="selectChoice('F')">FALSO</button>
    </div>
  `;

  let actionHtml = '';
  if (!confirmed){
    actionHtml = `<button class="confirm-btn" ${!choice?'disabled':''} onclick="confirmAnswer()">Confirmar resposta</button>`;
  } else {
    const isCorrect = existing.correct;
    actionHtml = `
      <div class="result-box ${isCorrect?'ok':'bad'}">
        <div class="verdict">${isCorrect? '✅ Você acertou!' : '❌ Você errou.'}</div>
        <div class="justif"><b>Gabarito: a afirmação é ${q.a? 'VERDADEIRA':'FALSA'}.</b><br>${q.j}</div>
      </div>
    `;
    if (isCorrect){
      actionHtml += `
        <div class="guess-row">
          <button class="guess-btn ${existing.guess==='sabia'?'chosen':''}" onclick="markGuess('sabia')">🧠 Eu sabia</button>
          <button class="guess-btn ${existing.guess==='chute'?'chosen':''}" onclick="markGuess('chute')">🎲 Acertei no chute</button>
        </div>
      `;
    }
  }

  const html = `
    <div class="card">
      <div class="quiz-header">
        <button class="back" onclick="goHome()">← Temas</button>
        <span class="counter">${STATE.index+1} / ${total}</span>
      </div>
      <div class="stat-bar">
        <span>Respondidas: <b>${s.answered}/${s.total}</b></span>
        <span>Acertos: <b>${s.correct}</b></span>
        <span>Aproveitamento: <b>${s.pct}%</b></span>
      </div>
      <span class="qtag">${blockName}</span>
      <div class="qtext">${q.q}</div>
      ${choicesHtml}
      ${actionHtml}
      <div class="nav-row">
        <button class="nav-btn" onclick="goPrev()" ${STATE.index===0?'disabled':''}>← Anterior</button>
        <button class="nav-btn primary" onclick="goNext()" ${STATE.index===total-1?'disabled':''}>Próxima →</button>
      </div>
    </div>
  `;
  document.getElementById('app').innerHTML = html;
}

/* ============ RENDER: REVIEW ============ */
function goReview(){ STATE.screen='review'; render(); }
function renderReview(){
  const wrong = [];
  const guessed = [];
  QUESTIONS.forEach(q=>{
    const p = STATE.progress[q.id];
    if (!p) return;
    if (!p.correct) wrong.push(q);
    else if (p.guess === 'chute') guessed.push(q);
  });

  function item(q, tag){
    return `
      <div class="review-item">
        <span class="rtag ${tag==='erro'?'err':'chute'}">${tag==='erro'?'Errei':'Chute'}</span>
        <span style="font-size:11px;color:var(--muted)">${BLOCKS.find(b=>b.id===q.blk).name}</span>
        <div class="rq">${q.q}</div>
        <div class="rj"><b>Gabarito: ${q.a?'Verdadeiro':'Falso'}.</b> ${q.j}</div>
      </div>
    `;
  }

  let html = `
    <div class="card">
      <div class="quiz-header">
        <button class="back" onclick="goHome()">← Temas</button>
      </div>
      <h1 class="title">Revisão</h1>
      <p class="sub">Questões que você errou e questões que acertou no chute — ótimas candidatas pra revisar antes da prova.</p>
    </div>
  `;

  html += `<div class="card"><h2 style="font-family:var(--serif);font-size:16px;margin:0 0 10px;color:var(--wine-dark);">❌ Erros (${wrong.length})</h2>`;
  html += wrong.length ? wrong.map(q=>item(q,'erro')).join('') : `<div class="empty">Nenhum erro registrado ainda.</div>`;
  html += `</div>`;

  html += `<div class="card"><h2 style="font-family:var(--serif);font-size:16px;margin:0 0 10px;color:var(--brass-dark);">🎲 Acertos no chute (${guessed.length})</h2>`;
  html += guessed.length ? guessed.map(q=>item(q,'chute')).join('') : `<div class="empty">Nenhum acerto no chute marcado ainda.</div>`;
  html += `</div>`;

  document.getElementById('app').innerHTML = html;
}

/* ============ MAIN RENDER ============ */
function render(){
  if (STATE.screen === 'quiz') renderQuiz();
  else if (STATE.screen === 'review') renderReview();
  else renderHome();
}

/* ============ INIT ============ */
(async function init(){
  await loadState();
  render();
})();
</script>
</body>
</html>
