o praticado contra menor de dezoito anos de idade qualifica o crime.", "assertion": null, "correct": false, "justification": "35 - O delito de sequestro e cárcere privado, inserido entre os crimes contra a pessoa, constitui infração penal de ação múltipla, e a circunstância de ter sido praticado contra menor de dezoito anos de idade qualifica o crime.\nA solução da questão exige o conhecimento acerca do sequestro e cárcere privado, mais precisamente sobre a sua classificação. Importante analisar o que é infração penal de ação múltipla, que pode ser entendido como aquele crime que possui várias modalidades de conduta, vários verbos, qualquer delas caracterizando um crime só. Como exemplo: o crime de induzimento, instigação ou auxílio a suicídio ou a automutilação, qualquer das condutas caracterizará o crime (Induzir ou instigar alguém a suicidar-se ou a praticar automutilação ou prestar-lhe auxílio material para que o faça).\nO crime de sequestro e cárcere privado não é de ação múltipla, sua conduta é privar alguém de sua liberdade, mediante sequestro ou cárcere privado. É ele considerado um crime de livre execução, pois pode ser praticado o sequestro de diferentes maneiras.\nJá quanto à circunstância de ter sido praticado contra menor de dezoito anos de idade, de fato torna-se o crime qualificado (art. 148, §1º, IV do CP).\nGABARITO DA PROFESSORA: ERRADO.", "annulled": false, "remark": null}, {"id": "Q36-A", "qn": 36, "tema": "Crimes contra a honra", "type": "mc", "letter": "A", "stem": "Cabelo de Anjo, no intuito de prejudicar seu desafeto, o delegado de polícia civil da cidade, cuja atuação na repressão à criminalidade é amplamente reconhecida, especialmente nos casos de corrupção, apresenta representação por via postal ao Ministério Público, imputando à referida autoridade policial a prática de vários ilícitos penais, dentre eles o de corrupção passiva, sabendo que tais fatos não ocorreram. No intervalo entre a remessa da correspondência e o recebimento pelo representante do Ministério Público, o delegado toma conhecimento e consegue interceptar a missiva, desmascarando a trama com a prova de sua inocência. Nesse caso, Cabelo de Anjo responderá por", "assertion": "denunciação caluniosa na forma consumada", "correct": false, "justification": "O gabarito oficial desta questão é a alternativa C. 36 – (ERREI – MARQUEI LETRA A. MAS, GABARITO É LETRA C) Cabelo de Anjo, no intuito de prejudicar seu desafeto, o delegado de polícia civil da cidade, cuja atuação na repressão à criminalidade é amplamente reconhecida, especialmente nos casos de corrupção, apresenta representação por via postal ao Ministério Público, imputando à referida autoridade policial a prática de vários ilícitos penais, dentre eles o de corrupção passiva, sabendo que tais fatos não ocorreram. No intervalo entre a remessa da correspondência e o recebimento pelo representante do Ministério Público, o delegado toma conhecimento e consegue interceptar a missiva, desmascarando a trama com a prova de sua inocência. Nesse caso, Cabelo de Anjo responderá por\nAlternativas\nA\ndenunciação caluniosa na forma consumada\nB\ncalúnia na forma tentada\nC\ndenunciação caluniosa na forma tentada\nD\ncalúnia na forma consumada\nGAB. LETRA C\nSimples assim, a Denunciação Caluniosa apenas se consuma com a EFETIVA INSTAURAÇÃO da investigação policial, do processo judicial, da investigação administrativa, do inquérito civil ou da ação de improbidade administrativa.\nNo caso em tela, por não ter tido de fato a instauração e por ser um crime plurissubsistente, onde é possível o fracionamento do iter criminis, a conduta do agente ficou apenas na forma tentada.", "annulled": false, "remark": "ERREI – MARQUEI LETRA A. MAS, GABARITO É LETRA C"}, {"id": "Q36-B", "qn": 36, "tema": "Crimes contra a honra", "type": "mc", "letter": "B", "stem": "Cabelo de Anjo, no intuito de prejudicar seu desafeto, o delegado de polícia civil da cidade, cuja atuação na repressão à criminalidade é amplamente rec pública incondicionada)   (Incluído pela Lei nº 14.994, de 2024", "annulled": false, "remark": null}, {"id": "Q38-B", "qn": 38, "tema": "Feminicídio", "type": "mc", "letter": "B", "stem": "Considerando a Lei 14.994/2024 que alterou o regime de punição de crimes contra a mulher pelas condições do sexo feminino, marque a alternativa correta:", "assertion": "Terminado seu expediente, Jackson chegou em casa e sua mulher, Ravena, não havia preparado seu jantar tampouco lavado a louça e limpado a casa. Jackson proferiu diversos insultos contra Ravena, chamando-a de porca preguiçosa, vagabunda, mulher qualquer, que foi um erro ter casado com ela. Extremamente ofendida, Ravena vai à delegacia da região e relata a situação. Jackson poderá ser condenado por injúria aumentada a pena em 2/3 em razão do crime ser praticado em razão de condições do sexo feminino.", "correct": false, "justification": "(INCORRETA) Nos termos do art. 141 do Código Penal (CP):\nDisposições comuns\nArt. 141 - As penas cominadas neste Capítulo aumentam-se de um terço, se qualquer dos crimes é cometido: (...)\n§ 3º Se o crime é cometido contra a mulher por razões da condição do sexo feminino, nos termos do § 1º do art. 121-A deste Código, aplica-se a pena em dobro. (e não o Triplo)     (Incluído pela Lei nº 14.994, de 2024)", "annulled": false, "remark": null}, {"id": "Q38-C", "qn": 38, "tema": "Feminicídio", "type": "mc", "letter": "C", "stem": "Considerando a Lei 14.994/2024 que alterou o regime de punição de crimes contra a mulher pelas condições do sexo feminino, marque a alternativa correta:", "assertion": "Em razão de uma discussão acalorada motivada por ciúmes, pelo fato de considerar o tamanho do vestido de sua companheira Rosália curto demais, Jandson a mata por asfixia. Portanto, seguindo o curso natural da investigação bem como do processo, Jandson poderá ser condenado por feminicídio com a pena majorada de 1/6 a ½ .", "correct": false, "justification": "(INCORRETA) Nos termos do art. 121-A do CP:\nFeminicídio     (Incluído pela Lei nº 14.994, de 2024)\nArt. 121-A. Matar mulher por razões da condição do sexo feminino:      (Incluído pela Lei nº 14.994, de 2024)\nPena – reclusão, de 20 (vinte) a 40 (quarenta) anos.     (Incluído pela Lei nº 14.994, de 2024)\n§ 1º Considera-se que há razões da condição do sexo feminino quando o crime envolve:     (Incluído pela Lei nº 14.994, de 2024)\nI – violência doméstica e familiar;     (Incluído pela Lei nº 14.994, de 2024)\nII – menosprezo ou discriminação à condição de mulher.     (Incluído pela Lei nº 14.994, de 2024)\n§ 2º A pena do feminicídio é aumentada de 1/3 (um terço) até a metade (E NÃO 1/6 ATÉ A METADE) se o crime é praticado:     (Incluído pela Lei nº 14.994, de 2024)\nI – durante a gestação, nos 3 (três) meses posteriores ao parto ou se a vítima é a mãe ou a responsável por criança, adolescente ou pessoa com deficiência de qualquer idade;     (Incluído pela Lei nº 14.994, de 2024)\nII – contra pessoa menor de 14 (catorze) anos, maior de 60 (sessenta) anos, com deficiência ou portadora de doenças degenerativas que acarretem condição limitante ou de vulnerabilidade física ou mental;     (Incluído pela Lei nº 14.994, de 2024)\nIII – na presença física ou virtual de descendente ou de ascendente da vítima;     (Incluído pela Lei nº 14.994, de 2024)\nIV – em descumprimento das medidas protetivas de urgência previstas nos incisos I, II e III do caput do art. 22 da Lei nº 11.340, de 7 de agosto de 2006", "annulled": false, "remark": null}, {"id": "Q38-D", "qn": 38, "tema": "Feminicídio", "type": "mc", "letter": "D", "stem": "Considerando a Lei 14.994/2024 que alterou o regime de punição de crimes contra a mulher pelas condições do sexo feminino, marque a alternativa correta:", "assertion": "Ronevaldo, de 25 anos, descobriu que sua prima, Rosário, de 20 anos, se prostitui em um site de entretenimento adulto, ao invés de estudar e trabalhar em uma empresa renomada conforme, anteriormente, havia dito, omitindo tal fato de toda a família. Sem o intuito de lesionar, Ronevaldo foi até a casa de Rosário, lhe desferiu um tapa, que não causou lesão corporal, e puxou seu cabelo ao longo da rua onde esta reside no intuito de ensiná-la a ser “uma mulher decente”. A Polícia Militar é acionada e Ronevaldo é levado à Delegacia. Em sendo condenado, Ronevaldo poderá responder por vias de fato cuja pena poderá ser aplicada em dobro por razões da condição de sexo feminino da vítima.", "correct": false, "justification": "(INCORRETA) Vias de fato\nArt. 21. Praticar vias de fato contra alguem:\nPena – prisão simples, de quinze dias a três meses, ou multa, de cem mil réis a um conto de réis, se o fato não constitue crime.\nParágrafo único. Aumenta-se a pena de 1/3 (um terço) até a metade se a vítima é maior de 60 (sessenta) anos.  (Incluído pela Lei nº 10.741, de 2003)\n§ 1º Aumenta-se a pena de 1/3 (um terço) até a metade se a vítima é maior de 60 (sessenta) anos.   (Renumerado do parágrafo único pela Lei nº 14.994, de 2024)\n§ 2º Se a contravenção é praticada contra a mulher por razões da condição do sexo feminino, nos termos do § 1º do art. 121-A do Decreto-Lei nº 2.848, de 7 de dezembro de 1940 (Código Penal), aplica-se a pena em triplo. (NÃO É O DOBRO)     (Incluído pela Lei nº 14.994, de 2024)\nGabarito: E", "annulled": false, "remark": null}, {"id": "Q38-E", "qn": 38, "tema": "Feminicídio", "type": "mc", "letter": "E", "stem": "Considerando a Lei 14.994/2024 que alterou o regime de punição de crimes contra a mulher pelas condições do sexo feminino, marque a alternativa correta:", "assertion": "Índigo, indignado com o fim do seu relacionamento com Rubi, por achar que mulher não detém o poder final da palavra, ou seja, por razões do sexo feminino, solicitou ao seu primo, Ônix, o carro deste, para levar a ex-companheira a um lugar ermo e distante com vistas a um acerto de contas. Sabendo de toda a trama e das razões do crime intentado, Ônix emprestou o veículo ao primo. Este, então, ligou para a mulher, a encontrou sob pretexto de querer reatar o relacionamento, contudo a levou para o local pré-designado, ceifando a vida dela no ambiente planejado. Sendo o caso devidamente investigado e processado, Índigo e Ônix podem ser condenados por feminicídio.", "correct": true, "justification": "(CORRETA) , nos termos do art. Art. 121-A. Matar mulher por razões da condição do sexo feminino:      (Incluído pela Lei nº 14.994, de 2024)\nPena – reclusão, de 20 (vinte) a 40 (quarenta) anos.     (Incluído pela Lei nº 14.994, de 2024)\n§ 3º Comunicam-se ao coautor ou partícipe as circunstâncias pessoais elementares do crime previstas no § 1º deste artigo.      (Incluído pela Lei nº 14.994, de 2024)\nNo caso hipotético, Ônix é partícipe do crime de feminicídio e estava a par de toda a situação, inclusive o motivo ensejador do crime praticado (em razão do sexo feminino). Como este é elementar do delito de feminicídio comunica-se ao partícipe, respondendo este também por feminicídio, independente se estava ou não no local do crime, mas sabedor de toda a situação.\nAlterações legislativas provocadas pela Lei 14.994/2024:\nAltera o art. 92 (efeitos da condenação)\nAdiciona o art. 121-A (crime de feminicídio passa a ser crime autônomo)\nAltera o art. 129 (crime de lesão corporal: alteração no quantum da pena)\nAltera o art. 141 (crimes contra a honra: nova causa de aumento)\nAltera o art. 147 (crime de ameaça: nova causa de aumento e alteração na natureza da ação penal)\nAltera o art. 394-A (alteração na prioridade da tramitação processual e previsão de isenção)\nLei das Contravenções Penais Altera o art. 21 (alteração no quantum da pena)\nLei dos Crimes Hediondos Altera o art. 1º (mera realocação de dispositivos legais)\nLei Maria da Penha Altera o art. 24-A (alteração no quantum da pena)\nLei de Exec", "annulled": false, "remark": null}, {"id": "Q39-A", "qn": 39, "tema": "Crimes contra a liberdade / dignidade sexual", "type": "mc", "letter": "A", "stem": "João, pai de Maria, adolescente de 15 anos, arrastou a filha para uma construção nos fundos da residência e, mediante violência, apalpou seus seios e introduziu o dedo em sua vagina.", "assertion": "O dolo no crime de estupro consiste na vontade de constranger a vítima à prática de ato libidinoso, não sendo necessária a intenção de satisfazer a lascívia.", "correct": true, "justification": "O gabarito oficial desta questão é a alternativa A. 39 – (ERREI – MARQUEI A LETRA C. MAS GABARITO É LETRA A) João, pai de Maria, adolescente de 15 anos, arrastou a filha para uma construção nos fundos da residência e, mediante violência, apalpou seus seios e introduziu o dedo em sua vagina.\nO fato foi descoberto e João foi denunciado pelo crime de estupro. Em juízo, Maria tentou minimizar o fato afirmando que o pai teria agido apenas para verificar a virgindade, sem intenção sexual.\nCom base no entendimento dos Tribunais Superiores, assinale a alternativa correta:\nA\n84.58%\nO dolo no crime de estupro consiste na vontade de constranger a vítima à prática de ato libidinoso, não sendo necessária a intenção de satisfazer a lascívia.\nB\n1.24%\nVerificado que não houve a intenção de satisfação da lascívia, João deverá ser absolvido, visto que tal elemento é necessário para a configuração do tipo penal.\nC\n9.45%\nA motivação de João (prazer sexual, vingança, humilhação ou correção) é relevante para a configuração do crime de estupro, motivo pelo qual deve ser apurada para fins de responsabilização.\nD\n0.5%\nA afirmação de Maria, de que o pai apenas teria agido para verificar sua virgindade, demonstra a ausência de dolo na conduta de João, razão pela qual estaria ausente o elemento subjetivo necessário à configuração do crime.\nE\n4.23%\nO tipo penal do crime de estupro, previsto no artigo 213 do Código Penal, exige dolo específico para sua configuração.\na) Certa. Responde às demais alternativas. Conforme entendimento do Superior Tribunal de Justiça, o dolo no crime de estupro consiste na vontade de constranger a vítima à prática de ato libidinoso, não sendo necessária a intenção de satisfazer a lascívia. O artigo 213 do Código Penal não exige a satisfação da lascívia como elemento subjetivo do tipo, sendo irrelevante a motivação do agente, seja ela o prazer sexual, a vingança, a humilhação ou a correção. STJ, 5ª Turma, REsp 2.211.166/MG, Rel. Min. Joel Ilan Paciornik, julgado em 12/8/2025 (Informativo 862).\nb) Errada.\nc) Errada.\nd) Errada.\ne) Errada.\nGabarito: A", "annulled": false, "remark": "ERREI – MARQUEI A LETRA C. MAS GABARITO É LETRA A"}, {"id": "Q39-B", "qn": 39, "tema": "Crimes contra a liberdade / dignidade sexual", "type": "mc", "letter": "B", "stem": "João, pai de Maria, adolescente de 15 anos, arrastou a filha para uma construção nos fundos da residência e, mediante violência, apalpou seus seios e introduziu o dedo em sua vagina.", "assertion": "Verificado que não houve a intenção de satisfação da lascívia, João deverá ser absolvido, visto que tal elemento é necessário para a configuração do tipo penal.", "correct": false, "justification": "O gabarito oficial desta questão é a alternativa A. 39 – (ERREI – MARQUEI A LETRA C. MAS GABARITO É LETRA A) João, pai de Maria, adolescente de 15 anos, arrastou a filha para uma construção nos fundos da residência e, mediante violência, apalpou seus seios e introduziu o dedo em sua vagina.\nO fato foi descoberto e João foi denunciado pelo crime de estupro. Em juízo, Maria tentou minimizar o fato afirmando que o pai teria agido apenas para verificar a virgindade, sem intenção sexual.\nCom base no entendimento dos Tribunais Superiores, assinale a alternativa correta:\nA\n84.58%\nO dolo no crime de estupro consiste na vontade de constranger a vítima à prática de ato libidinoso, não sendo necessária a intenção de satisfazer a lascívia.\nB\n1.24%\nVerificado que não houve a intenção de satisfação da lascívia, João deverá ser absolvido, visto que tal elemento é necessário para a configuração do tipo penal.\nC\n9.45%\nA motivação de João (prazer sexual, vingança, humilhação ou correção) é relevante para a configuração do crime de estupro, motivo pelo qual deve ser apurada para fins de responsabilização.\nD\n0.5%\nA afirmação de Maria, de que o pai apenas teria agido para verificar sua virgindade, demonstra a ausência de dolo na conduta de João, razão pela qual estaria ausente o elemento subjetivo necessário à configuração do crime.\nE\n4.23%\nO tipo penal do crime de estupro, previsto no artigo 213 do Código Penal, exige dolo específico para sua configuração.\na) Certa. Responde às demais alternativas. Conforme entendimento do Superior Tribunal de Justiça, o dolo no crime de estupro consiste na vontade de constranger a vítima à prática de ato libidinoso, não sendo necessária a intenção de satisfazer a lascívia. O artigo 213 do Código Penal não exige a satisfação da lascívia como elemento subjetivo do tipo, sendo irrelevante a motivação do agente, seja ela o prazer sexual, a vingança, a humilhação ou a correção. STJ, 5ª Turma, REsp 2.211.166/MG, Rel. Min. Joel Ilan Paciornik, julgado em 12/8/2025 (Informativo 862).\nb) Errada.\nc) Errada.\nd) Errada.\ne) Errada.\nGabarito: A", "annulled": false, "remark": "ERREI – MARQUEI A LETRA C. MAS GABARITO É LETRA A"}, {"id": "Q39-C", "qn": 39, "tema": "Crimes contra a liberdade / dignidade sexual", "type": "mc", "letter": "C", "stem": "João, pai de Maria, adolescente de 15 anos, arrastou a filha para uma construção nos fundos da residência e, mediante violência, apalpou seus seios e introduziu o dedo em sua vagina.", "assertion": "A motivação de João (prazer sexual, vingança, humilhação ou correção) é relevante para a configuração do crime de estupro, motivo pelo qual deve ser apurada para fins de responsabilização.", "correct": false, "justification": "O gabarito oficial desta questão é a alternativa A. 39 – (ERREI – MARQUEI A LETRA C. MAS GABARITO É LETRA A) João, pai de Maria, adolescente de 15 anos, arrastou a filha par emark": "ERREI – MARQUEI A LETRA C. MAS GABARITO É LETRA A"}, {"id": "Q40-A", "qn": 40, "tema": "Crimes contra a honra", "type": "mc", "letter": "A", "stem": "Policiais e Bombeiros Militares da ativa, veteranos e pensionistas do Estado do Rio Grande do Sul realizaram uma manifestação pública pacífica durante a inauguração de uma obra pública. Estavam presentes no evento o Governador, o Prefeito, Deputados Federais e Estaduais, diversas autoridades e aproximadamente trezentas pessoas.", "assertion": "Ao afirmar que “eles quebraram o Estado” ao se referir aos policiais militares, o Governador teria ofendido a honra objetiva da categoria, podendo ser responsabilizado pelo crime de calúnia.", "correct": false, "justification": "O gabarito oficial desta questão é a alternativa E. 40 – (ERREI – MARQUEI LETRA D. MAS GABARITO É LETRA E) Policiais e Bombeiros Militares da ativa, veteranos e pensionistas do Estado do Rio Grande do Sul realizaram uma manifestação pública pacífica durante a inauguração de uma obra pública. Estavam presentes no evento o Governador, o Prefeito, Deputados Federais e Estaduais, diversas autoridades e aproximadamente trezentas pessoas.\nA manifestação ocorreu, entre outros motivos, em razão de o Governador ter vetado o artigo 42 da Lei Estadual nº X, o que resultou na supressão do direito dos veteranos, reformados e pensionistas à gratificação de risco de atividade militar.\nDurante o evento, o Governador do Estado teria afirmado, em discurso público, que o policial militar reformado e líder do movimento, Carlos, era “mau-caráter” e que os militares haviam “quebrado o Estado”, diante da reivindicação por aumento salarial. Teria dito, ainda, que “essas pessoas aqui não tinham salário (...) por causa de gente igual a esse mau-caráter”.\nCom base no entendimento dos Tribunais Superiores, assinale a alternativa correta:\nA\n0.5%\nAo afirmar que “eles quebraram o Estado” ao se referir aos policiais militares, o Governador teria ofendido a honra objetiva da categoria, podendo ser responsabilizado pelo crime de calúnia.\nB\n23.17%\nO Governador, ao chamar reiteradas vezes Carlos de “mau-caráter”, ofendeu sua dignidade e honra subjetiva, e, presente o dolo, incorreu no crime de injúria.\nC\n6.55%\nO Governador, ao afirmar que “essas pessoas aqui não tinham salário (...) por causa de gente igual a esse mau-caráter”, ofendeu a honra objetiva alheia, incidindo no crime de difamação.\nD\n16.37%\nPara a configuração dos crimes contra a honra, exige-se a demonstração mínima do intento positivo e deliberado de ofender a honra alheia (dolo específico), o que teria restado configurado nas falas do Governador, que ofenderam tanto a honra objetiva quanto a subjetiva de Carlos.\nE\n53.4%\nExpressões eventualmente contumeliosas, quando proferidas em momento de exaltação, bem como no exercício do direito de crítica ou de censura profissional, ainda que veementes, atuam como fatores de descaracterização do elemento subjetivo dos tipos penais dos crimes contra a honra.\na) Errada. O STJ entendeu que não se configurou o crime de calúnia, uma vez que não houve a imputação de fato determinado definido como crime — requisito indispensável à caracterização do tipo penal. As expressões foram consideradas críticas genéricas.\nb) Errada. Fundamenta as alternativas “c” e “d”. O STJ entendeu que não se configuraram os crimes de injúria ou difamação, pois, nos crimes contra a honra, é indispensável o dolo de dano (animus caluniandi, diffamandi vel injuriandi). Divergências de opinião e alterações momentâneas de ânimo não caracterizam, por si só, o propósito de ofender.\nc) Errada. Fundamentação conforme a alternativa “b”.\nd) Errada. Fundamentação conforme a alternativa “b”.\ne) Certa. Conforme entendimento do STJ (Informativo nº 819): “Expressões eventualmente contumeliosas, quando proferidas em momento de exaltação, bem assim no exercício do direito de crítica ou de censura profissional, ainda que veementes, atuam como fatores de descaracterização do elemento subjetivo peculiar aos tipos penais definidores dos crimes contra a honra.”\nGabarito: E", "annulled": false, "remark": "ERREI – MARQUEI LETRA D. MAS GABARITO É LETRA E"}, {"id": "Q40-B", "qn": 40, "tema": "Crimes contra a honra", "type": "mc", "letter": "B", "stem": "Policiais e Bombeiros Militares da ativa, veteranos e pensionistas do Estado do Rio Grande do Sul realizaram uma manifestação pública pacífica durante a inauguração de uma obra pública. Estavam presentes no evento o Governador, o Prefeito, Deputados Federais e Estaduais, diversas autoridades e aproximadamente trezentas pessoas.", "assertion": "O Governador, ao chamar reiteradas vezes Carlos de “mau-caráter”, ofendeu sua dignidade e honra subjetiva, e, presente o dolo, incorreu no crime de injúria.", "correct": false, "justification": "O gabarito oficial desta questão é a alternativa E. 40 – (ERREI – MARQUEI LETRA D. MAS GABARITO É LETRA E) Policiais e Bombeiros Militares da ativa, veteranos e pensionistas do Estado do Rio Grande do Sul realizaram uma manifestação pública pacífica durante a inauguração de uma obra pública. Estavam presentes no evento o Governador, o Prefeito, Deputados Federais e Estaduais, diversas autoridades e aproximadamente trezentas pessoas.\nA manifestação ocorreu, entre outros motivos, em razão de o Governador ter vetado o artigo 42 da Lei Estadual nº X, o que resultou na supressão do direito dos veteranos, reformados e pensionistas à gratificação de risco de atividade militar.\nDurante o evento, o Governador do Estado teria afirmado, em discurso público, que o policial militar reformado e líder do movimento, Carlos, era “mau-caráter” e que os militares haviam “quebrado o Estado”, diante da reivindicação por aumento salarial. Teria dito, ainda, que “essas pessoas aqui não tinham salário (...) por causa de gente igual a esse mau-caráter”.\nCom base no entendimento dos Tribunais Superiores, assinale a alternativa correta:\nA\n0.5%\nAo afirmar que “eles quebraram ão caracterizam, por si só, o propósito de ofender.\nc) Errada. Fundamentação conforme a alternativa “b”.\nd) Errada. Fundamentação conforme a alternativa “b”.\ne) Certa. Conforme entendimento do STJ (Informativo nº 819): “Expressões eventualmente contumeliosas, quando proferidas em momento de exaltação, bem assim no exercício do direito de crítica ou de censura profissional, ainda que veementes, atuam como fatores de descaracterização do elemento subjetivo peculiar aos tipos penais definidores dos crimes contra a honra.”\nGabarito: E", "annulled": false, "remark": "ERREI – MARQUEI LETRA D. MAS GABARITO É LETRA E"}, {"id": "Q40-E", "qn": 40, "tema": "Crimes contra a honra", "type": "mc", "letter": "E", "stem": "Policiais e Bombeiros Militares da ativa, veteranos e pensionistas do Estado do Rio Grande do Sul realizaram uma manifestação pública pacífica durante a inauguração de uma obra pública. Estavam presentes no evento o Governador, o Prefeito, Deputados Federais e Estaduais, diversas autoridades e aproximadamente trezentas pessoas.", "assertion": "Expressões eventualmente contumeliosas, quando proferidas em momento de exaltação, bem como no exercício do direito de crítica ou de censura profissional, ainda que veementes, atuam como fatores de descaracterização do elemento subjetivo dos tipos penais dos crimes contra a honra. a) Errada. O STJ entendeu que não se configurou o crime de calúnia, uma vez que não houve a imputação de fato determinado definido como crime — requisito indispensável à caracterização do tipo penal. As expressões foram consideradas críticas genéricas. b) Errada. Fundamenta as alternativas “c” e “d”. O STJ entendeu que não se configuraram os crimes de injúria ou difamação, pois, nos crimes contra a honra, é indispensável o dolo de dano (animus caluniandi, diffamandi vel injuriandi). Divergências de opinião e alterações momentâneas de ânimo não caracterizam, por si só, o propósito de ofender. c) Errada. Fundamentação conforme a alternativa “b”. "Em relação ao crime de Feminicídio, conforme introduzido pela Lei nº 14.994/2024 (Art. 121-A do Código Penal), assinale a alternativa correta.", "assertion": "A pena do feminicídio é aumentada de 1/3 (um terço) até a metade se o crime é praticado na presença física ou virtual de descendente ou de ascendente da vítima.", "correct": true, "justification": "O gabarito oficial desta questão é a alternativa A. 41 – (ERREI – MARQUEI A LETRA C. MAS GABARITO É LETRA A) Em relação ao crime de Feminicídio, conforme introduzido pela Lei nº 14.994/2024 (Art. 121-A do Código Penal), assinale a alternativa correta.\nA\n60.76%\nA pena do feminicídio é aumentada de 1/3 (um terço) até a metade se o crime é praticado na presença física ou virtual de descendente ou de ascendente da vítima.\nB\n0.42%\nConsidera-se que há razões da condição do sexo feminino, para fins de tipificação do Art. 121-A, apenas quando o crime envolve violência doméstica e familiar.\nC\n28.48%\nA pena do feminicídio é aumentada se o crime for praticado em descumprimento de qualquer das medidas protetivas de urgência previstas na Lei Maria da Penha (Lei nº 11.340/06).\nD\n9.07%\nA pena do feminicídio é aumentada se o crime é praticado durante a gestação ou nos 6 (seis) meses posteriores ao parto.\nE\n1.27%\nA pena do feminicídio é aumentada de metade se o crime é praticado por motivo torpe ou fútil.\nA alternativa A está correta. A assertiva é a reprodução literal da causa de aumento de pena prevista no Art. 121-A, § 2º, III, do Código Penal, destacando a relevante atualização legislativa que equipara a presença \"virtual\" à física.\nÀ luz do disposto no Art. 121-A, § 2º, III, do Código Penal:\nArt. 121-A. § 2º A pena do feminicídio é aumentada de 1/3 (um terço) até a metade se o crime é praticado:\nIII – na presença física ou virtual de descendente ou de ascendente da vítima;\nA alternativa B está incorreta. A assertiva restringe indevidamente o conceito legal. O Art. 121-A, § 1º, prevê duas hipóteses que configuram \"razões da condição do sexo feminino\": a violência doméstica (Inciso I) ou o menosprezo/discriminação (Inciso II). A utilização do termo \"apenas\" invalida a alternativa.\nConsoante previsão do Art. 121-A, § 1º, do Código Penal:\nArt. 121-A. § 1º Considera-se que há razões da condição do sexo feminino quando o crime envolve:\nI – violência doméstica e familiar;\nII – menosprezo ou discriminação à condição de mulher.\nA alternativa C está incorreta. O texto legal é restritivo e específico, não se aplicando a \"qualquer\" medida protetiva. O aumento de pena incide apenas no descumprimento das medidas previstas nos incisos I, II e III do Art. 22 da Lei 11.340/06.\nSegundo o Art. 121-A, § 2º, IV, do Código Penal:\nArt. 121-A. § 2º A pena do feminicídio é aumentada de 1/3 (um terço) até a metade se o crime é praticado:\nIV – em descumprimento das medidas protetivas de urgência previstas nos incisos I, II e III do caput do art. 22 da Lei nº 11.340, de 7 de agosto de 2006 (Lei Maria da Penha);\nVejamos o que dispõe o art. 22 da Lei Maria da Penha:\nArt. 22. Constatada a prática de violência doméstica e familiar contra a mulher, nos termos desta Lei, o juiz poderá aplicar, de imediato, ao agressor, em conjunto ou separadamente, as seguintes medidas protetivas de urgência, entre outras:\nI - suspensão da posse ou restrição do porte de armas, com comunicação ao órgão competente, nos termos da Lei nº 10.826, de 22 de dezembro de 2003;\nII - afastamento do lar, domicílio ou local de convivência com a ofendida;\nIII - proibição de determinadas condutas, entre as quais:\na) aproximação da ofendida, de seus familiares e das testemunhas, fixando o limite mínimo de distância entre estes e o agressor;\nb) contato com a ofendida, seus familiares e testemunhas por qualquer meio de comunicação;\nc) frequentação de determinados lugares a fim de preservar a integridade física e...", "annulled": false, "remark": "ERREI – MARQUEI A LETRA C. MAS GABARITO É LETRA A"}, {"id": "Q41-B sica ou virtual de descendente ou de ascendente da vítima;\nA alternativa B está incorreta. A assertiva restringe indevidamente o conceito legal. O Art. 121-A, § 1º, prevê duas hipóteses que configuram \"razões da condição do sexo feminino\": a violência doméstica (Inciso I) ou o menosprezo/discriminação (Inciso II). A utilização do termo \"apenas\" invalida a alternativa.\nConsoante previsão do Art. 121-A, § 1º, do Código Penal:\nArt. 121-A. § 1º Considera-se que há razões da condição do sexo feminino quando o crime envolve:\nI – violência doméstica e familiar;\nII – menosprezo ou discriminação à condição de mulher.\nA alternativa C está incorreta. O texto legal é restritivo e específico, não se aplicando a \"qualquer\" medida protetiva. O aumento de pena incide apenas no descumprimento das medidas previstas nos incisos I, II e III do Art. 22 da Lei 11.340/06.\nSegundo o Art. 121-A, § 2º, IV, do Código Penal:\nArt. 121-A. § 2º A pena do feminicídio é aumentada de 1/3 (um terço) até a metade se o crime é praticado:\nIV – em descumprimento das medidas protetivas de urgência previstas nos incisos I, II e III do caput do art. 22 da Lei nº 11.340, de 7 de agosto de 2006 (Lei Maria da Penha);\nVejamos o que dispõe o art. 22 da Lei Maria da Penha:\nArt. 22. Constatada a prática de violência doméstica e familiar contra a mulher, nos termos desta Lei, o juiz poderá aplicar, de imediato, ao agressor, em conjunto ou separadamente, as seguintes medidas protetivas de urgência, entre outras:\nI - suspensão da posse ou restrição do porte de armas, com comunicação ao órgão competente, nos termos da Lei nº 10.826, de 22 de dezembro de 2003;\nII - afastamento do lar, domicílio ou local de convivência com a ofendida;\nIII - proibição de determinadas condutas, entre as quais:\na) aproximação da ofendida, de seus familiares e das testemunhas, fixando o limite mínimo de distância entre estes e o agressor;\nb) contato com a ofendida, seus familiares e testemunhas por qualquer meio de comunicação;\nc) frequentação de determinados lugares a fim de preservar a integridade física e...", "annulled": false, "remark": "ERREI – MARQUEI A LETRA C. MAS GABARITO É LETRA A"}, {"id": "Q41-E", "qn": 41, "tema": "Feminicídio", "type": "mc", "letter": "E", "stem": "Em relação ao crime de Feminicídio, conforme introduzido pela Lei nº 14.994/2024 (Art. 121-A do Código Penal), assinale a alternativa correta.", "assertion": "A pena do feminicídio é aumentada de metade se o crime é praticado por motivo torpe ou fútil. A alternativa A está correta. A assertiva é a reprodução literal da causa de aumento de pena prevista no Art. 121-A, § 2º, III, do Código Penal, destacando a relevante atualização legislativa que equipara a presença \"virtual\" à física. À luz do disposto no Art. 121-A, § 2º, III, do Código Penal: Art. 121-A. § 2º A pena do feminicídio é aumentada de 1/3 (um terço) até a metade se o crime é praticado: III – na presença física ou virtual de descendente ou de ascendente da vítima; A alternativa B está incorreta. A assertiva restringe indevidamente o conceito legal. O Art. 121-A, § 1º, prevê duas hipóteses que configuram \"razões da condição do sexo feminino\": a violência doméstica (Inciso I) ou o menosprezo/discriminação (Inciso II). A utilização do termo \"apenas\" invalida a alternativa. Consoante previsão do Art. 121-A, § 1º, do Código Penal: Art. 121-A. § 1º Considera-se que há razões da condição do sexo feminino quando o crime envolve: I – violência doméstica e familiar; II – menosprezo ou discriminação à condição de mulher. A alternativa C está incorreta. O texto legal é restritivo e específico, não se aplicando a \"qualquer\" medida protetiva. O aumento de pena incide apenas no descumprimento das medidas previstas nos incisos I, II e III do Art. 22 da Lei 11.340/06. Segundo o Art. 121-A, § 2º, IV, do Código Penal: Art. 121-A. § 2º A pena do feminicídio é aumentada de 1/3 (um terço) até a metade se o crime é praticado: IV – em descumprimento das medidas protetivas de urgência previstas nos incisos I, II e III do caput do art. 22 da Lei nº 11.340, de 7 de agosto de 2006 (Lei Maria da Penha); Vejamos o que dispõe o art. 22 da Lei Maria da Penha: Art. 22. Constatada a prática de violência doméstica e familiar contra a mulher, nos termos desta Lei, o juiz poderá aplicar, de imediato, ao agressor, em conjunto ou separadamente, as seguintes medidas protetivas de urgência, entre outras: I - suspensão da posse ou restrição do porte de armas, com comunicação ao órgão competente, nos termos da Lei nº 10.826, de 22 de dezembro de 2003; II - afastamento do lar, domicílio ou local de convivência com a ofendida; III - proibição de determinadas condutas, entre as quais: a) aproximação da ofendida, de seus familiares e das testemunhas, fixando o limite mínimo de distância entre estes e o agressor; b) contato com a ofendida, seus familiares e testemunhas por qualquer meio de comunicação; c) frequentação de determinados lugares a fim de preservar a integridade física e psicológica da ofendida; IV - restrição ou suspensão de visitas aos dependentes menores, ouvida a equipe de atendimento multidisciplinar ou serviço similar; V - prestação de alimentos provisionais ou provisórios. VI – comparecimento do agressor a programas de recuperação e reeducação; e (Incluído pela Lei nº 13.984, de 2020) VII – acompanhamento psicossocial do agressor, por meio de atendimento individual e/ou em grupo de apoio. (Incluído pela Lei nº 13.984, de 2020) A alternativa D está incorreta. A assertiva altera o prazo legal da causa de aumento. O dispositivo menciona \"3 (três) meses posteriores ao parto\", e não 6 (seis) meses. Conforme o Art. 121-A, § 2º, I, do Código Penal: Art. 121-A. § 2º A pena do feminicídio é aumentada de 1/3 (um terço) até a metade se o crime é praticado: I – durante a gestação, nos 3 (três) meses posteriores ao parto ou se a vítima é a mãe ou a responsável por criança, adolescente ou pessoa com deficiência de qualquer idade; A alternativa E está incorreta. A assertiva apresenta dois erros. Inicialmente, a fração de aumento prevista em lei é variável (\"de 1/3 até a metade\"), e não a fração fixa (\"de metade\"). Outrossim, as circunstâncias do homicídio qualificado (Art. 121, § 2º) que aumentam a pena do feminicídio são específicas (Incisos III - meio cruel, IV - dissimulação, e VIII - arma restrita), não incluindo o motivo torpe (Inciso I) nem o motivo fútil (Inciso II). Nos termos do Art. 121-A, § 2º, V, do Código Penal: Art. 121-A. § 2º A pena do feminicídio é aumentada de 1/3 (um terço) até a metade se o crime é praticado: V – nas circunstâncias previstas nos incisos III, IV e VIII do § 2º do art. 121 deste Código.", "correct": false, "justification": "O gabarito oficial desta questão é a alternativa A. 41 – (ERREI – MARQUEI A LETRA C. MAS GABARITO É LETRA A) Em relação ao crime de Feminicídio, conforme introduzido pela Lei nº 14.994/2024 (Art. 121-A do Código Penal), assinale a alternativa correta.\nA\n60.76%\nA pena do feminicídio é aumentada de 1/3 (um terço) até a metade se o crime é praticado na presença física ou virtual de descendente ou de ascendente da vítima.\nB\n0.42%\nConsidera-se que há razões da condição do sexo feminino, para fins de tipificação do Art. 121-A, apenas quando o crime envolve violência doméstica e familiar.\nC\n28.48%\nA pena do feminicídio é aumentada se o crime for praticado em descumprimento de qualquer das medidas protetivas de urgência previstas na Lei Maria da Penha (Lei nº 11.340/06).\nD\n9.07%\nA pena do feminicídio é aumentada se o crime é praticado durante a gestação ou nos 6 (seis) meses posteriores ao parto.\nE\n1.27%\nA pena do feminicídio é aumentada de metade se o crime é praticado por motivo torpe ou fútil.\nA alternativa A está correta. A assertiva é a reprodução literal da causa de aumento de pena prevista no Art. 121-A, § 2º, III, do Código Penal, destacando a relevante atualização legislativa que equipara a presença \"virtual\" à física.\nÀ luz do disposto no Art. 121-A, § 2º, III, do Código Penal:\nArt. 121-A. § 2º A pena do feminicídio é aumentada de 1/3 (um terço) até a metade se o crime é praticado:\nIII – na presença física ou virtual de descendente ou de ascendente da vítima;\nA alternativa B está incorreta. A assertiva restringe indevidamente o conceito legal. O Art. 121-A, § 1º, prevê duas hipóteses que configuram \"razões da condição do sexo feminino\": a violência doméstica (Inciso I) ou o menosprezo/discriminação (Inciso II). A utilização do termo \"apenas\" invalida a alternativa.\nConsoante previsão do Art. 121-A, § 1º, do Código Penal:\nArt. 121-A. § 1º Considera-se que há razões da condição do sexo feminino quando o crime envolve:\nI – violência doméstica e familiar;\nII – menosprezo ou discriminação à condição de mulher.\nA alternativa C está incorreta. O texto legal é restritivo e específico, não se aplicando a \"qualquer\" medida protetiva. O aumento de pena incide apenas no descumprimento das medidas previstas nos incisos I, II e III do Art. 22 da Lei 11.340/06.\nSegundo o Art. 121-A, § 2º, IV, do Código Penal:\nArt. 121-A. § 2º A pena do feminicídio é aumentada de 1/3 (um terço) até a metade se o crime é praticado:\nIV – em descumprimento das medidas protetivas de urgência previstas nos incisos I, II e III do caput do art. 22 da Lei nº 11.340, de 7 de agosto de 2006 (Lei Maria da Penha);\nVejamos o que dispõe o art. 22 da Lei Maria da Penha:\nArt. 22. Constatada a prática de violência doméstica e familiar contra a mulher, nos termos desta Lei, o juiz poderá aplicar, de imediato, ao agressor, em conjunto ou separadamente, as seguintes medidas protetivas de urgência, entre outras:\nI - suspensão da posse ou restrição do porte de armas, com comunicação ao órgão competente, nos termos da Lei nº 10.826, de 22 de dezembro de 2003;\nII - afastamento do lar, domicílio ou local de convivência com a ofendida;\nIII - proibição de determinadas condutas, entre as quais:\na) aproximação da ofendida, de seus familiares e das testemunhas, fixando o limite mínimo de distância entre estes e o agressor;\nb) contato com a ofendida, seus familiares e testemunhas por qualquer meio de comunicação;\nc) frequentação de determinados lugares a fim de preservar a integridade física e...", "annulled": false, "remark": "ERREI – MARQUEI A LETRA C. MAS GABARITO É LETRA A"}, {"id": "Q42-A", "qn": 42, "tema": "Homicídio", "type": "mc", "letter": "A", "stem": "Levando em consideração a disciplina jurisprudencial aplicável aos crimes contra a pessoa, julgue os itens a seguir, assinalando a resposta correta:", "assertion": "A ausência de laudo pericial impede que seja reconhecida a materialidade do delito de lesão corporal de natureza grave por outros meios.", "correct": false, "justification": "O gabarito oficial desta questão é a alternativa C. 42 – (ERREI – MARQUEI A LETRA B. MAS O GABARITO É LETRA C) Levando em consideração a disciplina jurisprudencial aplicável aos crimes contra a pessoa, julgue os itens a seguir, assinalando a resposta correta:\nA\n1.27%\nA ausência de laudo pericial impede que seja reconhecida a materialidade do delito de lesão corporal de natureza grave por outros meios.\nB\n3.8%\nA qualificadora “deformidade permanente” do crime de lesão corporal é afastada por posterior cirurgia estética reparadora que elimine ou minimize a deformidade na vítima.\nC\n81.01%\nNo crime de homicídio, dolo eventual não é compatível com a qualificadora da emboscada.\nD\n5.06%\nÉ defeso afirmar que a qualificadora do meio cruel é compatível com o dolo eventual.\nE\n8.86%\nA qualificadora do motivo fútil é incompatível com o homicídio praticado com dolo eventual.\nA) INCORRETA. A materialidade das lesões corporais pode ser atestada por meios diversos.\nA ausência de laudo pericial assinado por dois peritos não impede que seja reconhecida a materialidade das lesões. Isso porque o art. 158 do CPP prevê, além do exame de corpo de delito direto, o indireto, que pode ser, entre outros, exame da ficha clínica do hospital que atendeu a vítima, fotografias, filmes, atestados. STJ - HABEAS CORPUS: HC 0117725-82.2004.3.00.0000 RJ 2004/0117725-8.\nB) INCORRETA. A qualificadora “deformidade permanente” do crime de lesão corporal (art. 129, § 2º, IV, do CP) não é afastada por posterior cirurgia estética reparadora que elimine ou minimize a deformidade na vítima. Isso porque, o fato criminoso é valorado no momento de sua consumação, não o afetando providências posteriores, notadamente quando não usuais (pelo risco ou pelo custo, como cirurgia plástica ou de tratamentos prolongados, dolorosos ou geradores do risco de vida) e promovidas a critério exclusivo da vítima.\nSTJ. 6ª Turma. HC 306.677-RJ, Rel. Min. Ericson Maranho (Desembargador convocado do TJ-SP), Rel. para acórdão Min. Nefi Cordeiro, julgado em 19/5/2015 (Info 562).\nC) CORRETA. O dolo eventual não se compatibiliza com a qualificadora do art. 121, § 2º, IV (traição, emboscada, dissimulação - consideradas qualificadoras de MEIO).\nÉ possível haver homicídio qualificado praticado com dolo eventual?\n·        No caso das qualificadoras do motivo fútil e/ou torpe: SIM (posição do STJ e do STF)\n·        No caso de qualificadoras de meio: NÃO (posição do STF HC 95136/PR)\nContextualizando: no caso julgado pela 2ª Turma, o réu foi denunciado pela suposta prática do crime de homicídio qualificado pela surpresa (art. 121, § 2o, IV, CP), e embriaguez ao volante (art. 306 do Código de Trânsito) porque, ao conduzir veículo em alta velocidade e em estado de embriaguez, ultrapassara sinal vermelho e colidira com outro carro, cujo condutor viera a falecer.\nEntendimento aplicável: para que incida a qualificadora da surpresa é indispensável que fique provado que o agente teve a vontade de surpreender a vítima, impedindo ou dificultando que ela se defendesse. No dolo eventual, o agente não tem essa intenção, considerando que não quer\nmatar a vítima, mas apenas assume o risco de produzir esse resultado. Como o agente não deseja a produção do resultado, ele não direcionou sua vontade para causar surpresa à vítima. Logo, não pode responder por essa circunstância (surpresa).\nSTF. 2ª Turma. HC 111.442/RS, Rel. Min. Gilmar Mendes, julgado em 28/8/2012 (Info 677).\nSTJ. 6ª Turma. REsp o/SP, Rel. Min. Sebastião Reis Júnior,...", "annulled": true, "remark": "ERREI – MARQUEI A LETRA B. MAS O GABARITO É LETRA C"}, {"id": "Q42-B", "qn": 42, "tema": "Homicídio", "type": "mc", "letter": "B", "stem": "Levando em consideração a disciplina jurisprudencial aplicável aos crimes contra a pessoa, julgue os itens a seguir, assinalando a resposta correta:", "assertion": "A qualificadora “deformidade permanente” do crime de lesão corporal é afastada por posterior cirurgia estética reparadora que elimine ou minimize a deformidade na vítima.", "correct": false, "justification": "O gabarito oficial desta questão é a alternativa C. 42 – (ERREI – MARQUEI A LETRA B. MAS O GABARITO É LETRA C) Levando em consideração a disciplina jurisprudencial aplicável aos crimes contra a pessoa, julgue os itens a seguir, assinalando a resposta correta:\nA\n1.27%\nA ausência de laudo pericial impede que seja reconhecida a materialidade do delito de lesão corporal de natureza grave por outros meios.\nB\n3.8%\nA qualificadora “deformidade permanente” do crime de lesão corporal é afastada por posterior cirurgia estética reparadora que elimine ou minimize a deformidade na vítima.\nC\n81.01%\nNo crime de homicídio, dolo eventual não é compatível com a qualificadora da emboscada.\nD\n5.06%\nÉ defeso afirmar que a qualificadora do meio cruel é compatível com o dolo eventual.\nE\n8.86%\nA qualificadora do motivo fútil é incompatível com o homicídio praticado com dolo eventual.\nA) INCORRETA. A materialidade das lesões corporais pode ser atestada por meios diversos.\nA ausência de laudo pericial assinado por dois peritos não impede que seja reconhecida a materialidade das lesões. Isso porque o art. 158 do CPP prevê, s apenas assume o risco de produzir esse resultado. Como o agente não deseja a produção do resultado, ele não direcionou sua vontade para causar surpresa à vítima. Logo, não pode responder por essa circunstância (surpresa).\nSTF. 2ª Turma. HC 111.442/RS, Rel. Min. Gilmar Mendes, julgado em 28/8/2012 (Info 677).\nSTJ. 6ª Turma. REsp o/SP, Rel. Min. Sebastião Reis Júnior,...", "annulled": true, "remark": "ERREI – MARQUEI A LETRA B. MAS O GABARITO É LETRA C"}, {"id": "Q42-E", "qn": 42, "tema": "Homicídio", "type": "mc", "letter": "E", "stem": "Levando em consideração a disciplina jurisprudencial aplicável aos crimes contra a pessoa, julgue os itens a seguir, assinalando a resposta correta:", "assertion": "A qualificadora do motivo fútil é incompatível com o homicídio praticado com dolo eventual. A) INCORRETA. A materialidade das lesões corporais pode ser atestada por meios diversos. A ausência de laudo pericial assinado por dois peritos não impede que seja reconhecida a materialidade das lesões. Isso porque o art. 158 do CPP prevê, além do exame de corpo de delito direto, o indireto, que pode ser, entre outros, exame da ficha clínica do hospital que atendeu a vítima, fotografias, filmes, atestados. STJ - HABEAS CORPUS: HC 0117725-82.2004.3.00.0000 RJ 2004/0117725-8. B) INCORRETA. A qualificadora “deformidade permanente” do crime de lesão corporal (art. 129, § 2º, IV, do CP) não é afastada por posterior cirurgia estética reparadora que elimine ou minimize a deformidade na vítima. Isso porque, o fato criminoso é valorado no momento de sua consumação, não o afetando providências posteriores, notadamente quando não usuais (pelo risco ou pelo custo, como cirurgia plástica ou de tratamentos prolongados, dolorosos ou geradores do risco de vida) e promovidas a critério exclusivo da vítima. STJ. 6ª Turma. HC 306.677-RJ, Rel. Min. Ericson Maranho (Desembargador convocado do TJ-SP), Rel. para acórdão Min. Nefi Cordeiro, julgado em 19/5/2015 (Info 562). C) CORRETA. O dolo eventual não se compatibiliza com a qualificadora do art. 121, § 2º, IV (traição, emboscada, dissimulação - consideradas qualificadoras de MEIO). É possível haver homicídio qualificado praticado com dolo eventual? ·        No caso das qualificadoras do motivo fútil e/ou torpe: SIM (posição do STJ e do STF) ·        No caso de qualificadoras de meio: NÃO (posição do STF HC 95136/PR) Contextualizando: no caso julgado pela 2ª Turma, o réu foi denunciado pela suposta prática do crime de homicídio qualificado pela surpresa (art. 121, § 2o, IV, CP), e embriaguez ao volante (art. 306 do Código de Trânsito) porque, ao conduzir veículo em alta velocidade e em estado de embriaguez, ultrapassara sinal vermelho e colidira com outro carro, cujo condutor viera a falecer. Entendimento aplicável: para que incida a qualificadora da surpresa é indispensável que fique provado que o agente teve a vontade de surpreender a vítima, impedindo ou dificultando que ela se defendesse. No dolo eventual, o agente não tem essa intenção, considerando que não quer matar a vítima, mas apenas assume o risco de produzir esse resultado. Como o agente não deseja a produção do resultado, ele não direcionou sua vontade para causar surpresa à vítima. Logo, não pode responder por essa circunstância (surpresa). STF. 2ª Turma. HC 111.442/RS, Rel. Min. Gilmar Mendes, julgado em 28/8/2012 (Info 677). STJ. 6ª Turma. REsp o/SP, Rel. Min. Sebastião Reis Júnior, julgado em 05/04/2018. Fonte: Dizer o Direito, Informativo 677 – STF, Márcio André Lopes Cavalcante. https://www.dizerodireito.com.br/2012/10/informativo-esquematizado-677-stf.html De acordo com o informativo 701 do STJ esse item não pode mais ser considerado incorreto (nem tem como afirmar que ele está correto – iria depender do comando da afirmativa – se ela queria conforme entendimento do STF ou do STJ – como o item não especificou, a questão será ANULADA). Para o STF, a qualificadora do art. 121 § 2° inciso IV (traição, emboscada e dissimulação) não é compatível com dolo eventual. Para que incida a qualificadora da surpresa é indispensável que fique provado que o agente teve a vontade de surpreender a vítima, impedindo ou dificultando que ela se defendesse. No caso do dolo eventual, o agente não tem essa intenção, considerando que não quer matar a vítima, mas apenas assume o risco de produzir o resultado. (Informativo 677). Porém, a 5ª Turma do STJ, em 15/06/2021, decidiu em sentido contrário: O dolo eventual no crime de homicídio é compatível com as qualificadoras objetivas previstas no art. 121, § 2º, III e IV, do Código Penal. As referidas qualificadoras serão devidas quando constatado que o autor delas se utilizou dolosamente como meio ou como modo específico mais reprovável para agir e alcançar outro resultado, mesmo sendo previsível e tendo admitido o resultado morte. STJ. 5ª Turma. REsp 1.836.556-PR, Rel. Min. Joel Ilan Paciornik, julgado em 15/06/2021 (Info 701). Em resumo, leve isso para sua prova: No caso do homicídio qualificado pelo motivo fútil e/ou torpe não há divergência dos Tribunais Superiores sobre a possibilidade de serem praticados com dolo eventual. Já no caso de qualificadoras de MEIO (art. 121, § 2º, III e IV, do CP), temos divergência: Conforme decisão mais recente da 5ª Turma do STJ é possível incidir as qualificadoras tanto do inciso III quanto do inciso IV, do art. 121, ao homicídio praticado com dolo eventual, conforme informativo 701 exposto acima. Não é possível para o STF, quanto à qualificadora do inc. IV, do art. 121, do CP, nos termos do informativo 677, exposto acima. Não é possível para a 5ºª Turma do STJ no caso da qualificadora do inciso III, do art. 121: A qualificadora de natureza objetiva prevista no inciso III do § 2º do art. 121 do Código Penal não se compatibiliza com a figura do dolo eventual, pois enquanto a qualificadora sugere a ideia de premeditação, em que se exige do agente um empenho pessoal, por meio da utilização de meio hábil, como forma de garantia do sucesso da execução, tem-se que o agente que age movido pelo dolo eventual não atua de forma direcionada à obtenção de ofensa ao bem jurídico tutelado, embora, com a sua conduta, assuma o risco de produzi-la. STJ. 6ª Turma. EDcl no REsp 1848841/MG, Rel. Min. Nefi Cordeiro, julgado em 2/2/2021. Assim sendo, o candidato deverá ficar muito atento ao enunciado da questão. D) INCORRETA. Não há incompatibilidade entre o dolo eventual e o reconhecimento do meio cruel, na medida em que o dolo do agente, direto ou indireto, não exclui a possibilidade de a prática delitiva envolver o emprego de meio mais reprovável, como veneno, fogo, explosivo, asfixia, tortura ou outro meio insidioso ou cruel (art. 121, § 2º, III, do CP). Caso concreto: réu atropelou o pedestre e não parou o veículo, arrastando a vítima por 500 metros, assumindo, portanto, o risco de produzir o resultado morte; mesmo tendo havido dolo eventual, deve-se reconhecer também a qualificadora do meio cruel prevista no art. 121, § 2º, III, do CP. STJ. 5ª Turma. AgRg no REsp 1573829/SC, Rel. Min. Reynaldo Soares da Fonseca, julgado em 09/04/2019. STJ. 6ª Turma. REsp 1.829.601-PR, Rel. Min. Nefi Cordeiro, julgado em 04/02/2020 (Info 665) E) INCORRETA. A qualificadora do motivo fútil (art. 121, § 2º, II, do CP) é compatível com o homicídio praticado com dolo eventual? SIM. O fato de o réu ter assumido o risco de produzir o resultado morte (dolo eventual), não exclui a possibilidade de o crime ter sido praticado por motivo fútil, uma vez que o dolo do agente, direto ou indireto, não se confunde com o motivo que ensejou a conduta. STJ. 5ª Turma. REsp 912.904/SP, Rel. Min. Laurita Vaz, julgado em 06/03/2012. STJ. 6ª Turma. REsp 1601276/RJ, Rel. Min. Rogerio Schietti Cruz, julgado em 13/06/2017.", "correct": false, "justification": "O gabarito oficial desta questão é a alternativa C. 42 – (ERREI – MARQUEI A LETRA B. MAS O GABARITO É LETRA C) Levando em consideração a disciplina jurisprudencial aplicável aos crimes contra a pessoa, julgue os itens a seguir, assinalando a resposta correta:\nA\n1.27%\nA ausência de laudo pericial impede que seja reconhecida a materialidade do delito de lesão corporal de natureza grave por outros meios.\nB\n3.8%\nA qualificadora “deformidade permanente” do crime de lesão corporal é afastada por posterior cirurgia estética reparadora que elimine ou minimize a deformidade na vítima.\nC\n81.01%\nNo crime de homicídio, dolo eventual não é compatível com a qualificadora da emboscada.\nD\n5.06%\nÉ defeso afirmar que a qualificadora do meio cruel é compatível com o dolo eventual.\nE\n8.86%\nA qualificadora do motivo fútil é incompatível com o homicídio praticado com dolo eventual.\nA) INCORRETA. A materialidade das lesões corporais pode ser atestada por meios diversos.\nA ausência de laudo pericial assinado por dois peritos não impede que seja reconhecida a materialidade das lesões. Isso porque o art. 158 do CPP prevê, além do exame de corpo de delito direto, o indireto, que pode ser, entre outros, exame da ficha clínica do hospital que atendeu a vítima, fotografias, filmes, atestados. STJ - HABEAS CORPUS: HC 0117725-82.2004.3.00.0000 RJ 2004/0117725-8.\nB) INCORRETA. A qualificadora “deformidade permanente” do crime de lesão corporal (art. 129, § 2º, IV, do CP) não é afastada por posterior cirurgia estética reparadora que elimine ou minimize a deformidade na vítima. Isso porque, o fato criminoso é valorado no momento de sua consumação, não o afetando providências posteriores, notadamente quando não usuais (pelo risco ou pelo custo, como cirurgia plástica ou de tratamentos prolongados, dolorosos ou geradores do risco de vida) e promovidas a critério exclusivo da vítima.\nSTJ. 6ª Turma. HC 306.677-RJ, Rel. Min. Ericson Maranho (Desembargador convocado do TJ-SP), Rel. para acórdão Min. Nefi Cordeiro, julgado em 19/5/2015 (Info 562).\nC) CORRETA. O dolo eventual não se compatibiliza com a qualificadora do art. 121, § 2º, IV (traição, emboscada, dissimulação - consideradas qualificadoras de MEIO).\nÉ possível haver homicídio qualificado praticado com dolo eventual?\n·        No caso das qualificadoras do motivo fútil e/ou torpe: SIM (posição do STJ e do STF)\n·        No caso de qualificadoras de meio: NÃO (posição do STF HC 95136/PR)\nContextualizando: no caso julgado pela 2ª Turma, o réu foi denunciado pela suposta prática do crime de homicídio qualificado pela surpresa (art. 121, § 2o, IV, CP), e embriaguez ao volante (art. 306 do Código de Trânsito) porque, ao conduzir veículo em alta velocidade e em estado de embriaguez, ultrapassara sinal vermelho e colidira com outro carro, cujo condutor viera a falecer.\nEntendimento aplicável: para que incida a qualificadora da surpresa é indispensável que fique provado que o agente teve a vontade de surpreender a vítima, impedindo ou dificultando que ela se defendesse. No dolo eventual, o agente não tem essa intenção, considerando que não quer\nmatar a vítima, mas apenas assume o risco de produzir esse resultado. Como o agente não deseja a produção do resultado, ele não direcionou sua vontade para causar surpresa à vítima. Logo, não pode responder por essa circunstância (surpresa).\nSTF. 2ª Turma. HC 111.442/RS, Rel. Min. Gilmar Mendes, julgado em 28/8/2012 (Info 677).\nSTJ. 6ª Turma. REsp o/SP, Rel. Min. Sebastião Reis Júnior,...", "annulled": true, "remark": "ERREI – MARQUEI A LETRA B. MAS O GABARITO É LETRA C"}, {"id": "Q43-A", "qn": 43, "tema": "Homicídio", "type": "mc", "letter": "A", "stem": "Mévio, com aninus necandi, deixa de prestar auxílio a seu colega durante a escalada de uma montanha íngreme e perigosa. Ao negar-se a estender a mão ao colega que havia se desequilibrado, Mévio observa-o cair num precipício e morrer. Sobre a conduta de Mévio, tem-se o seguinte:", "assertion": "estando na posição de garante, responderá por homicídio culposo, uma vez que possuía o dever legal de impedir o resultado.", "correct": false, "justification": "O gabarito oficial desta questão é a alternativa D. 43 – (ERREI – MARQUEI A LETRA A. MAS GABARITO É LETRA D) Mévio, com aninus necandi, deixa de prestar auxílio a seu colega durante a escalada de uma montanha íngreme e perigosa. Ao negar-se a estender a mão ao colega que havia se desequilibrado, Mévio observa-o cair num precipício e morrer. Sobre a conduta de Mévio, tem-se o seguinte:\nAlternativas\nA\nestando na posição de garante, responderá por homicídio culposo, uma vez que possuía o dever legal de impedir o resultado.\nB\nresponderá pelo crime de omissão de socorro, com a pena triplicada pelo resultado morte.\nC\npor haver assumido o risco do resultado morte, responderá pelo crime de homicídio doloso, na espécie dolo eventual.\nD\nresponderá pelo crime de homicídio doloso, posto que desejou diretamente o resultado morte.\nGAB. LETRA D", "annulled": false, "remark": "ERREI – MARQUEI A LETRA A. MAS GABARITO É LETRA D"}, {"id": "Q43-B", "qn": 43, "tema": "Homicídio", "type": "mc", "letter": "B", "stem": "Mévio, com aninus necandi, deixa de prestar auxílio a seu colega durante a escalada de uma montanha íngreme e perigosa. Ao negar-se a estender a mão ao colega que havia se desequilibrado, Mévio observa-o cair num precipício e morrer. Sobre a conduta de Mévio, tem-se o seguinte:", "assertion": "responderá pelo crime de omissão de socorro, com a pena triplicada pelo resultado morte.", "correct": false, "justification": "O gabarito oficial desta questão é a alternativa D. 43 – (ERREI – MARQUEI A LETRA A. MAS GABARITO É LETRA D) Mévio, com aninus necandi, deixa de prestar auxílio a seu colega durante a escalada de uma montanha íngreme e perigosa. Ao negar-se a estender a mão ao colega que havia se desequilibrado, Mévio observa-o cair num precipício e morrer. Sobre a conduta de Mévio, tem-se o seguinte:\nAlternativas\nA\nestando na posição de garante, responderá por homicídio culposo, uma vez que possuía o dever legal de impedir o resultado.\nB\nresponderá pelo crime de omissão de socorro, com a pena triplicada pelo r stro e cárcere privado prevê apenas uma conduta, que é a de privar alguém de sua liberdade.\n\n\nComo exemplos de crimes de ação múltipla temos os de contrabando e descaminho previstos no art. 334 do Código Penal e também o de tráfico de drogas, previsto no art. 33 da Lei nº 11.343/06.\n\n\nA parte final do enunciado da questão, no entanto, está correta, pois a circunstância de a vítima ser menor de dezoito anos é uma das qualificadoras do crime de sequestro e cárcere privado, prevista no inciso IV do parágrafo primeiro do art. 148 do Código Penal.\n\n\nResposta: Errado.", "annulled": false, "remark": null}, {"id": "Q45-A", "qn": 45, "tema": "Homicídio", "type": "mc", "letter": "A", "stem": "Leia o texto a seguir.\n\nPaulo, diante de séria discussão com Pedro, dirigiu-se até a sua residência e, visando causar mal injusto contra este, apanhou uma arma de fogo e, de dentro de seu quintal mas em direção à via pública, efetuou vários disparos contra a pessoa de Pedro. Vale ressaltar que Paulo tinha registro de sua arma de fogo e que Pedro foi socorrido por terceiros e não veio a óbito.\n\nDiante do caso exposto, Paulo responderá pelo crime de", "assertion": "tentativa de homicídio, em concurso material com o crime de disparo de arma de fogo, por força do Art. 69 do Código Penal.", "correct": false, "justification": "O gabarito oficial desta questão é a alternativa C. 45 - Leia o texto a seguir.\n\nPaulo, diante de séria discussão com Pedro, dirigiu-se até a sua residência e, visando causar mal injusto contra este, apanhou uma arma de fogo e, de dentro de seu quintal mas em direção à via pública, efetuou vários disparos contra a pessoa de Pedro. Vale ressaltar que Paulo tinha registro de sua arma de fogo e que Pedro foi socorrido por terceiros e não veio a óbito.\n\nDiante do caso exposto, Paulo responderá pelo crime de\nAlternativas\nA\ntentativa de homicídio, em concurso material com o crime de disparo de arma de fogo, por força do Art. 69 do Código Penal.\nB\ntentativa de homicídio, em concurso formal com o crime de disparo de arma de fogo, por força do Art. 70 do Código Penal.\nC\ntentativa de homicídio, não respondendo pelo crime de disparo de arma de fogo, haja vista que este é crime subsidiário.\nD\ntentativa de homicídio, em continuidade delitiva com o crime de disparo de arma de fogo, por força do Art. 71 do Código Penal.\nE\ndisparo de arma de fogo, não respondendo pela tentativa de homicídio, haja vista que o crime de?nido no Art. 15 da Lei 10.826/2003 tutela a segurança pública.\nA questão em comento pretende avaliar os conhecimentos do candidato a respeito da tipificação da conduta descrita no enunciado.\nConforme se observa da narrativa, Paulo pegou a arma e desferiu os tiros com a nítida intenção de alvejar Pedro, efetuando vários disparos. Pedro foi socorrido e não se consumou o homicídio.\nEm que pese a existência da figura típica do disparo de arma de fogo, constante do art. 15 da Lei 10.826/2003, Paulo não responderá por este delito, pois efetuou disparos na via pública com a finalidade de matar Pedro. Assim, tratando-se o crime de disparo de arma de fogo de crime meio, menos grave, necessário à consumação de seu dolo (matar alguém), resta a conduta absorvida pelo crime mais grave, o homicídio.\nO crime de disparo de arma de fogo é crime subsidiário em relação ao homicídio, pois somente se caracterizaria se o agente não tivesse qualquer intenção com o disparo.\nO crime de disparo de arma de fogo tutela a incolumidade pública e não a segurança pública.\n\nGABARITO: LETRA C", "annulled": false, "remark": null}, {"id": "Q45-B", "qn": 45, "tema": "Homicídio", "type": "mc", "letter": "B", "stem": "Leia o texto a seguir.\n\nPaulo, diante de séria discussão com Pedro, dirigiu-se até a sua residência e, visando causar mal injusto contra este, apanhou uma arma de fogo e, de dentro de seu quintal mas em direção à via pública, efetuou vários disparos contra a pessoa de Pedro. Vale ressaltar que Paulo tinha registro de sua arma de fogo e que Pedro foi socorrido por terceiros e não veio a óbito.\n\nDiante do caso exposto, Paulo responderá pelo crime de", "assertion": "tentativa de homicídio, em concurso formal com o crime de disparo de arma de fogo, por força do Art. 70 do Código Penal.", "correct": false, "justification": "O gabarito oficial desta questão é a alternativa C. 45 - Leia o texto a seguir.\n\nPaulo, diante de séria discussão com Pedro, dirigiu-se até a sua residência e, visando causar mal injusto contra este, apanhou uma arma de fogo e, de dentro de seu quintal mas em direção à via pública, efetuou vários disparos contra a pessoa de Pedro. Vale ressaltar que Paulo tinha registro de sua arma de fogo e que Pedro foi socorrido por terceiros e não veio a óbito.\n\nDiante do caso exposto, Paulo responderá pelo crime de\nAlternativas\nA\ntentativa de homicídio, em concurso material com o crime de disparo de arma de fogo, por força do Art. 69 do Código Penal.\nB\ntentativa de homicídio, em concurso formal com o crime de disparo de arma de fogo, por força do Art. 70 do Código Penal.\nC\ntentativa de homicídio, não respondendo pelo crime de disparo de arma de fogo, haja vista que este é crime subsidiário.\nD\ntentativa de homicídio, em continuidade delitiva com o crime de disparo de arma de fogo, por força do Art. 71 do Código Penal.\nE\ndisparo de arma de fogo, não respondendo pela tentativa de homicídio, haja vista que o crime de?nido no Art. 15 da Lei 10.826/2003 tutela a segurança pública.\nA questão em comento pretende avaliar os conhecimentos do candidato a respeito da tipificação da conduta descrita no enunciado.\nConforme se observa da narrativa, Paulo pegou a arma e desferiu os tiros com a nítida intenção de alvejar Pedro, efetuando vários disparos. Pedro foi socorrido e não se consumou o homicídio.\nEm que pese a existência da figura típica do disparo de arma de fogo, constante do art. 15 da Lei 10.826/2003, Paulo não responderá por este delito, pois efetuou disparos na vi const STORAGE_KEY = 'penal_quiz_bloco4_v1';
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){ console.warn('storage indisponível', e); }
  return { answers:{}, index:0, tema:'all' };
}
function saveState(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch(e){ console.warn('não foi possível salvar', e); }
}

let state = loadState();
let pendingChoice = null; // true/false before confirm

function filteredData(){
  if(state.tema === 'all') return DATA;
  return DATA.filter(d => d.tema === state.tema);
}

function populateTemaSelect(){
  const temas = Array.from(new Set(DATA.map(d=>d.tema))).sort();
  const sel = document.getElementById('temaSelect');
  sel.innerHTML = '';
  const optAll = document.createElement('option');
  optAll.value='all'; optAll.textContent = `Todos os temas (${DATA.length})`;
  sel.appendChild(optAll);
  temas.forEach(t=>{
    const count = DATA.filter(d=>d.tema===t).length;
    const o = document.createElement('option');
    o.value=t; o.textContent = `${t} (${count})`;
    sel.appendChild(o);
  });
  sel.value = state.tema;
  sel.addEventListener('change', ()=>{
    state.tema = sel.value;
    state.index = 0;
    pendingChoice = null;
    saveState();
    render();
  });
}

function currentItem(){
  const list = filteredData();
  if(list.length===0) return null;
  if(state.index >= list.length) state.index = list.length-1;
  if(state.index < 0) state.index = 0;
  return list[state.index];
}

function computeStats(list){
  let correct=0, wrong=0, answered=0;
  list.forEach(it=>{
    const a = state.answers[it.id];
    if(a){
      answered++;
      if(a.correct) correct++; else wrong++;
    }
  });
  const pct = answered>0 ? Math.round((correct/answered)*100) : 0;
  return {correct, wrong, answered, total:list.length, pct};
}

function renderStats(){
  const list = filteredData();
  const s = computeStats(list);
  document.getElementById('statTotal').textContent = s.total;
  document.getElementById('statCorrect').textContent = s.correct;
  document.getElementById('statWrong').textContent = s.wrong;
  document.getElementById('statPct').textContent = s.pct + '%';
  const pct2 = s.total>0 ? Math.round((s.answered/s.total)*100) : 0;
  document.getElementById('progressFill').style.width = pct2 + '%';
}

function renderQuizCard(){
  const card = document.getElementById('quizCard');
  const list = filteredData();
  const it = currentItem();
  if(!it){
    card.innerHTML = '<p>Nenhuma questão neste tema.</p>';
    return;
  }
  const saved = state.answers[it.id];
  const qLabel = it.type === 'mc'
    ? `Questão ${it.qn} · Alternativa ${it.letter}`
    : `Questão ${it.qn} · Certo ou Errado`;

  let html = '';
  html += `<div class="qmeta"><span class="qtag">${qLabel} · ${state.index+1}/${list.length}</span><span class="qtema">${it.tema}</span></div>`;
  if(it.annulled){
    html += `<div class="annulled-note">⚠️ Atenção: a banca anulou esta questão. O gabarito usado aqui é o indicado como referência no material, mas não há posição oficial pacífica.</div>`;
  }
  html += `<div class="stem">${escapeHtml(it.stem)}</div>`;
  if(it.type === 'mc'){
    html += `<div class="assertion-box"><span class="assertion-label">Alternativa ${it.letter}</span>${escapeHtml(it.assertion)}</div>`;
  }

  html += `<div class="vf-row">
    <button class="vf-btn" data-val="true" id="btnTrue" ${saved?'disabled':''}>VERDADEIRO</button>
    <button class="vf-btn" data-val="false" id="btnFalse" ${saved?'disabled':''}>FALSO</button>
  </div>`;

  if(!saved){
    html += `<div class="confirm-row"><button class="btn primary" id="btnConfirm" disabled>Confirmar resposta</button></div>`;
  } else {
    const bannerClass = saved.correct ? 'ok' : 'bad';
    const bannerText = saved.correct ? '✔ Você acertou' : '✘ Você errou';
    html += `<div class="result-banner ${bannerClass}">${bannerText} — a assertiva é <b>${it.correct ? 'VERDADEIRA' : 'FALSA'}</b></div>`;
    html += `<div class="justif"><b>Justificativa:</b><br>${escapeHtml(it.justification)}</div>`;
    if(saved.correct){
      html += `<div class="knew-row"><div class="q">Você acertou sabendo ou no chute?</div>
        <div class="knew-btns">
          <button class="btn ${saved.knew==='sabia'?'chosen':''}" id="btnSabia">Eu sabia</button>
          <button class="btn ${saved.knew==='chute'?'chosen':''}" id="btnChute">Foi chute</button>
        </div></div>`;
    }
  }

  card.innerHTML = html;

  if(!saved){
    const btnTrue = document.getElementById('btnTrue');
    const btnFalse = document.getElementById('btnFalse');
    const btnConfirm = document.getElementById('btnConfirm');
    btnTrue.addEventListener('click', ()=>{ pendingChoice = true; updateVfSelection(); });
    btnFalse.addEventListener('click', ()=>{ pendingChoice = false; updateVfSelection(); });
    btnConfirm.addEventListener('click', ()=> confirmAnswer(it));
    updateVfSelection();
  } else {
    if(saved.correct){
      document.getElementById('btnSabia').addEventListener('click', ()=>{ saved.knew='sabia'; saveState(); renderQuizCard(); });
      document.getElementById('btnChute').addEventListener('click', ()=>{ saved.knew='chute'; saveState(); renderQuizCard(); });
    }
  }
}

function updateVfSelection(){
  const bt = document.getElementById('btnTrue');
  const bf = document.getElementById('btnFalse');
  if(!bt || !bf) return;
  bt.classList.toggle('selected', pendingChoice===true);
  bt.classList.toggle('true', pendingChoice===true);
  bf.classList.toggle('selected', pendingChoice===false);
  bf.classList.toggle('false', pendingChoice===false);
  const btnConfirm = document.getElementById('btnConfirm');
  if(btnConfirm) btnConfirm.disabled = (pendingChoice===null);
}

function confirmAnswer(it){
  if(pendingChoice===null) return;
  const correct = (pendingChoice === it.correct);
  state.answers[it.id] = { chosen: pendingChoice, correct: correct, knew: null };
  pendingChoice = null;
  saveState();
  render();
}

function escapeHtml(s){
  if(!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function render(){
  renderStats();
  renderQuizCard();
}

document.getElementById('btnPrev').addEventListener('click', ()=>{
  pendingChoice=null;
  state.index = Math.max(0, state.index-1);
  saveState(); render();
});
document.getElementById('btnNext').addEventListener('click', ()=>{
  pendingChoice=null;
  const list = filteredData();
  state.index = Math.min(list.length-1, state.index+1);
  saveState(); render();
});

document.getElementById('btnReset').addEventListener('click', ()=>{
  if(confirm('Tem certeza que deseja apagar todo o progresso salvo?')){
    state = { answers:{}, index:0, tema: state.tema };
    saveState(); render();
  }
});

// LIST modal
document.getElementById('btnList').addEventListener('click', ()=>{
  const grid = document.getElementById('gridNums');
  grid.innerHTML = '';
  const list = filteredData();
  list.forEach((it, i)=>{
    const b = document.createElement('button');
    const a = state.answers[it.id];
    b.textContent = it.type==='mc' ? `${it.qn}${it.letter}` : `${it.qn}`;
    if(a) b.classList.add(a.correct ? 'correct' : 'incorrect');
    if(i === state.index) b.classList.add('current');
    b.addEventListener('click', ()=>{
      state.index = i; pendingChoice=null; saveState();
      document.getElementById('listOverlay').classList.remove('open');
      render();
    });
    grid.appendChild(b);
  });
  document.getElementById('listOverlay').classList.add('open');
});
document.getElementById('closeList').addEventListener('click', ()=> document.getElementById('listOverlay').classList.remove('open'));

// REVIEW modal
document.getElementById('btnReview').addEventListener('click', ()=>{
  const errors = [], guess = [], knew = [];
  DATA.forEach(it=>{
    const a = state.answers[it.id];
    if(!a) return;
    const label = it.type==='mc' ? `Questão ${it.qn} · Alternativa ${it.letter}` : `Questão ${it.qn}`;
    if(!a.correct) errors.push({it,label});
    else if(a.knew==='chute') guess.push({it,label});
    else if(a.knew==='sabia') knew.push({it,label});
  });
  fillReviewList('listErrors', errors, 'Nenhum erro registrado ainda.');
  fillReviewList('listGuess', guess, 'Nenhum acerto no chute registrado ainda.');
  fillReviewList('listKnew', knew, 'Nenhum acerto "sabendo" registrado ainda.');
  document.getElementById('reviewOverlay').classList.add('open');
});
function fillReviewList(elId, arr, emptyMsg){
  const ul = document.getElementById(elId);
  ul.innerHTML = '';
  if(arr.length===0){
    ul.innerHTML = `<li class="empty-msg" style="cursor:default;background:none;border:none;">${emptyMsg}</li>`;
    return;
  }
  arr.forEach(({it,label})=>{
    const li = document.createElement('li');
    li.textContent = label + ' — ' + (it.tema);
    li.addEventListener('click', ()=>{
      state.tema = 'all';
      document.getElementById('temaSelect').value='all';
      const list = filteredData();
      const idx = list.findIndex(d=>d.id===it.id);
      state.index = idx>=0?idx:0;
      pendingChoice=null;
      saveState();
      document.getElementById('reviewOverlay').classList.remove('open');
      render();
    });
    ul.appendChild(li);
  });
}
document.getElementById('closeReview').addEventListener('click', ()=> document.getElementById('reviewOverlay').classList.remove('open'));

// DOWNLOAD
document.getElementById('btnDownload').addEventListener('click', ()=>{
  const html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
  const blob = new Blob([html], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'quiz-penal-bloco4.html';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

populateTemaSelect();
render();
</script>
