null}, {"id": "Q17-A", "qn": 17, "tema": "Lesão corporal", "type": "mc", "letter": "A", "stem": "Joseval, no calor de uma discussão com Marinalda, sua namorada, por divergências esportivas, pois torcem para times distintos, desferiu um soco no rosto desta, que resultou em lesão, após o que Marinalda passou a não sentir mais paladar. Assim, Joseval:", "assertion": "deve responder pelo crime de lesão corporal simples.", "correct": false, "justification": "O gabarito oficial desta questão é a alternativa C. 17 - Joseval, no calor de uma discussão com Marinalda, sua namorada, por divergências esportivas, pois torcem para times distintos, desferiu um soco no rosto desta, que resultou em lesão, após o que Marinalda passou a não sentir mais paladar. Assim, Joseval:\nAlternativas\nA\ndeve responder pelo crime de lesão corporal simples.\nB\ndeve responder pelo crime de lesão corporal grave.\nC\ndeve responder pelo crime de lesão corporal gravíssima.\nD\ndeve responder pelo crime de violência doméstica.\nE\nnão deve responder por crime algum, pois a imputabilidade fica excluída pela emoção ou pela paixão.\nA questão requer conhecimento sobre a violência doméstica e a lesão corporal tipificadas pelo Código Penal.\n- A opção A está equivocada porque segundo o enunciado da questão, Marinalda passou a não sentir mais o paladar. Neste sentido, há uma perda de uma função ou sentido, conforme o Artigo 129, parágrafo segundo, do Código Penal. Isto configura uma lesão corporal gravíssima.\n- A opção B também está equivocada tendo em vista que há uma perda de uma função ou sentido (Artigo 129, parágrafo segundo, do Código Penal).\n- A opção D está errada porque a conduta não foi decorrente e nem se aproveitou para ocorrer da circunstância de convivência familiar (Artigo 129, parágrafo nono, do Código Penal).\n- A opção E está errada porque emoção ou paixão não exclui a imputabilidade ( Artigo 28 , I do Código Penal).\n- A opção C está correta segundo o Artigo 129, parágrafo segundo, do Código Penal.\n\nGABARITO DO PROFESSOR: LETRA C.", "annulled": false, "remark": null}, {"id": "Q17-B", "qn": 17, "tema": "Lesão corporal", "type": "mc", "letter": "B", "stem": "Joseval, no calor de uma discussão com Marinalda, sua namorada, por divergências esportivas, pois torcem para times distintos, desferiu um soco no rosto desta, que resultou em lesão, após o que Marinalda passou a não sentir mais paladar. Assim, Joseval:", "assertion": "deve responder pelo crime de lesão corporal grave.", "correct": false, "justification": "O gabarito oficial desta questão é a alternativa C. 17 - Joseval, no calor de uma discussão com Marinalda, sua namorada, por divergências esportivas, pois torcem para times distintos, desferiu um soco no rosto desta, que resultou em lesão, após o que Marinalda passou a não sentir mais paladar. Assim, Joseval:\nAlternativas\nA\ndeve responder pelo crime de lesão corporal simples.\nB\ndeve responder pelo crime de lesão corporal grave.\nC\ndeve responder pelo crime de lesão corporal gravíssima.\nD\ndeve responder pelo crime de violência doméstica.\nE\nnão deve responder por crime algum, pois a imputabilidade fica excluída pela emoção ou pela paixão.\nA questão requer conhecimento sobre a violência doméstica e a lesão corporal tipificadas pelo Código Penal.\n- A opção A está equivocada porque segundo o enunciado da questão, Marinalda passou a não sentir mais o paladar. Neste sentido, há uma perda de uma função ou sentido, conforme o Artigo 129, parágrafo segundo, do Código Penal. Isto configura uma lesão corporal gravíssima.\n- A opção B também está equivocada tendo em vista que há uma perda de uma função ou sentido (Artigo 129, parágrafo segundo, do Código Penal).\n- A opção D está errada porque a conduta não foi decorrente e nem se aproveitou para ocorrer da circunstância de convivência familiar (Artigo 129, parágrafo nono, do Código Penal).\n- A opção E está errada porque emoção ou paixão não exclui a imputabilidade ( Artigo 28 , I do Códig o esse episódio, pode-se afirmar que Crisântemo:", "assertion": "praticou o crime de tentativa de homicídio qualificado pelo motivo torpe, tendo ocorrido aberratio ictus .", "correct": false, "justification": "O gabarito oficial desta questão é a alternativa B. 18 – (ERREU – MARQUEI A LETRA D. MAS GABARITO É LETRA B) Crisântemo não possuía as pernas e utilizava uma cadeira de rodas para se locomover. Em um determinado dia, estando em seu sítio, percebeu quando elementos furtavam frutas em seu pomar. Gritou e pediu insistentemente que se afastassem e fossem embora. Como os elementos continuassem a subtrair-lhe as frutas, efetuou um disparo com sua espingarda, calibre 38, contra os mesmos, tendo o disparo transfixado um deles e lesionado outro que, em razão dos ferimentos, permaneceram quarenta dias internados em um hospital público da cidade. Após restar provado todo esse episódio, pode-se afirmar que Crisântemo:\nAlternativas\nA\npraticou o crime de tentativa de homicídio qualificado pelo motivo torpe, tendo ocorrido aberratio ictus .\nB\npraticou o crime de tentativa de homicídio qualificado pelo motivo fútil, tendo ocorrido aberratio ictus .\nC\nnão praticou crime, pois se utilizou do meio necessário, portanto excluindo a ilicitude.\nD\npraticou o crime de lesão corporal grave consumada, tendo ocorrido aberratio ictus .\nE\npraticou o crime de lesão corporal gravíssima consumada, tendo ocorrido aberratio delicti.\nNo presente caso, ao contrário do que entendeu a banca examinadora, nos termos do gabarito reputo ser o mais correto afirmar que Crisântemo está amparado pela excludente de ilicitude, consubstanciada na legítima defesa, prevista no artigo 25 do Código Penal. Os fatos narrados no enunciado da questão, o que parece, levam à conclusão de que o agente teve a necessidade de disparar sua arma de fogo para que cessasse a lesão ao seu bem jurídico. Está claro, ao meu sentir, que se não fosse efetuado o disparo a injusta agressão iria continuar até os autores definirem o momento de interrompê-la, o que viola frontalmente o ordenamento jurídico. Demais disso, o disparo de um único tiro demonstra também que Crisântemo utilizou moderadamente os meios que lhe eram disponíveis, não havendo que se falar em excesso de legítima defesa. No que toca à proporção entre os bens jurídicos afetados, quais sejam, o patrimônio da vítima e a integridade física dos agressores, é importante ressaltar que o nosso ordenamento penal comum não faz diferença entre legítima defesa justificante (em que há o sacrifício de bem jurídico de menor valor) e legítima defesa exculpante (e que há o sacrifício de bem jurídico de igual ou menor valor), como faz o nosso ordena mento penal militar relativa ao direito penal militar. Ainda que fizesse tal distinção, incidiria a excludente de culpabilidade consubstanciada na inexigibilidade de conduta diversa.\nTodavia, o examinador entendeu que no caso que não incide a excludente de ilicitude nem a excludente de culpabilidade, respondendo o autor do disparo pelo crime de tentativa de homicídio, qualificado pelo motivo fútil, provavelmente por entender que o patrimônio de baixo valor pecuniário não mereça proteção legal. Ainda segundo o gabarito da banca examinadora, ocorreu também o erro no uso dos meios de execução, figura penal conhecida na doutrina como aberratio ictus, que encontra-se disciplinada no artigo 73 do Código Penal que assim dispõe: “Quando, por acidente ou erro no uso dos meios de execução, o agente, ao invés de atingir a pessoa que pretendia ofender, atinge pessoa diversa, responde como se tivesse praticado o crime contra aquela, atendendo-se ao disposto no § 3º do art. 20 deste Código. No caso de ser também atingida a pessoa...", "annulled": false, "remark": "ERREU – MARQUEI A LETRA D. MAS GABARITO É LETRA B"}, {"id": "Q18-B", "qn": 18, "tema": "Homicídio", "type": "mc", "letter": "B", "stem": "Crisântemo não possuía as pernas e utilizava uma cadeira de rodas para se locomover. Em um determinado d sso ordena mento penal militar relativa ao direito penal militar. Ainda que fizesse tal distinção, incidiria a excludente de culpabilidade consubstanciada na inexigibilidade de conduta diversa.\nTodavia, o examinador entendeu que no caso que não incide a excludente de ilicitude nem a excludente de culpabilidade, respondendo o autor do disparo pelo crime de tentativa de homicídio, qualificado pelo motivo fútil, provavelmente por entender que o patrimônio de baixo valor pecuniário não mereça proteção legal. Ainda segundo o gabarito da banca examinadora, ocorreu também o erro no uso dos meios de execução, figura penal conhecida na doutrina como aberratio ictus, que encontra-se disciplinada no artigo 73 do Código Penal que assim dispõe: “Quando, por acidente ou erro no uso dos meios de execução, o agente, ao invés de atingir a pessoa que pretendia ofender, atinge pessoa diversa, responde como se tivesse praticado o crime contra aquela, atendendo-se ao disposto no § 3º do art. 20 deste Código. No caso de ser também atingida a pessoa...", "annulled": false, "remark": "ERREU – MARQUEI A LETRA D. MAS GABARITO É LETRA B"}, {"id": "Q18-E", "qn": 18, "tema": "Homicídio", "type": "mc", "letter": "E", "stem": "Crisântemo não possuía as pernas e utilizava uma cadeira de rodas para se locomover. Em um determinado dia, estando em seu sítio, percebeu quando elementos furtavam frutas em seu pomar. Gritou e pediu insistentemente que se afastassem e fossem embora. Como os elementos continuassem a subtrair-lhe as frutas, efetuou um disparo com sua espingarda, calibre 38, contra os mesmos, tendo o disparo transfixado um deles e lesionado outro que, em razão dos ferimentos, permaneceram quarenta dias internados em um hospital público da cidade. Após restar provado todo esse episódio, pode-se afirmar que Crisântemo:", "assertion": "praticou o crime de lesão corporal gravíssima consumada, tendo ocorrido aberratio delicti. No presente caso, ao contrário do que entendeu a banca examinadora, n utrina (Cezar Roberto Bitencourt, Tratado de Direito Penal) admitem o doente mental como sujeito ativo de crime, ainda que ao final reste isento de pena.\n\n5. Análise das Alternativas Incorretas:\n\nB) Errada. O morto não pode ser sujeito passivo — no vilipêndio a cadáver, protege-se o respeito aos mortos, mas o sujeito passivo é a coletividade e não o cadáver.\n\nC) Errada. Não é possível sujeito ativo e passivo na mesma pessoa no estelionato, pois o seguro visa proteger o patrimônio da seguradora, não do agente.\n\nD) Errada. No autoaborto, a gestante é autora do crime, mas o sujeito passivo é o feto; jamais ela mesma.\n\nE) Errada. O Estado é sempre vítima mediata dos crimes (interesse público), ainda nos crimes de ação penal privada (art. 100, CP).", "annulled": false, "remark": "ERREI – MARQUEI A LETRA A. MAS O GABARITO É LETRA E"}, {"id": "Q19-B", "qn": 19, "tema": "Homicídio", "type": "mc", "letter": "B", "stem": "Acerca da sujeição ativa e passiva da infração penal, assinale a opção correta.", "assertion": "É possível que os mortos figurem como sujeito passivo em determinados crimes, como, por exemplo, no delito de vilipêndio a cadáver.", "correct": false, "justification": "O gabarito oficial desta questão é a alternativa E. 19 – (ERREI – MARQUEI A LETRA A. MAS O GABARITO É LETRA E) Acerca da sujeição ativa e passiva da infração penal, assinale a opção correta.\nAlternativas\nA\nDoentes mentais, desde que maiores de dezoito anos de idade, têm capacidade penal ativa.\nB\nÉ possível que os mortos figurem como sujeito passivo em determinados crimes, como, por exemplo, no delito de vilipêndio a cadáver.\nC\nNo estelionato com fraude para recebimento de seguro, em que o agente se autolesiona no afã de receber prêmio, é possível se concluir que se reúnem, na mesma pessoa, as sujeições ativa e passiva da infração.\nD\nNo crime de autoaborto, a gestante é, ao mesmo tempo e em razão da mesma conduta, autora do crime e sujeito passivo.\nE\nO Estado costuma figurar, constantemente, na sujeição passiva dos crimes, salvo, porém, quando se tratar de delito perquirido por iniciativa exclusiva da vítima, em que não há nenhum interesse estatal, apenas do ofendido.\nAnálise e Comentário da Questão – Sujeição Ativa e Passiva da Infração Penal\n1. Interpretação do Tema: A questão explora a capacidade penal ativa e passiva — quem pode ser sujeito ativo (autor) e sujeito passivo (vítima) dos crimes —, tema fundamental para entender a estrutura do crime, exigência básica no concurso para Delegado de Polícia.\n2. Fundamentação Legal: O Código Penal, art. 26, dispõe sobre a imputabilidade penal, princípio norteador da capacidade penal ativa:\n“Art. 26 - É isento de pena o agente que, por doença mental (...), era, ao tempo da ação ou omissão, inteiramente incapaz de entender o caráter ilícito do fato…”\n3. Explicação Central: Os doentes mentais (maiores de 18 anos) possuem capacidade penal ativa, mas podem eventualmente ser considerados inimputáveis — ou seja, praticam o fato típico e ilícito, mas ficam isentos de pena. Não se nega, portanto, a capacidade de serem autores do crime.\nExemplo prático: Imagine um indivíduo com esquizofrenia, maior de 18 anos, que pratica um homicídio; ele é autor do fato, responde a processo, mas poderá ser inimputável (absolvição imprópria), sujeitando-se a medida de segurança.\n4. Justificativa da Alternativa Correta (A): Correta. A legislação e a doutrina (Cezar Roberto Bitencourt, Tratado de Direito Penal) admitem o doente mental como sujeito ativo de crime, ainda que ao final reste isento de pena.\n5. Análise das Alternativas Incorretas:\nB) Errada. O morto não pode ser sujeito passivo — no vilipêndio a cadáver, protege-se o respeito aos mortos, mas o sujeito passivo é a coletividade e não o cadáver.\nC) Errada. Não é possível sujeito ativo e passivo na mesma pessoa no estelionato, pois o seguro visa proteger o patrimônio da seguradora, não do agente.\nD) Errada. No autoaborto, a gestante é autora do crime, mas o sujeito passivo é o feto; jamais ela mesma.\nE) Errada. O Estado é sempre vítima mediata dos crimes (interesse público), ainda nos crimes de ação penal privada (art. 100, CP).\nDica de Prova: Atenção à pegadinha nas palavras “capacidade penal ativa”, que não se confunde com responsabilidade penal (pena), e à ideia errônea de sujeito passivo em crimes contra cadáver, auto-aborto, ou seguro próprio.\nResumo: Doente mental pode ser sujeito ativo, embora eventualmente inimputável.", "annulled": false, "remark": "ERREI – MARQUEI A LETRA A. MAS O GABARITO É LETRA E"}, {"id": "Q19-C", "qn": 19, "tema": "Homicídio", "type": "mc", "letter": "C", "stem": "Acerca da sujeição ativa e passiva da infração penal, assinale a opção correta.", "assertion": "No estelionato com fraude para recebimento de seguro, em que o agente se autolesiona no afã de receber prêmio, é possível se concluir que se reúnem, na mesma pessoa, as sujeições ativa e passiva da infração.", "correct": false, "justification": "O gabarito oficial desta questão é a alternativa E. 19 – (ERREI – MARQUEI A LETRA A. MAS O GABARITO É LETRA E) Acerca da sujeição ativa e passiva da infração penal, assinale a opção correta.\nAlternativas\nA\nDoentes mentais, desde que maiores de dezoito anos de idade, têm capacidade penal ativa.\nB\nÉ possível que os mortos figurem como sujeito passivo em determinados crimes, como, por exemplo, no delito de vilipêndio a cadáver.\nC\nNo estelionato com fraude para recebimento de seguro, em que o agente se autolesiona no afã de receber prêmio, é possível se concluir que se reúnem, na mesma pessoa, as sujeições ativa e passiva da infração.\nD\nNo crime de autoaborto, a gestante é, ao mesmo tempo e em razão da mesma conduta, autora do crime e sujeito passivo.\nE\nO Estado costuma figurar, constantemente, na sujeição passiva dos crimes, salvo, porém, quando se tratar de delito perquirido por iniciativa exclusiva da vítima, em que não há nenhum interesse estatal, apenas do ofendido.\nAnálise e Comentário da Questão – Sujeição Ativa e Passiva da Infração Penal\n1. Interpretação do Tema: A questão explora a capacidade penal ativa e passiva — quem pode ser sujeito ativo (autor) e sujeito passivo (vítima) dos crimes —, tema fundamental para entender a estrutura do crime, exigência básica no concurso para Delegado de Polícia.\n2. Fundamentação Legal: O Código Penal, art. 26, dispõe sobre a imputabilidade penal, princípio norteador da capacidade penal ativa:\n“Art. 26 - É isento de pena o agente que, por doença mental (...), era, ao tempo da ação ou omissão, inteiramente incapaz de entender o caráter ilícito do fato…”\n3. Explicação Central: Os doentes mentais (maiores de 18 anos) possuem capacidade penal ativa, mas podem eventualmente ser considerados inimputáveis — ou seja, praticam o fato típico e ilícito, mas ficam isentos de pena. Não se nega, portanto, a capacidade de serem autores do crime.\nExemplo prático: Imagine um indivíduo com esquizofrenia, maior de 18 anos, que pratica um homicídio; ele é autor do fato, responde a processo, mas poderá ser inimputável (absolvição imprópria), sujeitando-se a medida de segurança.\n4. Justificativa da Alternativa Correta (A): Correta. A legislação e a doutrina (Cezar Roberto Bitencourt, Tratado de Direito Penal) admitem o doente mental como sujeito ativo de crime, ainda que ao final reste isento de pena.\n5. Análise das Alternativas Incorretas:\nB) Errada. O morto não pode ser sujeito passivo — no vilipêndio a cadáver, protege-se o respeito aos mortos, mas o sujeito passivo é a coletividade e não o cadáver.\nC) Errada. Não é possível sujeito ativo e passivo na mesma pessoa no estelionato, pois o seguro visa proteger o patrimônio da seguradora, não do agente.\nD) Errada. No autoaborto, a gestante é autora do crime, mas o sujeito passivo é o feto; jamais ela mesma.\nE) Errada. O Estado é sempre vítima mediata dos crimes (interesse público), ainda nos crimes de ação penal privada (art. 100, CP).\nDica de Prova: At cia básica no concurso para Delegado de Polícia.\n2. Fundamentação Legal: O Código Penal, art. 26, dispõe sobre a imputabilidade penal, princípio norteador da capacidade penal ativa:\n“Art. 26 - É isento de pena o agente que, por doença mental (...), era, ao tempo da ação ou omissão, inteiramente incapaz de entender o caráter ilícito do fato…”\n3. Explicação Central: Os doentes mentais (maiores de 18 anos) possuem capacidade penal ativa, mas podem eventualmente ser considerados inimputáveis — ou seja, praticam o fato típico e ilícito, mas ficam isentos de pena. Não se nega, portanto, a capacidade de serem autores do crime.\nExemplo prático: Imagine um indivíduo com esquizofrenia, maior de 18 anos, que pratica um homicídio; ele é autor do fato, responde a processo, mas poderá ser inimputável (absolvição imprópria), sujeitando-se a medida de segurança.\n4. Justificativa da Alternativa Correta (A): Correta. A legislação e a doutrina (Cezar Roberto Bitencourt, Tratado de Direito Penal) admitem o doente mental como sujeito ativo de crime, ainda que ao final reste isento de pena.\n5. Análise das Alternativas Incorretas:\nB) Errada. O morto não pode ser sujeito passivo — no vilipêndio a cadáver, protege-se o respeito aos mortos, mas o sujeito passivo é a coletividade e não o cadáver.\nC) Errada. Não é possível sujeito ativo e passivo na mesma pessoa no estelionato, pois o seguro visa proteger o patrimônio da seguradora, não do agente.\nD) Errada. No autoaborto, a gestante é autora do crime, mas o sujeito passivo é o feto; jamais ela mesma.\nE) Errada. O Estado é sempre vítima mediata dos crimes (interesse público), ainda nos crimes de ação penal privada (art. 100, CP).\nDica de Prova: Atenção à pegadinha nas palavras “capacidade penal ativa”, que não se confunde com responsabilidade penal (pena), e à ideia errônea de sujeito passivo em crimes contra cadáver, auto-aborto, ou seguro próprio.\nResumo: Doente mental pode ser sujeito ativo, embora eventualmente inimputável.", "annulled": false, "remark": "ERREI – MARQUEI A LETRA A. MAS O GABARITO É LETRA E"}, {"id": "Q19-E", "qn": 19, "tema": "Homicídio", "type": "mc", "letter": "E", "stem": "Acerca da sujeição ativa e passiva da infração penal, assinale a opção correta.", "assertion": "O Estado costuma figurar, constantemente, na sujeição passiva dos crimes, salvo, porém, quando se tratar de delito perquirido por iniciativa exclusiva da vítima, em que não há nenhum interesse estatal, apenas do ofendido. Análise e Comentário da Questão – Sujeição Ativa e Passiva da Infração Penal 1. Interpretação do Tema: A questão explora a capacidade penal ativa e passiva — quem pode ser sujeito ativo (autor) e sujeito passivo (vítima) dos crimes —, tema fundamental para entender a estrutura do crime, exigência básica no concurso para Delegado de Polícia. 2. Fundamentação Legal: O Código Penal, art. 26, dispõe sobre a imputabilidade penal, princípio norteador da capacidade penal ativa: “Art. 26 - É isento de pena o agente que, por doença mental (...), era, ao tempo da ação ou omissão, inteiramente incapaz de entender o caráter ilícito do fato…” 3. Explicação Central: Os doentes mentais (maiores de 18 anos) possuem capacidade penal ativa, mas podem eventualmente ser considerados inimputáveis — ou seja, praticam o fato típico e ilícito, mas ficam isentos de pena. Não se nega, portanto, a capacidade de serem autores do crime. Exemplo prático: Imagine um indivíduo com esquizofrenia, maior de 18 anos, que pratica um homicídio; ele é autor do fato, responde a processo, mas poderá ser inimputável (absolvição imprópria), sujeitando-se a medida de segurança. 4. Justificativa da Alternativa Correta (A): Correta. A legislação e a doutrina (Cezar Roberto Bitencourt, Tratado de Direito Penal) admitem o doente mental como sujeito ativo de crime, ainda que ao final reste isento de pena. 5. Análise das Alternativas Incorretas: B) Errada. O morto não pode ser sujeito passivo — no vilipêndio a cadáver, protege-se o respeito aos mortos, mas o sujeito passivo é a coletividade e não o cadáver. C) Errada. Não é possível sujeito ativo e passivo na mesma pessoa no estelionato, pois o seguro visa proteger o patrimônio da seguradora, não do agente. D) Errada. No autoaborto, a gestante é autora do crime, mas o sujeito passivo é o feto; jamais ela mesma. E) Errada. O Estado é sempre vítima mediata dos crimes (interesse público), ainda nos crimes de ação penal privada (art. 100, CP). Dica de Prova: Atenção à pegadinha nas palavras “capacidade penal ativa”, que não se confunde com responsabilidade penal (pena), e à ideia errônea de sujeito passivo em crimes contra cadáver, auto-aborto, ou seguro próprio. Resumo: Doente mental pode ser sujeito ativo, embora eventualmente inimputável. Gostou do comentário? Deixe sua avaliação aqui embaixo!", "correct": true, "justification": "O gabarito oficial desta questão é a alternativa E. 19 – (ERREI – MARQUEI A LETRA A. MAS O GABARITO É LETRA E) Acerca da sujeição ativa e passiva da infração penal, assinale a opção correta.\nAlternativas\nA\nDoentes mentais, desde que maiores de dezoito anos de idade, têm capacidade penal ativa.\nB\nÉ possível que os mortos figurem como sujeito passivo em determinados crimes, como, por exemplo, no delito de vilipêndio a cadáver.\nC\nNo estelionato com fraude para recebimento de seguro, em que o agente se autolesiona no afã de receber prêmio, é possível se concluir que se reúnem, na mesma pessoa, as sujeições ativa e passiva da infração.\nD\nNo crime de autoaborto, a gestante é, ao mesmo tempo e em razão da mesma conduta, autora do crime e sujeito passivo.\nE\nO Estado costuma figurar, constantemente, na sujeição passiva dos crimes, salvo, porém, quando se tratar de delito perquirido por iniciativa exclusiva da vítima, em que não há nenhum interesse estatal, apenas do ofendido.\nAnálise e Comentário da Questão – Sujeição Ativa e Passiva da Infração Penal\n1. Interpretação do Tema: A questão explora a capacidade penal ativa Brasileiro, marque a opção verdadeira.\nAlternativas\nA\nO homicídio híbrido ocorre sempre que reunimos em um mesmo fato uma pluralidade de vítimas e de circunstâncias qualificadoras de natureza subjetiva.\nB\nO chamado pacto de morte, ou seja, quando duas ou mais pessoas reúnem-se para praticar o suicídio jamais pode gerar a responsabilidade criminal de alguém, mesmo que haja sobreviventes e um deles tenha praticado os atos executórios.\nC\nO aborto praticado em feto que não tinha viabilidade de vida é plenamente permitido pela legislação penal brasileira, configurando uma das hipóteses supralegais de estado de necessidade e é conhecido como aborto eugênico ou eugenésico.\nD\nO emprego de veneno nem sempre poderá ser considerado como qualificadora, pois isso dependerá de ele ser utilizado por meio insidioso ou cruel.\nInterpretação e legislação aplicável:\nEsta questão aborda Crimes contra a Vida, especialmente as qualificadoras do homicídio previstas no Código Penal Brasileiro, art. 121, com foco na utilização de veneno como meio qualificativo (art. 121, § 2º, III).\nCitação legal relevante:\nCódigo Penal, Art. 121, § 2º, III: \"Se o homicídio é cometido: III - com emprego de veneno, fogo, explosivo, asfixia, tortura ou outro meio insidioso ou cruel, ou de que possa resultar perigo comum: Pena - reclusão, de doze a trinta anos.\"\nTema central e exemplo prático:\nO ponto-chave está em compreender que nem todo emprego de veneno qualifica o homicídio: somente configura qualificadora quando o veneno for utilizado de modo insidioso ou cruel. Por exemplo, um homicídio por envenenamento sorrateiro (colocando veneno na bebida da vítima sem seu conhecimento) caracteriza a qualificadora pela surpresa insidiosa.\nAnálise da alternativa correta (D):\nA alternativa D está correta pois traduz exatamente o entendimento legal e doutrinário: o emprego de veneno só será qualificadora se envolver meio insidioso ou cruel – não basta simples uso do veneno. Este é o entendimento doutrinário de Rogério Greco (\"Curso de Direito Penal\"), e também da jurisprudência, conforme o STF (HC 307.617/SP), que afirma expressamente a necessidade do caráter insidioso.\nAnálise das alternativas incorretas:\nA) Errada: \"Homicídio híbrido\" não é conceito reconhecido no CP. Além disso, pluralidade de vítimas caracteriza crime plurissubjetivo, não híbrido, e as qualificadoras não se restringem às subjetivas.\nB) Errada: No pacto de morte, se alguém instiga, induz ou auxilia outrem ao suicídio e este sobrevive, configura crime nos termos do art. 122 do CP.\nC) Errada: O aborto eugênico (quando o feto é inviável) não tem previsão legal no Brasil, sendo regra geral a ilicitude, salvo as hipóteses previstas em lei (art. 128, CP).\nDicas e pegadinhas:\nA questão explora o conhecimento detalhado do texto legal e exige atenção à expressão \"poderá ser considerado\" e à exigência do meio insidioso ou cruel – pegadinha comum na diferenciação entre qualificadoras e causas de aumento.\nConclusão:\nDomine a literalidade do art. 121, §2º, III, e os conceitos de insídia/crueldade para resolver questões similares.", "annulled": false, "remark": "ERREI – MARQUEI LETRA A. MAS O GABARITO É LETRA D"}, {"id": "Q21-B", "qn": 21, "tema": "Homicídio", "type": "mc", "letter": "B", "stem": "Considerando os crimes contra a pessoa, previstos no Código Penal Brasileiro, marque a opção verdadeira.", "assertion": "O chamado pacto de morte, ou seja, quando duas ou mais pessoas reúnem-se para praticar o suicídio jamais pode gerar a responsabilidade criminal de alguém, mesmo que haja sobreviventes e um deles tenha praticado os atos executórios.", "correct": false, "justification": "O gabarito oficial desta questão é a alternativa D. 21 – (ERREI – MARQUEI LETRA A. MAS O GABARITO É LETRA D) Considerando os crimes contra a pessoa, previstos no Código Penal Brasileiro, marque a opção verdadeira.\nAlternativas\nA\nO homicídio híbrido ocorre sempre que reunimos em um mesmo fato uma pluralidade de vítimas e de circunstâncias qualificadoras de natureza subjetiva.\nB\nO chamado pacto de morte, ou seja, quando duas ou mais pessoas reúnem-se para praticar o suicídio jamais pode gerar a responsabilidade criminal de alguém, mesmo que haja sobreviventes e um deles tenha praticado os atos executórios.\nC\nO aborto praticado em feto que não tinha viabilidade de vida é plenamente permitido pela legislação penal brasileira, configurando uma das hipóteses supralegais de estado de necessidade e é conhecido como aborto eugênico ou eugenésico.\nD\nO emprego de veneno nem sempre poderá ser considerado como qualificadora, pois isso dependerá de ele ser utilizado por meio insidioso ou cruel.\nInterpretação e legislação aplicável:\nEsta questão aborda Crimes contra a Vida, especialmente as qualificadoras do homicídio previstas no Código Penal Brasileiro, art. 121, com foco na utilização de veneno como meio qualificativo (art. 121, § 2º, III).\nCitação legal relevante:\nCódigo Penal, Art. 121, § 2º, III: \"Se o homicídio é cometido: III - com emprego de veneno, fogo, explosivo, asfixia, tortura ou outro meio insidioso ou cruel, ou de que possa resultar perigo comum: Pena - reclusão, de doze a trinta anos.\"\nTema central e exemplo prático:\nO ponto-chave está em compreender que nem todo emprego de veneno qualifica o homicídio: somente configura qualificadora quando o veneno for utilizado de modo insidioso ou cruel. Por exemplo, um homicídio por envenenamento sorrateiro (colocando veneno na bebida da vítima sem seu conhecimento) caracteriza a qualificadora pela surpresa insidiosa.\nAnálise da alternativa correta (D):\nA alternativa D está correta pois traduz exatamente o entendimento legal e doutrinário: o emprego de veneno só será qualificadora se envolver meio insidioso ou cruel – não basta simples uso do veneno. Este é o entendimento doutrinário de Rogério Greco (\"Curso de Direito Penal\"), e também da jurisprudência, conforme o STF (HC 307.617/SP), que afirma expressamente a necessidade do caráter insidioso.\nAnálise das alternativas incorretas:\nA) Errada: \"Homicídio híbrido\" não é conceito reconhecido no CP. Além disso, pluralidade de vítimas caracteriza crime plurissubjetivo, não híbrido, e as qualificadoras não se restringem às subjetivas.\nB) Errada: No pacto de morte, se alguém instiga, induz ou auxilia outrem ao suicídio e este sobrevive, configura crime nos termos do art. 122 do CP.\nC) Errada: O aborto eugênico (quando o feto é inviável) não tem previsão legal no Brasil, sendo regra geral a ilicitude, salvo as hipóteses previstas em lei (art. 128, CP).\nDicas e pegadinhas:\nA questão explora o conhecimento detalhado do texto legal e exige atenção à expressão \"poderá ser considerado\" e à exigência do meio insidioso ou cruel – pegadinha comum na diferenciação entre qualificadoras e causas de aumento.\nConclusão:\nDomine a literalidade do art. 121, §2º, III, e os conceitos de insídia/crueldade para resolver questões similares.", "annulled": false, "remark": "ERREI – MARQUEI LETRA A. MAS O GABARITO É LETRA D"}, {"id": "Q21-C", "qn": 21, "tema": "Homicídio", "type": "mc", "letter": "C", "stem": "Considerando os crimes contra a pessoa, previstos no Código Penal Brasileiro, marque a opção verdadeira.", "assertion": "O aborto praticado em feto que não tinha viabilidade de vida é plenamente permitido pela legislação penal brasileira, configurando uma das hipóteses supralegais de estado de necessidade e é conhecido como aborto eugênico ou eugenésico.", "correct": false, "justification": "O gabarito oficial desta questão é a alternativa D. 21 – (ERREI – MARQUEI LETRA A. MAS O GABARITO É LETRA D) Considerando os crimes contra a pessoa, previstos no Código Penal Brasileiro, marque a opção verdadeira.\nAlternativas\nA\nO homicídio híbrido ocorre sempre que reunimos em um mesmo fato uma pluralidade de vítimas e de circunstâncias qualificadoras de natureza subjetiva.\nB\nO chamado pacto de morte, ou seja, quando duas ou mais pessoas reúnem- Análise das alternativas incorretas:\nA) Errada: \"Homicídio híbrido\" não é conceito reconhecido no CP. Além disso, pluralidade de vítimas caracteriza crime plurissubjetivo, não híbrido, e as qualificadoras não se restringem às subjetivas.\nB) Errada: No pacto de morte, se alguém instiga, induz ou auxilia outrem ao suicídio e este sobrevive, configura crime nos termos do art. 122 do CP.\nC) Errada: O aborto eugênico (quando o feto é inviável) não tem previsão legal no Brasil, sendo regra geral a ilicitude, salvo as hipóteses previstas em lei (art. 128, CP).\nDicas e pegadinhas:\nA questão explora o conhecimento detalhado do texto legal e exige atenção à expressão \"poderá ser considerado\" e à exigência do meio insidioso ou cruel – pegadinha comum na diferenciação entre qualificadoras e causas de aumento.\nConclusão:\nDomine a literalidade do art. 121, §2º, III, e os conceitos de insídia/crueldade para resolver questões similares.", "annulled": false, "remark": "ERREI – MARQUEI LETRA A. MAS O GABARITO É LETRA D"}, {"id": "Q22", "qn": 22, "tema": "Crimes hediondos", "type": "ce", "letter": null, "stem": "Relativamente ao tráfico ilícito e uso indevido de substâncias entorpecentes e aos crimes hediondos, julgue o item a seguir.", "assertion": null, "correct": false, "justification": "22 - Relativamente ao tráfico ilícito e uso indevido de substâncias entorpecentes e aos crimes hediondos, julgue o item a seguir.\nConsidere a seguinte situação hipotética.\nLucas, sob o domínio de violenta emoção, logo em seguida a injusta provocação de seu desafeto, efetuou, de surpresa, disparos de revólver pelas costas da vítima, matando-a.\nNessa situação, Lucas responderá pela prática do crime de homicídio privilegiado-qualificado, que é hediondo.\nA alternativa correta é: E - errado.\nVamos entender o porquê:\nPara resolver essa questão, é importante conhecer alguns conceitos fundamentais do Direito Penal, especificamente sobre homicídio privilegiado-qualificado e crimes hediondos.\nPrimeiramente, vamos diferenciar o homicídio privilegiado e homicídio qualificado:\nHomicídio Privilegiado: Previsto no art. 121, §1º do Código Penal, ocorre quando o agente comete o crime impelido por relevante valor moral ou social, ou sob o domínio de violenta emoção, logo em seguida a injusta provocação da vítima. A pena é reduzida.\nHomicídio Qualificado: Previsto no art. 121, §2º do Código Penal, ocorre em situações como motivo torpe, futilidade, meio cruel, entre outros. A pena é aumentada, e é considerado um crime hediondo.\nNa situação hipotética apresentada, Lucas cometeu o homicídio sob o domínio de violenta emoção, logo em seguida a uma injusta provocação. Isso caracteriza o homicídio privilegiado.\nEntretanto, ele também efetuou disparos de revólver pelas costas da vítima, de surpresa, o que pode ser enquadrado como uma qualificadora (emboscada, por exemplo).\nO ponto chave aqui é entender que, segundo a Lei dos Crimes Hediondos (Lei nº 8.072/1990), o homicídio simples qualificado é considerado hediondo. Porém, o homicídio privilegiado-qualificado não é. Isso significa que, mesmo com a combinação de um privilégio e uma qualificadora, o crime não se enquadra como hediondo.\nPortanto, a assertiva que diz que Lucas responderá pela prática do crime de homicídio privilegiado-qualificado, que é hediondo, está errada.\nConclusão: Lucas responderá por homicídio privilegiado-qualificado, mas esse tipo específico de homicídio não é considerado hediondo pela legislação vigente.", "annulled": false, "remark": null}, {"id": "Q23", "qn": 23, "tema": "Lesão corporal", "type": "ce", "letter": null, "stem": "Acerca dos crimes contra a pessoa, julgue o item seguinte.", "assertion": null, "correct": true, "justification": "23 - Acerca dos crimes contra a pessoa, julgue o item seguinte.\nConsidere a seguinte situação hipotética.\nDurante um entrevero, Carlos desferiu um golpe de facão contra a mão de seu contentor, que veio a perder dois dedos.\nNessa situação, Carlos praticou o crime de lesão corporal de natureza grave, por resultar debilidade permanente de membro.\nGabarito: C (Certo)\nAnálise do Tema e Legislação Aplicável\nO tema da questão trata dos crimes contra a pessoa, especificamente lesão corporal tipificada no Código Penal.\nDe acordo com o art. 129, § 1º, III, do Código Penal:\n“Se resulta: III – debilidade permanente de membro, sentido ou função: Pena – reclusão, de um a cinco anos.”\nInterpretação e Fundamentação\nNessa hipótese, após golpe de facão, a vítima perdeu dois dedos da mão. Dedo é considerado “membro” para fins penais, pois integra o conjunto anatômico da mão. A perda de dedos constitui debilidade permanente de membro, pois compromete de forma definitiva a função e integridade desse órgão.\nSegundo Reinaldo Daniel Moreira, “a debilidade se verifica sempre que a vítima perde permanente e consideravelmente, embora não totalmente, a função de órgão ou membro”.\nJurisprudência\nConforme entendimento pacificado, mesmo que apenas parte do membro seja atingida (exemplo: perda de alguns dedos), configura-se a lesão de natureza grave (TJDFT - Acórdão n.498558).\nExemplo Prático\nSe João, após uma briga, perde três dedos do pé, sua capacidade de andar é afetada de modo permanente, tratando-se de debilidade de membro.\nJustificativa da Alternativa Correta\nA assertiva está correta, pois a conduta de Carlos resultou em debilidade permanente de membro (perda dos dedos), caracterizando lesão corporal de natureza grave, e não gravíssima, conforme o dispositivo legal citado.\nPegadinhas e Orientações\nFique atento ao termo “membro” — muitos candidatos confundem perda de parte dele (como dedos) com lesão gravíssima ou simples. Lembre que, para ser gravíssima, seria necessário, por exemplo, perda de função ou inutilização do membro como um todo ou deformidade permanente do rosto.\nDica prática de prova: Sempre relacione a consequência da lesão (perda parcial x total, órgão x membro) ao tipo penal correspondente.", "annulled": false, "remark": null}, {"id": "Q24", "qn": 24, "tema": "Aborto", "type": "ce", "letter": null, "stem": "Na gravidez molar, configura-se crime de aborto o emprego, pela gestante, de meios abortivos que resultem na expulsão da mola.", "assertion": null, "correct": false, "justification": "24 - Na gravidez molar, configura-se crime de aborto o emprego, pela gestante, de meios abortivos que resultem na expulsão da mola.\nVamos analisar a questão, que discute a configuração de crime de aborto em caso de gravidez molar.\n**Interpretação do Enunciado:**\nA questão trata dos crimes contra a vida, especificamente sobre a possibilidade de se configurar o crime de aborto em uma situação de gravidez molar. O tema está inserido no contexto dos crimes contra a pessoa previstos no Código Penal Brasileiro.\n**Legislação Aplicável:**\nO crime de aborto está previsto nos artigos 124 a 128 do Código Penal Brasileiro. No entanto, é essencial compreender o que caracteriza o aborto e a diferença com a gravidez molar.\n**Explicação do Tema:**\nA gravidez molar é uma condição anômala em que ocorre uma degeneração do tecido placentário, resultando na formação de uma mola hidatiforme, e não em um embrião viável. Portanto, não há vida intrauterina a ser protegida, o que é fundamental para a configuração do crime de aborto.\n**Exemplo Prático:**\nImagine que uma mulher descobre ter uma gravidez molar e, com orientação médica, realiza um procedimento para remover o tecido anômalo. Nesse caso, não há a configuração de aborto, pois não existe um feto ou embrião para ser protegido.\n**Justificação da Alternativa Correta (E - errado):**\nA afirmação de que o emprego de meios abortivos na gravidez molar configura crime de aborto está errada. O crime de aborto pressupõe a interrupção dolosa de uma gravidez viável, o que não ocorre em uma gravidez molar, já que não há vida intrauterina a ser protegida.\n**Pegadinha no Enunciado:**\nUma possível pegadinha é a confusão entre a interrupção de uma gravidez molar e um aborto típico. A chave para evitar essa confusão é lembrar que a proteção jurídica do crime de aborto é destinada à vida do feto, o que não se aplica à gravidez molar.", "annulled": false, "remark": null}, {"id": "Q25", "qn": 25, "tema": "Constrangimento ilegal / Ameaça", "type": "ce", "letter": null, "stem": "No item a seguir, é apresentada uma situação hipotética, seguida de uma assertiva a ser julgada com base no direito penal.\nTrês criminosos interceptaram um carro forte e dominaram os seguranças, reduzindo-lhes por completo qualquer possibilidade de resistência, mediante grave ameaça e emprego de armamento de elevado calibre. O grupo, entretanto, encontrou vazio o cofre do veículo, pois, por erro de estratégia, efetuara a abordagem depois que os valores e documentos já haviam sido deixados na agência bancária. Por fim, os criminosos acabaram fugindo sem nada subtrair. Nessa situação, ante a inexistência de valores no veículo e ante a ausência de subtração de bens, elementos constitutivos dos delitos patrimoniais, ficou descaracterizado o delito de roubo, subsistindo apenas o crime de constrangimento ilegal qualificado pelo concurso de pessoas e emprego de armas.", "assertion": null, "correct": false, "justification": "25 – No item a seguir, é apresentada uma situação hipotética, seguida de uma assertiva a ser julgada com base no direito penal.\nTrês criminosos interceptaram um carro forte e dominaram os seguranças, reduzindo-lhes por completo qualquer possibilidade de resistência, mediante grave ameaça e emprego de armamento de elevado calibre. O grupo, entretanto, encontrou vazio o cofre do veículo, pois, por erro de estratégia, efetuara a abordagem depois que os valores e documentos já haviam sido deixados na agência bancária. Por fim, os criminosos acabaram fugindo sem nada subtrair. Nessa situação, ante a inexistência de valores no veículo e ante a ausência de subtração de bens, elementos constitutivos dos delitos patrimoniais, ficou descaracterizado o delito de roubo, subsistindo apenas o crime de constrangimento ilegal qualificado pelo concurso de pessoas e emprego de armas.\nCom vistas a responder à questão, impõe-se a análise da assertiva nela contida, de modo a se verificar se está ou não correta.\nOs dados do enunciado da questão permitem inferir que o objetivo dos criminosos era o de subtrair os valores que estariam no carro forte. No entanto, também fica claro da leitura do enunciado que os valores não foram subtraídos pelos meliantes por motivos alheios a sua vontade, ocorrendo, portanto, o delito de roubo majorado, na modalidade tentada (art. 157, §2º, I, II, III, c/c o art. 14, II, ambos do Código Penal).\nA ausência dos valores visados pelos meliantes no local esperado não configura a impropriedade absoluta do objeto, senão relativa, de modo a não caracterizar a ocorrência de crime impossível, persistindo, portanto, o crime na modalidade tentada, nos termos já explicitados. É que o nosso Código Penal adotou, no âmbito da tentativa, a teoria objetiva temperada. De acordo com essa teoria, apenas há crime impossível quando a impropriedade do meio for absoluta. No caso, como visto no parágrafo anterior, a impropriedade do meio foi relativa, meramente acidental - pois em regra  no carro forte em circulação há sempre valores acautelados -, e não absoluta.\nDiante dessas considerações, extrai-se que a proposição contida na questão está equivocada.\nGabarito do professor: Errado", "annulled": false, "remark": null}, {"id": "Q26", "qn": 26, "tema": "Homicídio", "type": "ce", "letter": null, "stem": "Francisco, maior e capaz, em razão de desavenças decorrentes de disputa de terras, planeja matar seu desafeto Paulo, também maior e capaz. Após analisar detidamente a rotina de Paulo, Francisco aguarda pelo momento oportuno para efetivar seu plano.", "assertion": null, "correct": true, "justification": "26 - Francisco, maior e capaz, em razão de desavenças decorrentes de disputa de terras, planeja matar seu desafeto Paulo, também maior e capaz. Após analisar detidamente a rotina de Paulo, Francisco aguarda pelo momento oportuno para efetivar seu plano.\nA partir dessa situação hipotética e de assuntos a ela correlatos, julgue o item seguinte.\nSe Francisco atacar Paulo utilizando-se de uma emboscada, isto é, se ocultar e aguardar a vítima desprevenida para atacá-la, a ação de Francisco, nessa hipótese, caracterizará uma forma de premeditação.\nGab: CERTO\n1 - Premeditação – não é qualificadora por si só.\n2 - Homicídio premeditado é considerado qualificado?\nR: Premeditação não constitui circunstância qualificadora do homicídio (deve ser considerada pelo juiz na fixação da pena base).\n3 - Comentário do nobre colega Orion da questão anterior:\n\"A premeditação não seria causa de aumento de pena, mas uma qualificadora, caso o agente tenha praticado o crime por traição, emboscada, dissimulação, ou outro recurso que dificulte ou impossibilite a defesa do ofendido.\"\n\"Se Francisco atacar Paulo utilizando-se de uma emboscada...\" Logo, estamos diante de premeditação.", "annulled": false, "remark": null}, {"id": "Q27", "qn": 27, "tema": "Homicídio", "type": "ce", "letter": null, "stem": "Francisco, maior e capaz, em razão de desavenças decorrentes de disputa de terras, planeja matar seu desafeto Paulo, também maior e capaz. Após analisar detidamente a rotina de Paulo, Francisco aguarda pelo momento oportuno para efetivar seu plano.", "assertion": null, "correct": true, "justification": "27 - Francisco, maior e capaz, em razão de desavenças decorrentes de disputa de terras, planeja matar seu desafeto Paulo, também maior e capaz. Após analisar detidamente a rotina de Paulo, Francisco aguarda pelo momento oportuno para efetivar seu plano.\nA partir dessa situação hipotética e de assuntos a ela correlatos, julgue o item seguinte.\nCaso Francisco mate Paulo com o emprego de veneno, haverá, nessa hipótese, a possibilidade da coexistência desse tipo de homicídio com o homicídio praticado por motivo de relevante valor moral, ainda que haja premeditação.\nDe acordo com a doutrina majoritária e a jurisprudência dominante no STJ, é possível  a incidência da causa de diminuição de pena ao crime de homicídio (artigo 121, § 1º, do Código Penal) em concomitância com a incidência de qualificadora. Entretanto, para que isso ocorra, faz-se necessário que a qualificadora seja uma circunstância de caráter objetivo - como se dá, por exemplo, quando o meio é insidioso ou cruel - e relativa ao modo de execução do crime, a fim de se compatibilizar com as circunstâncias legais do privilégio que são todas de ordem subjetiva (motivos de relevante valor social ou moral e quando o delito for cometido sob o domínio de violenta emoção).\nNão se admite a configuração do homicídio qualificado-privilegiado quando as qualificadoras forem subjetivas, como, por exemplo, quando o crime for cometido por motivo torpe, motivo fútil ou praticado a fim de assegurar a execução, a ocultação, a impunidade ou vantagem de outro crime. Sendo assim, de acordo com a doutrina e a jurisprudência majoritárias, a qualificadora do motivo fútil não é compatível com a figura privilegiada do homicídio.\nNo caso da questão, embora o texto associado pareça não se referir a motivo de relevante valor moral (disputa de terras), o cerne da questão, extraído da leitura do item a ser analisado, diz respeito à possibilidade de incidência, nos crimes de homicídio (artigo 121 do Código Penal), de qualificadora (artigo 121, § 2º, do Código Penal) e de \"privilegiadora\" (artigo 121, § 1º, do Código Penal ).\nNesses termos, a afirmação contida neste item está respaldada pela doutrina e pela jurisprudência.\nGabarito do professor: (Certo)", "annulled": false, "remark": null}, {"id": "Q28", "qn": 28, "tema": "Homicídio", "type": "ce", "letter": null, "stem": "Francisco, maior e capaz, em razão de desavenças decorrentes de disputa de terras, planeja matar seu desafeto Paulo, também maior e capaz. Após analisar detidamente a rotina de Paulo, Francisco aguarda pelo momento oportuno para efetivar seu plano.", "assertion": null, "correct": false, "justification": "28 – (ERREI – MARQUEI CERTO . MAS GABARITO É ERRADO) Francisco, maior e capaz, em razão de desavenças decorrentes de disputa de terras, planeja matar seu desafeto Paulo, também maior e capaz. Após analisar detidamente a rotina de Paulo, Francisco aguarda pelo momento oportuno para efetivar seu plano.\nA partir dessa situação hipotética e de assuntos a ela correlatos, julgue o item seguinte.\nCaso o delito ocorra pouco tempo depois da motivação e do planejamento do crime, a premeditação poderá ser considerada uma qualificadora do delito de homicídio.\nA questão requer conhecimento sobre as qualificadoras do crime de homicídio. De acordo com nosso ordenamento jurídico, a premeditação somente será entendida como qualificadora quando o homicídio for cometido por emboscada, traição, dissimulação ou outro recurso que dificulte ou impossibilite a defesa da vítima. Neste sentido, a situação hipotética está incorreta.\nGABARITO DO PROFESSOR: ERRADO.", "annulled": false, "remark": "ERREI – MARQUEI CERTO . MAS GABARITO É ERRADO"}, {"id": "Q29", "qn": 29, "tema": "Interceptação telefônica", "type": "ce", "letter": null, "stem": "Com referência à interceptação de comunicação telefônica, ao crime de tráfico ilícito de entorpecentes, ao crime de lavagem de capitais e a crimes cibernéticos, julgue o seguinte item.", "assertion": null, "correct": false, "justification": "29 – Com referência à interceptação de comunicação telefônica, ao crime de tráfico ilícito de entorpecentes, ao crime de lavagem de capitais e a crimes cibernéticos, julgue o seguinte item.\nSituação hipotética: Um hacker invadiu os computadores do SERPRO e transferiu valores do Ministério do Planejamento para o seu próprio nome. Assertiva: Nessa situação, o IP para apurar a autoria e a materialidade do crime de invasão de dispositivo informático só poderá ser instaurado após representação formalizada pelo Ministério do Planejamento ou pelo SERPRO.\nA conduta descrita no enunciado da questão se subsume ao tipo penal previsto no artigo 154 - A do Código Penal, que assim dispõe: \"Invadir dispositivo informático alheio, conectado ou não à rede de computadores, mediante violação indevida de mecanismo de segurança e com o fim de obter, adulterar ou destruir dados ou informações sem autorização expressa ou tácita do titular do dispositivo ou instalar vulnerabilidades para obter vantagem ilícita: Pena - detenção, de 3 (três) meses a 1 (um) ano, e multa\".\nO crime foi, conforme narrado, praticado em detrimento da administração pública direta (União). Por consequência, o crime praticado é de ação penal pública, aplicando-se ao caso o disposto no artigo 154 - B do Código Penal, ou seja, a ação penal prescinde de representação do ofendido, senão vejamos: \"Nos crimes definidos no art. 154-A, somente se procede mediante representação, salvo se o crime é cometido contra a administração pública direta ou indireta de qualquer dos Poderes da União, Estados, Distrito Federal ou Municípios ou contra empresas concessionárias de serviços públicos\".\nSendo assim, a assertiva contida na questão é falsa.\nGabarito do professor: Errado", "annulled": false, "remark": null}, {"id": "Q30-A", "qn": 30, "tema": "Constrangimento ilegal / Ameaça", "type": "mc", "letter": "A", "stem": "No que concerne ao crime de constrangimento ilegal (CP, art. 146), é correto afirmar que", "assertion": "se tipifica o crime, apenas, pela ação violenta, não havendo previsão legal para punição por mera grave ameaça.", "correct": false, "justification": "O gabarito oficial desta questão é a alternativa E. 30 – No que concerne ao crime de constrangimento ilegal (CP, art. 146), é correto afirmar que\nAlternativas\nA\nse tipifica o crime, apenas, pela ação violenta, não havendo previsão legal para punição por mera grave ameaça.\nB\nqualifica o tipo a concorrência de 3 (três) ou mais agentes.\nC\ntipifica o crime a coação exercida para impedir suicídio, o que se explica pelo fato de o suicídio não ser penalmente relevante.\nD\ntipifica o crime a intervenção médica ou cirúrgica, sem o consentimento do paciente ou de seu representante legal, mesmo se justificada por iminente perigo de vida.\nE\nse consuma quando a vítima, sem norma legal que a obrigue a tanto, faz ou deixa de fazer, cedendo à determinação do agente.\nGabarito E\nA. se tipifica o crime, apenas, pela ação violenta, não havendo previsão legal para punição por mera grave ameaça. Errado.\nCP. Art. 146 - Constranger alguém, mediante violência ou grave ameaça, ou depois de lhe haver reduzido, por qualquer outro meio, a capacidade de resistência, a não fazer o que a lei permite, ou a fazer o que ela não manda:\nB. qualifica o tipo a concorrência de 3 (três) ou mais agentes. Errado.\nÉ causa de aumento de pena e são necessárias mais de 3 pessoas, portanto “4 ou mais”.\nCP. Art. 146 - § 1º - As penas aplicam-se cumulativamente e em dobro, quando, para a execução do crime, se reúnem mais de três pessoas, ou há emprego de armas.\nC. tipifica o crime a coação exercida para impedir suicídio, o que se explica pelo fato de o suicídio não ser penalmente relevante. Errado.\nCP. Art. 146 – § 3º - Não se compreendem na disposição deste artigo: II - a coação exercida para impedir suicídio.\nD. tipifica o crime a intervenção médica ou cirúrgica, sem o consentimento do paciente ou de seu representante legal, mesmo se justificada por iminente perigo de vida. Errado\nCP. Art. 146 – § 3º - Não se compreendem na disposição deste artigo: I - a intervenção médica ou cirúrgica, sem o consentimento do paciente ou de seu representante legal, se justificada por iminente perigo de vida;\nE. se consuma quando a vítima, sem norma legal que a obrigue a tanto, faz ou deixa de fazer, cedendo à determinação do agente. Certo.\nNesse sentido, Rogério Sanches Cunha:\n“Consuma-se o crime no momento em que a vítima, constrangida, faz ou deixa de fazer algo (ainda que parcialmente) contrário à sua vontade, obedecendo, assim, o que imposto pelo agente.\nA tentativa é perfeitamente possível (crime plurissubsistente), como no exemplo da vítima que, compelida violentamente a fazer algo, não cede à vontade do agente.”\n(Rogério Sanches Cunha - Manual de Direito Penal - Parte Especial, JusPODIVM, 9ª edição, 2017)", "annulled": false, "remark": null}, {"id": "Q30-B", "qn": 30, "tema": "Constrangimento ilegal / Ameaça", "type": "mc", "letter": "B", "stem": "No que concerne ao crime de constrangimento ilegal (CP, art. 146), é correto afirmar que", "assertion": "qualifica o tipo a concorrência de 3 (três) ou mais agentes.", "correct": false, "justification": "O gabarito oficial desta questão é a alternativa E. 30 – No que concerne ao crime de constrangimento ilegal (CP, art. 146), é correto afirmar que\nAlternativas\nA\nse tipifica o crime, apenas, pela ação violenta, não havendo previsão legal para punição por mera grave ameaça.\nB\nqualifica o tipo a concorrência de 3 (três) ou mais agentes.\nC\ntipifica o crime a coação exercida para impedir suicídio, o que se explica pelo fato de o suicídio não ser penalmente relevante.\nD\ntipifica o crime a intervenção médica ou cirúrgica, sem o consentimento do paciente ou de seu representante legal, mesmo se justificada por iminente perigo de vida.\nE\nse consuma quando a vítima, sem norma legal que a obrigue a tanto, faz ou deixa de fazer, cedendo à determinação do agente.\nGabarito E\nA. se tipifica o crime, apenas, pela ação violenta, não havendo previsão legal para punição por mera grave ameaça. Errado.\nCP. Art. 146 - Constranger alguém, mediante violência ou grave ameaça, ou depois de lhe haver reduzido, por qualquer outro meio, a capacidade de resistência, a não fazer o que a lei permite, ou a fazer o que ela não manda:\nB. qualifica o tipo a concorrência de 3 (três) ou mais agentes. Errado.\nÉ causa de aumento de pena e são necessárias mais de 3 pessoas, portanto “4 ou mais”.\nCP. Art. 146 - § 1º - As penas aplicam-se cumulativamente e em dobro, quando, para a execução do crime, se reúnem mais de três pessoas, ou há emprego de armas.\nC. tipifica o crime a coação exercida para impedir suicídio, o que se explica pelo fato de o suicídio não ser penalmente relevante. Errado.\nCP. Art. 146 – § 3º - Não se compreendem na disposição deste artigo: II - a coação exercida para impedir suicídio.\nD. tipifica o crime a intervenção médica ou cirúrgica, sem o consentimento do paciente ou de seu representante legal, mesmo se justificada por iminente perigo de vida. Errado\nCP. Art. 146 – § 3º - Não se compreendem na disposição deste artigo: I - a intervenção médica ou cirúrgica, sem o consentimento do paciente ou de seu representante legal, se justificada por iminente perigo de vida;\nE. se consuma quando a vítima, sem norma legal que a obrigue a tanto, faz ou deixa de fazer, cedendo à determinação do agente. Certo.\nNesse sentido, Rogério Sanches Cunha:\n“Consuma-se o crime no momento em que a vítima, constrangida, faz ou deixa de fazer algo (ainda que parcialmente) contrário à sua vontade, obedecendo, assim, o que imposto pelo agente.\nA tentativa é perfeitamente possível (crime plurissubsistente), como no exemplo da vítima que, compelida violentamente a fazer algo, não cede à vontade do agente.”\n(Rogério Sanches Cunha - Manual de Direito Penal - Parte Especial, JusPODIVM, 9ª edição, 2017)", "annulled": false, "remark": null}, {"id": "Q30-C", "qn": 30, "tema": "Constrangimento ilegal / Ameaça", "type": "mc", "letter": "C", "stem": "No que concerne ao crime de constrangimento ilegal (CP, art. 146), é correto afirmar que", "assertion": "tipifica o crime a coação exercida para impedir suicídio, o que se explica pelo fato de o suicídio não ser penalmente relevante.", "correct": false, "justification": "O gabarito oficial desta questão é a alternativa E. 30 – No que concerne ao crime de constrangimento ile nidade ou o decoro, mas o legislador pátrio entendeu que o juiz pode deixar de aplicar a pena, quando o ofendido, de forma reprovável, provocou diretamente a injúria ou no caso de retorsão imediata, que consista em outra injúria.\nE\nCaso o crime contra a honra tenha como vítima um funcionário público, em razão de suas funções, a pena será aumentada.\nItem (A) - O crime de calúnia encontra-se tipificado no artigo 138, do Código Penal, que assim dispõe: \"Caluniar alguém, imputando-lhe falsamente fato definido como crime\". De acordo com o § 2º, do artigo 138, do Código Penal, \"é punível a calúnia contra os mortos\". A assertiva contida neste item é verdadeira.\nItem (B) - Configura o delito de difamação a conduta de \"difamar alguém, imputando-lhe fato ofensivo à sua reputação\", nos exatos termos do artigo 139, do Código Penal. A exceção da verdade é admitida no caso do crime de difamação, como previsto no parágrafo único do dispositivo citado, exclusivamente na hipótese em que \"...o ofendido é funcionário público e a ofensa é relativa ao exercício de suas funções\". Portanto, a afirmação contida neste item está equivocada.\nItem (C) - A exceção da verdade não é admitida, dentre outras hipóteses, quando o fato criminoso for da ação penal privada e o ofendido não foi condenado por sentença irrecorrível, conforme dispõe o inciso I, do parágrafo único, do artigo 138 do Código Penal. Sendo assim, esta alternativa está correta.\nItem (D) - O crime de injúria, nos termos do artigo 140, do Código Penal, consiste em \"injuriar alguém, ofendendo-lhe a dignidade ou o decoro\". Por sua vez, conforme prevê o artigo 140, §1º, incisos I e II, do mesmo diploma legal, o juiz poderá deixar de aplicar a pena quando o ofendido, de forma reprovável, provocou diretamente a injúria ou no caso de retorsão imediata que consista em outra injúria. A alternativa contida neste item está correta.\nItem (E) - Consubstancia causa de aumento de pena, prevista no inciso II, do artigo 141, II, os crimes contra a honra praticados contra funcionário público em razão de suas funções. Desta feita, a afirmativa contida neste item está correta.\nGabarito do professor: (B)", "annulled": false, "remark": null}, {"id": "Q31-B", "qn": 31, "tema": "Crimes contra a honra", "type": "mc", "letter": "B", "stem": "No que diz respeito aos crimes contra a honra, marque a alternativa INCORRETA.", "assertion": "É crime difamar alguém, imputando-lhe fato ofensivo à sua reputação. Em relação ao crime de difamação não cabe exceção da verdade.", "correct": true, "justification": "O gabarito oficial desta questão é a alternativa B. 31 – No que diz respeito aos crimes contra a honra, marque a alternativa INCORRETA.\nAlternativas\nA\nCaluniar alguém, imputando-lhe falsamente fato definido como crime, sendo também punível a calúnia contra os mortos.\nB\nÉ crime difamar alguém, imputando-lhe fato ofensivo à sua reputação. Em relação ao crime de difamação não cabe exceção da verdade.\nC\nO autor da calúnia pode interpor a exceção da verdade, mas esta não será aceita, caso em algumas situações, entre elas se, constituindo o fato imputado crime de ação privada, o ofendido não foi condenado por sentença irrecorrível.\nD\nÉ crime injuriar alguém, ofendendo-lhe a dignidade ou o decoro, mas o legislador pátrio entendeu que o juiz pode deixar de aplicar a pena, quando o ofendido, de forma reprovável, provocou diretamente a injúria ou no caso de retorsão imediata, que consista em outra injúria.\nE\nCaso o crime contra a honra tenha como vítima um funcionário público, em razão de suas funções, a pena será aumentada.\nItem (A) - O crime de calúnia encontra-se tipificado no artigo 138, do Código Penal, que assim dispõe: \"Caluniar alguém, imputando-lhe falsamente fato definido como crime\". De acordo com o § 2º, do artigo 138, do Código Penal, \"é punível a calúnia contra os mortos\". A assertiva contida neste item é verdadeira.\nItem (B) - Configura o delito de difamação a conduta de \"difamar al e retorsão imediata que consista em outra injúria. A alternativa contida neste item está correta. Item (E) - Consubstancia causa de aumento de pena, prevista no inciso II, do artigo 141, II, os crimes contra a honra praticados contra funcionário público em razão de suas funções. Desta feita, a afirmativa contida neste item está correta.", "correct": false, "justification": "O gabarito oficial desta questão é a alternativa B. 31 – No que diz respeito aos crimes contra a honra, marque a alternativa INCORRETA.\nAlternativas\nA\nCaluniar alguém, imputando-lhe falsamente fato definido como crime, sendo também punível a calúnia contra os mortos.\nB\nÉ crime difamar alguém, imputando-lhe fato ofensivo à sua reputação. Em relação ao crime de difamação não cabe exceção da verdade.\nC\nO autor da calúnia pode interpor a exceção da verdade, mas esta não será aceita, caso em algumas situações, entre elas se, constituindo o fato imputado crime de ação privada, o ofendido não foi condenado por sentença irrecorrível.\nD\nÉ crime injuriar alguém, ofendendo-lhe a dignidade ou o decoro, mas o legislador pátrio entendeu que o juiz pode deixar de aplicar a pena, quando o ofendido, de forma reprovável, provocou diretamente a injúria ou no caso de retorsão imediata, que consista em outra injúria.\nE\nCaso o crime contra a honra tenha como vítima um funcionário público, em razão de suas funções, a pena será aumentada.\nItem (A) - O crime de calúnia encontra-se tipificado no artigo 138, do Código Penal, que assim dispõe: \"Caluniar alguém, imputando-lhe falsamente fato definido como crime\". De acordo com o § 2º, do artigo 138, do Código Penal, \"é punível a calúnia contra os mortos\". A assertiva contida neste item é verdadeira.\nItem (B) - Configura o delito de difamação a conduta de \"difamar alguém, imputando-lhe fato ofensivo à sua reputação\", nos exatos termos do artigo 139, do Código Penal. A exceção da verdade é admitida no caso do crime de difamação, como previsto no parágrafo ún as\nA\nViriato amordaça Gezilda, para que ela não grite por socorro. Em seguida, pratica conjunção carnal com ela, sem perceber que a vítima está se engasgando devido à mordaça utilizada por ele. Gezilda, que é maior de idade e capaz, morre sufocada. Viriato deverá responder por estupro e homicídio culposo, em concurso material.\nB\nZezão aborda a vítima Vitinha, maior de idade e capaz, em via pública, arrasta-a para um terreno abandonado. Ao perceber que será estuprada, Vitinha entra em luta corporal com Zezão e acaba sendo morta, porque Zezão efetuou um disparo, empregando uma arma de fogo que levava consigo. Em seguida, Zezão realiza atos sexuais com Vitinha. Nessa hipótese, Zezão responderá tão somente pelos crimes de estupro e homicídio qualificado, em concurso material.\nC\nBeraldo aborda a vítima Zequinha, 11 anos de idade, em via pública, levando-o para um edifício em construção, oferecendo a ele dinheiro e doces, para que fizesse sexo oral em Beraldo. Após o ato, com medo de ser identificado, Beraldo mata Zequinha com uma pedrada na cabeça. Beraldo deverá responder pelo crime de estupro de vulnerável, qualificado pela morte de Zequinha.\nD\nTiburcio, imputável, tio de Adalgisa, 09 anos de idade, em uma ocasião em que foi visitar a irmã, mãe da menor, aproveitou-se de um momento em que esteve sozinho com Adalgisa, tirou a roupa da menina, pedindo que fizesse poses sensuais, fotografando-a em tal condição. No mesmo dia, porém, mais tarde, oferecendo a ela doces, fez com que praticasse sexo oral nele. Tibúrcio responderá pela prática de estupro de vulnerável, em concurso material com o crime previsto no artigo 240 do Estatuto da Criança e do Adolescente, ambos os delitos em suas formas majoradas pela condição de ser tio da menor.\nE\nTyrapele, cirurgião plástico, anestesiou a paciente Suzi, 25 anos e, em seguida, praticou ato libidinoso diverso da conjunção carnal com ela, aproveitando-se de que Suzi estava inconsciente e sem condições de oferecer resistência. Nesse caso, praticou o crime denominado violação sexual mediante fraude.\nItem (A) - A conduta praticada por Viriato corresponde a de crime de estupro qualificado pela morte, uma vez que a conduta do agente foi dolosa no que tange à conjunção carnal mediante o emprego da violência e culposa em relação do resultado morte. Se Viriato tivesse estuprado Gezilda e a tivesse matado intencionalmente a fim de assegurar a sua impunidade, responderia em concurso material  por estupro e homicídio qualificado. Victor Eduardo Rios Gonçalves, em sua obra Direito Penal Esquematizado, Parte Especial, traz, como exemplo, um caso que corresponde exatamente à hipótese trazida neste item, senão vejamos: \"Se o sujeito amordaça a vítima para evitar que ela grite por socorro e, ao estuprá-la, não percebe que ela está se engasgando com o pano, de modo que ela acaba morrendo por sufocação, responde por estupro qualificado, porque, nesse caso, a morte foi uma decorrência culposa de sua conduta. Por essa razão, o estupro qualificado não é julgado pelo Tribunal do Júri, e sim pelo juízo singular\". Com efeito, a assertiva contida no presente item está equivocada.\nItem (B) - Zezão praticou três condutas delitivas em concurso material, quais sejam: tentativa de estupro (uma vez que não conseguiu sucesso em razão da resistência da vítima); homicídio qualificado (pois matou...", "annulled": false, "remark": null}, {"id": "Q32-B", "qn": 32, "tema": "Crimes contra a liberdade / dignidade sexual", "type": "mc", "letter": "B", "stem": "Analise as seguintes situações hipotéticas, e assinale a alternativa correta.", "assertion": "Zezão aborda a vítima Vitinha, maior de idade e capaz, em via pública, arrasta-a para um terreno abandonado. Ao perceber que será estuprada, Vitinha entra em luta corporal com Zezão e acaba sendo morta, porque Zezão efetuou um disparo, empregando uma arma de fogo que levava consigo. Em seguida, Zezão realiza atos sexuais com Vitinha. Nessa hipótese, Zezão responderá tão some Item (B) - Zezão praticou três condutas delitivas em concurso material, quais sejam: tentativa de estupro (uma vez que não conseguiu sucesso em razão da resistência da vítima); homicídio qualificado (pois matou...", "annulled": false, "remark": null}, {"id": "Q32-E", "qn": 32, "tema": "Crimes contra a liberdade / dignidade sexual", "type": "mc", "letter": "E", "stem": "Analise as seguintes situações hipotéticas, e assinale a alternativa correta.", "assertion": "Tyrapele, cirurgião plástico, anestesiou a paciente Suzi, 25 anos e, em seguida, praticou ato libidinoso diverso da conjunção carnal com ela, aproveitando-se de que Suzi estava inconsciente e sem condições de oferecer resistência. Nesse caso, praticou o crime denominado violação sexual mediante fraude. Item (A) - A conduta praticada por Viriato corresponde a de crime de estupro qualificado pela morte, uma vez que a conduta do agente foi dolosa no que tange à conjunção carnal mediante o emprego da violência e culposa em relação do resultado morte. Se Viriato tivesse estuprado Gezilda e a tivesse matado intencionalmente a fim de assegurar a sua impunidade, responderia em concurso material  por estupro e homicídio qualificado. Victor Eduardo Rios Gonçalves, em sua obra Direito Penal Esquematizado, Parte Especial, traz, como exemplo, um caso que corresponde exatamente à hipótese trazida neste item, senão vejamos: \"Se o sujeito amordaça a vítima para evitar que ela grite por socorro e, ao estuprá-la, não percebe que ela está se engasgando com o pano, de modo que ela acaba morrendo por sufocação, responde por estupro qualificado, porque, nesse caso, a morte foi uma decorrência culposa de sua conduta. Por essa razão, o estupro qualificado não é julgado pelo Tribunal do Júri, e sim pelo juízo singular\". Com efeito, a assertiva contida no presente item está equivocada. Item (B) - Zezão praticou três condutas delitivas em concurso material, quais sejam: tentativa de estupro (uma vez que não conseguiu sucesso em razão da resistência da vítima); homicídio qualificado (pois matou a vítima com o intuito de assegurar a prática do crime que se seguirá, nos termos do artigo 121, § 2º, inciso, V, do Código Penal) e o crime de vilipêndio de cadáver, uma vez que realizou atos sexuais com o cadáver da vítima. Diante dessas considerações, tem-se que a assertiva contida neste item está equivocada. Item (C) - Na esteira da análise feita no item (A) da presente questão, Beraldo responderá pelo crime de estupro de vulnerável, em concurso formal com o crime de homicídio qualificado por ter sido praticado com o intuito de assegurar a impunidade do crime de estupro de vulnerável. O crime de estupro qualificado pelo resultado morte só se configura quando o mencionado resultado ocorre sem a intenção do agente, ou seja, quando ocorre o denominado preterdolo: dolo no crime antecedente e culpa no resultado consequente. Sendo assim, a afirmação contida neste item está errada. Item (D) - A primeira conduta praticada por Tibúrcio subsume-se de modo perfeito ao tipo penal do artigo 240 da Lei nº 8.069/90 (Estatuto da Criança e do Adolescente), qual seja: \"Produzir, reproduzir, dirigir, fotografar, filmar ou registrar, por qualquer meio, cena de sexo explícito ou pornográfica, envolvendo criança ou adolescente\", com a incidência da causa de aumento de pena contida no § 2º, inciso III, do dispositivo legal em referência. Na sequência, o agente cometeu, em concurso material com o primeiro delito, o crime de estupro de vulnerável, tipificado no artigo 217-A, do Código Penal. Também quanto a esse segundo crime incide a majorante decorrente da condição do agente ser tio da vítima, nos termos do artigo 226, inciso II, do Código Penal. Com efeito, a assertiva contida neste item está correta. Item (E) - A conduta descrita neste item corresponde ao crime de estupro de vulnerável, uma vez que o agente retirou da vítima, mediante a aplicação de anestésico, qualquer possibilidade de oferecer resistência, conforme se depreende da leitura do artigo 217-A, § 1º, do Código Penal. Sendo assim, assertiva contida neste item está incorreta.", "correct": false, "justification": "O gabarito oficial desta questão é a alternativa D. 32 – Analise as seguintes situações hipotéticas, e assinale a alternativa correta.\nAlternativas\nA\nViriato amordaça Gezilda, para que ela não grite por socorro. Em seguida, pratica conjunção carnal com ela, sem perceber que a vítima está se engasgando devido à mordaça utilizada por ele. Gezilda, que é maior de idade e capaz, morre sufocada. Viriato deverá responder por estupro e homicídio culposo, em concurso material.\nB\nZezão aborda a vítima Vitinha, maior de idade e capaz, em via pública, arrasta-a para um terreno abandonado. Ao perceber que será estuprada, Vitinha entra em luta corporal com Zezão e acaba sendo morta, porque Zezão efetuou um disparo, empregando uma arma de fogo que levava consigo. Em seguida, Zezão realiza atos sexuais com Vitinha. Nessa hipótese, Zezão responderá tão somente pelos crimes de estupro e homicídio qualificado, em concurso material.\nC\nBeraldo aborda a vítima Zequinha, 11 anos de idade, em via pública, levando-o para um edifício em construção, oferecendo a ele dinheiro e doces, para que fizesse sexo oral em Beraldo. Após o ato, com medo de ser identificado, Beraldo mata Zequinha com uma pedrada na cabeça. Beraldo deverá responder pelo crime de estupro de vulnerável, qualificado pela morte de Zequinha.\nD\nTiburcio, imputável, tio de Adalgisa, 09 anos de idade, em uma ocasião em que foi visitar a irmã, mãe da menor, aproveitou-se de um momento em que esteve sozinho com Adalgisa, tirou a roupa da menina, pedindo que fizesse poses sensuais, fotografando-a em tal condição. No mesmo dia, porém, mais tarde, oferecendo a ela doces, fez com que praticasse sexo oral nele. Tibúrcio responderá pela prática de estupro de vulnerável, em concurso material com o crime previsto no artigo 240 do Estatuto da Criança e do Adolescente, ambos os delitos em suas formas majoradas pela condição de ser tio da menor.\nE\nTyrapele, cirurgião plástico, anestesiou a paciente Suzi, 25 anos e, em seguida, praticou ato libidinoso diverso da conjunção carnal com ela, aproveitando-se de que Suzi estava inconsciente e sem condições de oferecer resistência. Nesse caso, praticou o crime denominado violação sexual mediante fraude.\nItem (A) - A conduta praticada por Viriato corresponde a de crime de estupro qualificado pela morte, uma vez que a conduta do agente foi dolosa no que tange à conjunção carnal mediante o emprego da violência e culposa em relação do resultado morte. Se Viriato tivesse estuprado Gezilda e a tivesse matado intencionalmente a fim de assegurar a sua impunidade, responderia em concurso material  por estupro e homicídio qualificado. Victor Eduardo Rios Gonçalves, em sua obra Direito Penal Esquematizado, Parte Especial, traz, como exemplo, um caso que corresponde exatamente à hipótese trazida neste item, senão vejamos: \"Se o sujeito amordaça a vítima para evitar que ela grite por socorro e, ao estuprá-la, não percebe que ela está se engasgando com o pano, de modo que ela acaba morrendo por sufocação, responde por estupro qualificado, porque, nesse caso, a morte foi uma decorrência culposa de sua conduta. Por essa razão, o estupro qualificado não é julgado pelo Tribunal do Júri, e sim pelo juízo singular\". Com efeito, a assertiva contida no presente item está equivocada.\nItem (B) - Zezão praticou três condutas delitivas em concurso material, quais sejam: tentativa de estupro (uma vez que não conseguiu sucesso em razão da resistência da vítima); homicídio qualificado (pois matou...", "annulled": false, "remark": null}, {"id": "Q33-A", "qn": 33, "tema": "Homicídio", "type": "mc", "letter": "A", "stem": "Segundo Busato (2014), \"o homicídio é uma violação do bem jurídico vida como tal considerado a partir do nascimento\". E para Hungria (1959), esse crime constitui \"a mais chocante violação do senso moral médio da humanidade civilizada\".", "assertion": "É caracterizada como homicídio a morte de feto atingido por disparo de arma de fogo, quando ainda no ventre da mãe.", "correct": false, "justification": "O gabarito oficial desta questão é a alternativa D. 33 – Segundo Busato (2014), \"o homicídio é uma violação do bem jurídico vida como tal considerado a partir do nascimento\". E para Hungria (1959), esse crime constitui \"a mais chocante violação do senso moral médio da humanidade civilizada\".\nBUSATO. Paulo César. Direito Penal: parte especial, l.ed. São Paulo: Atlas, 2014, p. 19. HUNGRIA, Nelson. Comentários ao código penal. 4.ed. Rio de Janeiro: Forense, 1959, p. 25.\nO Código Penal Brasileiro, em seu artigo 121, apresenta três modalidades de tipos penais de ação homicida, em que os elementos que o compõem podem ou não aparecer conjugados. Acerca das modalidades do crime de homicídio, variantes e caracterização, assinale a alternativa correta.\nAlternativas\nA\nÉ caracterizada como homicídio a morte de feto atingido por disparo de arma de fogo, quando ainda no ventre da mãe.\nB\nO infanticídio é modalidade do homicídio qualificado pelo resultado, quando a mãe mata o próprio filho logo após o parto, sob a influência do estado puerperal, cuja pena é agravada.\nC\nO latrocínio, por se tratar de espécie complexa de homicídio qualificado previsto no artigo 121 do Código Penal, não é julgado pelo Tribunal do Júri por envolver questões patrimoniais.\nD\nA eutanásia, ou o homicídio piedoso, é reconhecida como conduta praticada por relevante valor moral, caracterizadora do homicídio privilegiado.\nE\nO homicídio pode ser considerado qualificado /privilegiado quando praticado por relevante valor moral motivado por vingança.\nA questão cobrou conhecimentos acerca dos crimes contra a vida.\n\nA – Errada. O homicídio é caracterizado pela eliminação da vida extrauterina.  A morte do feto, ainda no útero da mãe (vida intrauterina),  caracteriza o crime de aborto (art. 124 a 126, CP).\n\nB – Errada.  O infanticídio, segundo Fernando Capez, “Trata-se de uma espécie de homicídio doloso privilegiado, cujo privilegium é concedido em virtude da “influência do estado puerperal\" sob o qual se encontra a parturiente\".\n\nC – Errada. O latrocínio é um crime de roubo qualificado pela morte previsto no art. 157, § 3º, 2ª parte, do Código Penal e não um crime de homicídios (art. 121, CP).. O latrocínio é um crime complexo, ou seja, é formado por outros dois delitos (roubo + homicídio). Apesar de sua estrutura ser composta por dois outros crimes, o latrocínio é um delito autônomo e distinto dos delitos que o compõe e está inserido no capítulo dos crimes contra o patrimônio. “A competência para o processo e julgamento de latrocínio é do juiz singular e não do tribunal do júri\" (Súmula 603 do Supremo Tribunal Federal).\n\nD – Correta. Conforme o item 39 da exposição de motivos do Código Penal  estabelece que por motivo de relevante valor social ou moral, “o projeto entende significar o motivo que, em si mesmo, é aprovado pela moral prática, como, por exemplo, a compaixão ante o irremediável sofrimento da vítima (caso do homicídio eutanásico) (...)\".\n\nE – Errada. É possível que o homicídio seja qualificado e privilegiado ao mesmo tempo. Contudo, é necessário que a qualificadora seja de ordem objetiva para que seja compatível com o privilegio que é de ordem subjetiva. Assim, não há compatibilidade entre o privilégio de relevante valor moral (ordem subjetiva) com a qualificadora por motivo de vingança (de ordem subjetiva).\nGabarito, letra D.", "annulled": false, "remark": null}, {"id": "Q33-B", "qn": 33, "tema": "Homicídio", "type": "mc", "letter": "B", "stem": "Segundo Busato (2014), \"o homicídio é uma violação do bem jurídico vida como tal considerado a partir do nascimento\". E para Hungria (1959), esse crime constitui \"a mais chocante violação do senso moral médio da humanidade civilizada\".", "assertion": "O infanticídio é modalidade do
