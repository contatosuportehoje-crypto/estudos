<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz V/F — Crimes contra a Pessoa</title>
<style>
  :root{
    --paper:#f4f1e8;
    --ink:#1c2333;
    --ink-soft:#3a4256;
    --navy:#1c2b4a;
    --navy-2:#243a63;
    --brass:#9c7a3c;
    --brass-light:#c9a35e;
    --green:#2f6b4f;
    --green-bg:#e7f0e9;
    --red:#8a2e2e;
    --red-bg:#f5e6e4;
    --line:#d8d0bd;
    --card:#fffdf7;
    --shadow: 0 1px 2px rgba(28,35,51,.06), 0 8px 24px rgba(28,35,51,.08);
    --serif: "Iowan Old Style","Palatino Linotype","Georgia",serif;
    --sans: -apple-system,"Segoe UI",Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    background-image:
      radial-gradient(circle at 20% 0%, rgba(28,43,74,.04), transparent 45%),
      radial-gradient(circle at 100% 30%, rgba(156,122,60,.06), transparent 40%);
    color:var(--ink);
    font-family:var(--sans);
    min-height:100vh;
    padding:0 0 60px;
  }
  .wrap{max-width:800px;margin:0 auto;padding:0 18px;}

  header.top{
    background:linear-gradient(180deg,var(--navy) 0%, var(--navy-2) 100%);
    color:#f4f1e8;
    padding:28px 0 22px;
    margin-bottom:22px;
    border-bottom:3px solid var(--brass);
  }
  header.top .wrap{display:flex;flex-direction:column;gap:4px;}
  header.top .eyebrow{
    font-family:var(--sans);text-transform:uppercase;letter-spacing:.14em;
    font-size:11px;color:var(--brass-light);font-weight:600;
  }
  header.top h1{
    font-family:var(--serif);font-weight:600;font-size:26px;margin:2px 0 0;
    letter-spacing:.01em;
  }
  header.top .sub{font-size:13px;color:#c9cede;margin-top:4px;}

  .toolbar{
    display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;
    margin-bottom:16px;
  }
  select, .btn{
    font-family:var(--sans);font-size:13.5px;
    border-radius:8px;border:1px solid var(--line);
    background:var(--card);color:var(--ink);
    padding:9px 14px;cursor:pointer;
  }
  .btn:hover{border-color:var(--brass);}
  .btn.primary{background:var(--navy);color:#fff;border-color:var(--navy);}
  .btn.primary:hover{background:var(--navy-2);}
  .btn.brass{background:var(--brass);color:#fff;border-color:var(--brass);}
  .btn.ghost{background:transparent;}
  .btn:disabled{opacity:.35;cursor:not-allowed;}
  .btn.small{padding:6px 10px;font-size:12px;}

  .statsbar{
    display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;
  }
  .stat{
    flex:1;min-width:90px;background:var(--card);border:1px solid var(--line);
    border-radius:10px;padding:10px 12px;text-align:center;box-shadow:var(--shadow);
  }
  .stat .n{font-family:var(--serif);font-size:22px;font-weight:700;display:block;}
  .stat .l{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);}
  .stat.green .n{color:var(--green);}
  .stat.red .n{color:var(--red);}
  .stat.brass .n{color:var(--brass);}

  .progress-track{height:6px;background:var(--line);border-radius:4px;overflow:hidden;margin-bottom:22px;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--brass),var(--brass-light));transition:width .25s ease;}

  .card{
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:26px 24px;box-shadow:var(--shadow);margin-bottom:18px;
  }
  .qmeta{
    display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;
  }
  .qtag{
    font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--brass);
    font-weight:700;
  }
  .qtema{
    font-size:11px;color:var(--ink-soft);background:var(--paper);border:1px solid var(--line);
    border-radius:20px;padding:3px 10px;
  }
  .annulled-note{
    background:#fff3d6;border:1px solid #e0bf6b;color:#7a5a10;font-size:12.5px;
    border-radius:8px;padding:8px 12px;margin-bottom:14px;
  }
  .stem{
    font-family:var(--serif);font-size:17px;line-height:1.55;color:var(--ink);
    white-space:pre-wrap;
  }
  .assertion-box{
    margin-top:14px;background:var(--paper);border-left:4px solid var(--brass);
    border-radius:6px;padding:14px 16px;font-family:var(--serif);font-size:16.5px;
    line-height:1.5;white-space:pre-wrap;
  }
  .assertion-label{
    font-family:var(--sans);font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;
    color:var(--brass);font-weight:700;margin-bottom:6px;display:block;
  }

  .vf-row{display:flex;gap:12px;margin-top:20px;}
  .vf-btn{
    flex:1;padding:16px 10px;border-radius:10px;border:2px solid var(--line);
    background:var(--card);font-family:var(--serif);font-size:17px;font-weight:700;
    cursor:pointer;text-align:center;transition:all .12s ease;color:var(--ink-soft);
  }
  .vf-btn:hover{border-color:var(--brass);}
  .vf-btn.selected.true{border-color:var(--green);background:var(--green-bg);color:var(--green);}
  .vf-btn.selected.false{border-color:var(--red);background:var(--red-bg);color:var(--red);}
  .vf-btn:disabled{cursor:default;}

  .confirm-row{margin-top:16px;display:flex;justify-content:flex-end;}

  .result-banner{
    margin-top:18px;padding:12px 16px;border-radius:10px;font-weight:700;
    font-family:var(--serif);font-size:16px;display:flex;align-items:center;gap:8px;
  }
  .result-banner.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green);}
  .result-banner.bad{background:var(--red-bg);color:var(--red);border:1px solid var(--red);}

  .justif{
    margin-top:14px;background:var(--paper);border:1px solid var(--line);border-radius:10px;
    padding:16px 18px;font-size:14.5px;line-height:1.65;color:var(--ink-soft);white-space:pre-wrap;
  }
  .justif b, .justif strong{color:var(--ink);}

  .knew-row{margin-top:16px;padding-top:14px;border-top:1px dashed var(--line);}
  .knew-row .q{font-size:13px;color:var(--ink-soft);margin-bottom:8px;}
  .knew-btns{display:flex;gap:10px;}
  .knew-btns .btn.chosen{background:var(--navy);color:#fff;border-color:var(--navy);}

  .navrow{display:flex;justify-content:space-between;gap:10px;margin-top:8px;}
  .navrow .btn{flex:1;}

  .footer-actions{
    display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:24px;
  }

  /* review + list panel modal */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(28,35,51,.55);display:none;
    align-items:flex-start;justify-content:center;padding:40px 16px;z-index:50;overflow-y:auto;
  }
  .modal-overlay.open{display:flex;}
  .modal{
    background:var(--card);border-radius:14px;max-width:640px;width:100%;padding:22px 22px 26px;
    box-shadow:var(--shadow);
  }
  .modal h2{font-family:var(--serif);margin:0 0 14px;font-size:20px;}
  .modal .close{float:right;}
  .grid-nums{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(42px,1fr));gap:6px;margin-top:10px;
  }
  .grid-nums button{
    padding:8px 4px;border-radius:6px;border:1px solid var(--line);background:var(--paper);
    font-size:11px;cursor:pointer;font-family:var(--sans);
  }
  .grid-nums button.correct{background:var(--green-bg);border-color:var(--green);color:var(--green);}
  .grid-nums button.incorrect{background:var(--red-bg);border-color:var(--red);color:var(--red);}
  .grid-nums button.current{outline:2px solid var(--brass);}

  .review-section h3{font-family:var(--serif);font-size:15px;margin:18px 0 8px;}
  .review-list{list-style:none;margin:0;padding:0;}
  .review-list li{
    padding:8px 10px;border-radius:8px;border:1px solid var(--line);margin-bottom:6px;
    font-size:13px;cursor:pointer;background:var(--paper);
  }
  .review-list li:hover{border-color:var(--brass);}
  .review-list.empty-msg{font-size:13px;color:var(--ink-soft);font-style:italic;}

  @media (max-width:520px){
    header.top h1{font-size:21px;}
    .stem, .assertion-box{font-size:15.5px;}
    .vf-row{flex-direction:column;}
  }
</style>
</head>

<!-- LIST MODAL -->
<div class="modal-overlay" id="listOverlay">

      <h3>✅ Acertou sabendo</h3>
      <ul class="review-list" id="listKnew"></ul>

  </div>
</div>

ssima (art. 129, § 2º) e lesão corporal seguida de morte (art. 129, § 3º), quando praticadas:   \n\nO item D e E parecem, mas a D é a mais completa. Vide:\n\nD) organização criminosa, voltada à prática de roubos circunstanciados pela restrição da liberdade das vítimas e comércio ilegal de arma de fogo.\n\nArt. 1º da Lei. São considerados hediondos os seguintes crimes, todos tipificados no Decreto-Lei no 2.848, de 7 de dezembro de 1940 - Código Penal, consumados ou tentados:\nII - roubo: \na) circunstanciado pela restrição de liberdade da vítima (art. 157, § 2º, inciso V); \nIII - o crime de comércio ilegal de armas de fogo (art. 17 da Lei nº 10.826, de 22 de dezembro de 2003); \nV - o crime de organização criminosa, quando direcionado à prática de crime hediondo ou equiparado.\n\nGabarito da professora: alternativa D.", "annulled": false, "remark": "ERREI – MARQUEI A LETRA C. MAS O GABARITO É LETRA D"}, {"id": "Q2-A", "qn": 2, "tema": "Homicídio", "type": "mc", "letter": "A", "stem": "Determinado indivíduo efetua disparos de arma de fogo contra desafeto, atingindo-o no tórax. A vítima é socorrida e submetida à cirurgia de emergência. Durante o procedimento cirúrgico, em razão de erro médico grosseiro consistente em perfuração acidental de órgão vital, a vítima vem a falecer. Perícia médica atesta que, sem o erro médico, a vítima sobreviveria às lesões causadas pelos disparos. Em relação à conduta, ao resultado, ao nexo de causalidade e à responsabilização penal do atirador, assinale a alternativa correta de acordo com a teoria adotada pelo Código Penal brasileiro.", "assertion": "O agente responde por homicídio consumado, aplicando-se a teoria da equivalência dos antecedentes causais, pois sua conduta deu causa ao resultado morte, sendo irrelevante a superveniência de causa relativamente independente.", "correct": false, "justification": "(INCORRETA) Está errada porque trata a superveniência como juridicamente irrelevante e ignora a exceção expressa do art. 13, § 1º, do Código Penal. A base informa que o erro médico grosseiro, superveniente, foi a causa que, por si só, produziu a morte. Nessa hipótese, a morte não é imputada ao atirador, de modo que não cabe homicídio consumado.", "annulled": false, "remark": null}, {"id": "Q2-B", "qn": 2, "tema": "Homicídio", "type": "mc", "letter": "B", "stem": "Determinado indivíduo efetua disparos de arma de fogo contra desafeto, atingindo-o no tórax. A vítima é socorrida e submetida à cirurgia de emergência. Durante o procedimento cirúrgico, em razão de erro médico grosseiro consistente em perfuração acidental de órgão vital, a vítima vem a falecer. Perícia médica atesta que, sem o erro médico, a vítima sobreviveria às lesões causadas pelos disparos. Em relação à conduta, ao resultado, ao nexo de causalidade e à responsabilização penal do atirador, assinale a alternativa correta de acordo com a teoria adotada pelo Código Penal brasileiro.", "assertion": "O agente responde por tentativa de homicídio ante a ocorrência de causa superveniente relativamente independente que, por si só, produziu o resultado morte, aplicando-se o art. 13, § 1º, do Código Penal.", "correct": true, "justification": "(CORRETA) A alternativa B aplica exatamente a disciplina do Código Penal sobre causa superveniente relativamente independente. O art. 13, caput, dispõe: \"O resultado, de que depende a existência do crime, somente é imputável a quem lhe deu causa. Considera-se causa a ação ou omissão sem a qual o resultado não teria ocorrido.\" Mas, no caso, incide a correção expressa do art. 13, § 1º, porque o enunciado afirma, com base pericial, que a vítima sobreviveria aos disparos sem o erro médico grosseiro, isto é, a causa superveniente foi a que, por si só, produziu o resultado morte. Excluída a imputação da morte ao atirador, subsistem os fatos anteriores por ele praticados. Como houve início de execução com disparos no tórax contra desafeto, incide o art. 14, II, do Código Penal: \"Diz-se o crime: II - tentado, quando, iniciada a execução, não se consuma por circunstâncias alheias à vontade do agente.\" Por isso, a imputação correta é tentativa de homicídio.", "annulled": false, "remark": null}, {"id": "Q2-C", "qn": 2, "tema": "Homicídio", "type": "mc", "letter": "C", "stem": "Determinado indivíduo efetua disparos de arma de fogo contra desafeto, atingindo-o no tórax. A vítima é socorrida e submetida à cirurgia de emergência. Durante o procedimento cirúrgico, em razão de erro médico grosseiro consistente em perfuração acidental de órgão vital, a vítima vem a falecer. Perícia médica atesta que, sem o erro médico, a vítima sobreviveria às lesões causadas pelos disparos. Em relação à conduta, ao resultado, ao nexo de causalidade e à responsabilização penal do atirador, assinale a alternativa correta de acordo com a teoria adotada pelo Código Penal brasileiro.", "assertion": "O agente responde por homicídio consumado em concurso de agentes com o médico que causou o erro, pois ambas as condutas foram essenciais para a produção do resultado morte.", "correct": false, "justification": "(INCORRETA) Está errada porque não há base para concurso de agentes entre atirador e médico. A base é expressa ao afirmar que o erro médico superveniente não autoriza concluir atuação conjunta orientada ao resultado. Falta o elemento de concurso de pessoas, e ainda incide o art. 13, § 1º, afastando a imputação da morte ao atirador.", "annulled": false, "remark": null}, {"id": "Q2-D", "qn": 2, "tema": "Homicídio", "type": "mc", "letter": "D", "stem": "Determinado indivíduo efetua disparos de arma de fogo contra desafeto, atingindo-o no tórax. A vítima é socorrida e submetida à cirurgia de emergência. Durante o procedimento cirúrgico, em razão de erro médico grosseiro consistente em perfuração acidental de órgão vital, a vítima vem a falecer. Perícia médica atesta que, sem o erro médico, a vítima sobreviveria às lesões causadas pelos disparos. Em relação à conduta, ao resultado, ao nexo de causalidade e à responsabilização penal do atirador, assinale a alternativa correta de acordo com a teoria adotada pelo Código Penal brasileiro.", "assertion": "O nexo causal resta interrompido pela conduta do médico, caracterizando causa absolutamente independente e superveniente, devendo o atirador responder apenas pelas lesões corporais que efetivamente causou.", "correct": false, "justification": "(INCORRETA) Está errada por dois motivos jurídicos específicos. Primeiro, classifica a causa como absolutamente independente, quando a base enquadra o caso como causa superveniente relativamente independente. Segundo, reduz a imputação remanescente a lesões corporais, em desacordo com a base, que afirma subsistir tentativa de homicídio em razão dos disparos no tórax com animus necandi e início de execução.", "annulled": false, "remark": null}, {"id": "Q2-E", "qn": 2, "tema": "Homicídio", "type": "mc", "letter": "E", "stem": "Determinado indivíduo efetua disparos de arma de fogo contra desafeto, atingindo-o no tórax. A vítima é socorrida e submetida à cirurgia de emergência. Durante o procedimento cirúrgico, em razão de erro médico grosseiro consistente em perfuração acidental de órgão vital, a vítima vem a falecer. Perícia médica atesta que, sem o erro médico, a vítima sobreviveria às lesões causadas pelos disparos. Em relação à conduta, ao resultado, ao nexo de causalidade e à responsabilização penal do atirador, assinale a alternativa correta de acordo com a teoria adotada pelo Código Penal brasileiro.", "assertion": "Aplica-se a teoria da causalidade adequada, adotada expressamente pelo Código Penal brasileiro como a regra de eleição de causas e constatação de nexo causal, devendo o agente responder por homicídio consumado.", "correct": false, "justification": "(INCORRETA) Está errada porque atribui ao Código Penal adoção expressa da teoria da causalidade adequada, o que contraria a base: o art. 13, caput, consagra a teoria da equivalência dos antecedentes causais. Além disso, mesmo dentro dessa regra geral, o caso é resolvido pela exceção do art. 13, § 1º, que afasta a imputação da morte ao atirador.", "annulled": false, "remark": null}, {"id": "Q3", "qn": 3, "tema": "Violação de domicílio", "type": "ce", "letter": null, "stem": "A respeito de crimes contra a pessoa, julgue o próximo item, conforme a legislação de regência, a doutrina e a jurisprudência dos tribunais superiores. \n\nCaracteriza o crime de violação de domicílio qualificada a ação de um policial, consciente e voluntariamente, conhecendo a ilegalidade de sua conduta, ingressar em casa alheia às 4 horas da madrugada, em cumprimento a mandado de busca e apreensão.", "assertion": null, "correct": false, "justification": "3 – A respeito de crimes contra a pessoa, julgue o próximo item, conforme a legislação de regência, a doutrina e a jurisprudência dos tribunais superiores. \n\nCaracteriza o crime de violação de domicílio qualificada a ação de um policial, consciente e voluntariamente, conhecendo a ilegalidade de sua conduta, ingressar em casa alheia às 4 horas da madrugada, em cumprimento a mandado de busca e apreensão.\nGabarito: Errado\n1. Interpretação e Legislação Aplicável:\nA questão trata da inviolabilidade do domicílio, um direito fundamental protegido pela Constituição Federal (art. 5º, XI) e pelo Código Penal (art. 150). Há ainda norma específica na Lei de Abuso de Autoridade (Lei 13.869/2019, art. 22, §1º, III), que disciplina o horário para cumprimento de mandados judiciais em residência: apenas durante o dia (entre 5h e 21h).\n2. Tema Central e Conhecimentos Necessários:\nO enunciado examina se o ingresso policial em domicílio às 4h, para cumprimento de mandado de busca, caracteriza o crime de violação de domicílio qualificada. O correto é compreender que, nessas hipóteses, a conduta é tipificada como abuso de autoridade, não como violação de domicílio do Código Penal.\n3. Exemplo Prático:\nImagine um policial que, ciente da ordem judicial, adentra uma residência às 4h para cumprir mandado de busca. Ainda que a entrada seja considerada ilegal, isso configura abuso de autoridade (Lei 13.869/2019), pois é infração específica e subsidiária à regra do art. 150 do CP.\n4. Justificativa da Correção:\nSegundo o art. 22, §1º, III da Lei de Abuso de Autoridade: \"Cumprir mandado de busca e apreensão domiciliar após as 21h ou antes das 5h: Pena - detenção, de 1 a 4 anos, e multa.\" Já o art. 150 do CP só se aplica a casos em que não há outra previsão legal específica, como neste caso.\nAssim, não é crime de violação de domicílio qualificada, mas sim abuso de autoridade entrar em residência no horário proibido.\n5. Jurisprudência Relevante:\nO STF (RE 603616) consolidou que a entrada sem mandado só é lícita quando exista flagrante delito fundamentado, devendo-se respeitar horários quando pautado em ordem judicial.\n6. Doutrina:\nNucci reforça a existência de leis especiais que afastam o tipo penal do art. 150 do CP em certas hipóteses, como nos abusos de autoridade (Código Penal Comentado).\n7. Pegadinha da Questão:\nAtenção: O enunciado induz ao erro ao sugerir “violação de domicílio qualificada”, quando a infração correta é “abuso de autoridade”. Perceber a existência de lei especial é chave nesta pegadinha!", "annulled": false, "remark": null}, {"id": "Q4", "qn": 4, "tema": "Tráfico de pessoas", "type": "ce", "letter": null, "stem": "A respeito de crimes contra a pessoa, julgue o próximo item, conforme a legislação de regência, a doutrina e a jurisprudência dos tribunais superiores. \n\nAo tipificar o crime de tráfico de pessoas, o Código Penal enumera uma série de finalidades especiais que devem se concretizar para que se repute consumado o delito.", "assertion": null, "correct": false, "justification": "4 – (ERREI ESSA PORRA) A respeito de crimes contra a pessoa, julgue o próximo item, conforme a legislação de regência, a doutrina e a jurisprudência dos tribunais superiores. \n\nAo tipificar o crime de tráfico de pessoas, o Código Penal enumera uma série de finalidades especiais que devem se concretizar para que se repute consumado o delito.\nGabarito: E (Errado)\nInterpretação: O tema pedido é tráfico de pessoas, crime previsto no art. 149-A do Código Penal. Pergunta-se se o delito exige a efetiva concretização das finalidades listadas para a consumação do tipo penal.\nLegislação Aplicável:\nCódigo Penal, art. 149-A: “Agenciar, aliciar, recrutar, transportar, transferir, comprar, alojar ou acolher pessoa, mediante grave ameaça, violência, coação, fraude ou abuso, com a finalidade de [...].”\nObserve que o verbo “com a finalidade de” indica que a intenção de praticar as condutas (por exemplo, exploração sexual, trabalho análogo à escravidão) basta para configurar o delito.\nJurisprudência e Doutrina: Segundo o STJ (HC 123.456/SP), A consumação ocorre com a prática das condutas descritas no tipo, pouco importando a efetivação da finalidade especial. A doutrina de Guilherme Nucci reforça: “Não se exige a realização dos objetivos previstos na lei, mas apenas o dolo finalístico.”\nExemplo Prático: Imagine alguém que alicie uma pessoa mediante fraude, pretendendo explorá-la sexualmente, mas antes que haja efetiva exploração, a autoridade policial intercepta e impede a consumação da finalidade. A conduta já configura o tráfico de pessoas.\nResolução da Questão: A assertiva afirma que é necessária a concretização das finalidades especiais (exploração sexual, trabalho escravo, etc.) para a consumação do crime. Isso está incorreto: basta a intenção, aliada à realização de qualquer das condutas típicas, não sendo imprescindível que a vítima realmente seja explorada.\nPegadinhas e Estratégia: O termo-chave é “concretizar para que se repute consumado”. Atenção: questões de concurso costumam tentar confundir entre crime material (em que se exige resultado) e crime formal (em que apenas a conduta dirigida ao fim já basta).\nResumo: O crime de tráfico de pessoas (art. 149-A, CP) é formal. Não se exige a concretização das finalidades especiais – basta a realização das condutas descritas com dolo específico.", "annulled": false, "remark": "ERREI ESSA PORRA"}, {"id": "Q5", "qn": 5, "tema": "Crimes contra a honra", "type": "ce", "letter": null, "stem": "A respeito dos crimes contra a honra previstos no Código Penal e dos crimes resultantes de preconceitos de raça ou de cor previstos na Lei n.º 7.716/1989, julgue o seguinte item, com base na legislação de regência e na jurisprudência dos tribunais superiores.  \n\nConsoante jurisprudência do STF, o ato de dirigir a uma pessoa com deficiência ofensas vagas atreladas à deficiência com a qual ela convive constitui o crime de injúria tipificado no Código Penal e viola o bem jurídico da honra subjetiva.", "assertion": null, "correct": true, "justification": "5 - A respeito dos crimes contra a honra previstos no Código Penal e dos crimes resultantes de preconceitos de raça ou de cor previstos na Lei n.º 7.716/1989, julgue o seguinte item, com base na legislação de regência e na jurisprudência dos tribunais superiores.  \n\nConsoante jurisprudência do STF, o ato de dirigir a uma pessoa com deficiência ofensas vagas atreladas à deficiência com a qual ela convive constitui o crime de injúria tipificado no Código Penal e viola o bem jurídico da honra subjetiva.\nGAB. CERTA\n\"Consoante jurisprudência do STF, o ato de dirigir a uma pessoa com deficiência ofensas vagas atreladas à deficiência com a qual ela convive constitui o crime de injúria tipificado no Código Penal e viola o bem jurídico da honra subjetiva. \"\nCom base em tais informações verifica-se que a Banca primeiramente queria saber se o candidato sabia da distinção pontuada no julgado, isto é, se ofensas vagas configura crime de injúria ou difamação. Conforme o trecho do julgado do STF colacionado por nossa colega Rhânia, resta claro que o Supremo esclareceu que as ofensas vagas configuram crime de injúria, pois na calúnia e difamação imputa-se fato determinado. Esta distinção também é adotada pela doutrina.\nO segundo ponto seria saber se o candidato lembrava que OFENSAS vagas à condição de pessoa com deficiência era tipificada como injúria \"qualificada\" no CP ou se estaria diante do crime de injúria racial previsto na lei 7.716/89. A Lei 14.532/2023 alterou a legislação, definindo que a injúria qualificada ocorre quando a ofensa envolve elementos relacionados à religião, condição de pessoa idosa ou com deficiência. As ofensas baseadas em raça, cor, etnia ou origem passaram a ser tratadas como crime de racismo, isto é, equipara a injúria racial ao crime de racismo. Com isso, a pena tornou-se mais severa com reclusão de dois a cinco anos e multa, não cabe mais fiança, o crime é imprescritível e de ação penal pública incondicionada.", "annulled": false, "remark": null}, {"id": "Q6-A", "qn": 6, "tema": "Lesão corporal", "type": "mc", "letter": "A", "stem": "Durante o cumprimento de mandado de busca e apreensão, Marcos, Delegado de Polícia, foi atingido por um golpe de faca efetuado por Dexter, que buscava se evadir. Em razão dos eventos, a autoridade policial sofreu debilidade permanente de membro. Registre-se, ainda, que, após investigações, apurou-se que Dexter agiu com dolo de lesionar, não havendo intenção de matar o referido agente público.\nNesse cenário, considerando as disposições do Código Penal, é correto afirmar que Dexter responderá pelo crime de lesão corporal", "assertion": "simples, com a incidência de duas causas de aumento de pena, em razão da debilidade permanente de membro e pelo fato de que a conduta foi praticada contra um Delegado de Polícia no exercício da função.", "correct": false, "justification": "O gabarito oficial desta questão é a alternativa B. 6 - Durante o cumprimento de mandado de busca e apreensão, Marcos, Delegado de Polícia, foi atingido por um golpe de faca efetuado por Dexter, que buscava se evadir. Em razão dos eventos, a autoridade policial sofreu debilidade permanente de membro. Registre-se, ainda, que, após investigações, apurou-se que Dexter agiu com dolo de lesionar, não havendo intenção de matar o referido agente público.\nNesse cenário, considerando as disposições do Código Penal, é correto afirmar que Dexter responderá pelo crime de lesão corporal\nAlternativas\nA\nsimples, com a incidência de duas causas de aumento de pena, em razão da debilidade permanente de membro e pelo fato de que a conduta foi praticada contra um Delegado de Polícia no exercício da função.\nB\nqualificada, em razão da debilidade permanente de membro, com a incidência de uma causa de aumento de pena, pois a conduta foi praticada contra um Delegado de Polícia no exercício da função.\nC\nqualificada, por ter sido praticada contra um Delegado de Polícia no exercício da função, com a incidência de uma causa de aumento de pena em razão da debilidade permanente de membro.\nD\nduplamente qualificada, em razão da debilidade permanente de membro e pelo fato de que a conduta foi praticada contra um Delegado de Polícia no exercício da função.\nE\nqualificada, em razão da debilidade permanente de membro, sem causas de aumento de pena.\nA questão exige conhecimento sobre o crime de lesão corporal, conforme previsto no art. 129 do Código Penal.\nNo caso apresentado, Marcos, Delegado de Polícia, foi atingido por um golpe de faca desferido por Dexter, o que resultou em debilidade permanente de membro.\nDessa forma, o fato se enquadra no delito previsto no art. 129, §1º, III, do Código Penal, que trata da lesão corporal de natureza grave:\nArt. 129. Ofender a integridade corporal ou a saúde de outrem:\nPena – detenção, de três meses a um ano.\nLesão corporal de natureza grave\n§ 1º Se resulta:\n(...)\nIII – debilidade permanente de membro, sentido ou função;\nAlém disso, o crime ocorreu enquanto Marcos exercia a função de Delegado de Polícia, no cumprimento de um mandado de busca e apreensão.\nNessa hipótese, aplica-se a causa de aumento de pena prevista no art. 129, §12, do Código Penal:\nArt. 129 (...)\n§ 12. Se a lesão for praticada contra autoridade ou agente descrito nos arts. 142 e 144 da Constituição Federal, integrantes do sistema prisional e da Força Nacional de Segurança Pública, no exercício da função ou em decorrência dela, ou contra seu cônjuge, companheiro ou parente consanguíneo até terceiro grau, em razão dessa condição, a pena será aumentada de um a dois terços.\nPortanto, a infração penal cometida por Dexter configura lesão corporal qualificada pela debilidade permanente de membro (art. 129, §1º, III, do CP), com a incidência de uma causa de aumento de pena, em razão de a vítima ser um Delegado de Polícia no exercício da função (art. 129, §12, do CP).\nAnálise das alternativas:\nA – Incorreta. A lesão não é simples, mas sim qualificada em razão da debilidade permanente.\nB – Correta. Conforme explicado, o crime é qualificado pela debilidade permanente de membro e possui a causa de aumento de pena pelo fato de a vítima ser Delegado de Polícia no exercício da função.\nC – Incorreta. O fato de a vítima ser Delegado de Polícia no exercício da função não é qualificadora, mas sim uma causa de aumento de pena (art. 129, §12, CP). A alternativa inverte os conceitos.\nD –...", "annulled": false, "remark": null}, {"id": "Q6-B", "qn": 6, "tema": "Lesão corporal", "type": "mc", "letter": "B", "stem": "Durante o cumprimento de mandado de busca e apreensão, Marcos, Delegado de Polícia, foi atingido por um golpe de faca efetuado por Dexter, que buscava se evadir. Em razão dos eventos, a autoridade policial sofreu debilidade permanente de membro. Registre-se, ainda, que, após investigações, apurou-se que Dexter agiu com dolo de lesionar, não havendo intenção de matar o referido agente público.\nNesse cenário, considerando as disposições do Código Penal, é correto afirmar que Dexter responderá pelo crime de lesão corporal", "assertion": "qualificada, em razão da debilidade permanente de membro, com a incidência de uma causa de aumento de pena, pois a conduta foi praticada contra um Delegado de Polícia no exercício da função.", "correct": true, "justification": "O gabarito oficial desta questão é a alternativa B. 6 - Durante o cumprimento de mandado de busca e apreensão, Marcos, Delegado de Polícia, foi atingido por um golpe de faca efetuado por Dexter, que buscava se evadir. Em razão dos eventos, a autoridade policial sofreu debilidade permanente de membro. Registre-se, ainda, que, após investigações, apurou-se que Dexter agiu com dolo de lesionar, não havendo intenção de matar o referido agente público.\nNesse cenário, considerando as disposições do Código Penal, é correto afirmar que Dexter responderá pelo crime de lesão corporal\nAlternativas\nA\nsimples, com a incidência de duas causas de aumento de pena, em razão da debilidade permanente de membro e pelo fato de que a conduta foi praticada contra um Delegado de Polícia no exercício da função.\nB\nqualificada, em razão da debilidade permanente de membro, com a incidência de uma causa de aumento de pena, pois a conduta foi praticada contra um Delegado de Polícia no exercício da função.\nC\nqualificada, por ter sido praticada contra um Delegado de Polícia no exercício da função, com a incidência de uma causa de aumento de pena em razão da debilidade permanente de membro.\nD\nduplamente qualificada, em razão da debilidade permanente de membro e pelo fato de que a conduta foi praticada contra um Delegado de Polícia no exercício da função.\nE\nqualificada, em razão da debilidade permanente de membro, sem causas de aumento de pena.\nA questão exige conhecimento sobre o crime de lesão corporal, conforme previsto no art. 129 do Código Penal.\nNo caso apresentado, Marcos, Delegado de Polícia, foi atingido por um golpe de faca desferido por Dexter, o que resultou em debilidade permanente de membro.\nDessa forma, o fato se enquadra no delito previsto no art. 129, §1º, III, do Código Penal, que trata da lesão corporal de natureza grave:\nArt. 129. Ofender a integridade corporal ou a saúde de outrem:\nPena – detenção, de três meses a um ano.\nLesão corporal de natureza grave\n§ 1º Se resulta:\n(...)\nIII – debilidade permanente de membro, sentido ou função;\nAlém disso, o crime ocorreu enquanto Marcos exercia a função de Delegado de Polícia, no cumprimento de um mandado de busca e apreensão.\nNessa hipótese, aplica-se a causa de aumento de pena prevista no art. 129, §12, do Código Penal:\nArt. 129 (...)\n§ 12. Se a lesão for praticada contra autoridade ou agente descrito nos arts. 142 e 144 da Constituição Federal, integrantes do sistema prisional e da Força Nacional de Segurança Pública, no exercício da função ou em decorrência dela, ou contra seu cônjuge, companheiro ou parente consanguíneo até terceiro grau, em razão dessa condição, a pena será aumentada de um a dois terços.\nPortanto, a infração penal cometida por Dexter configura lesão corporal qualificada pela debilidade permanente de membro (art. 129, §1º, III, do CP), com a incidência de uma causa de aumento de pena, em razão de a vítima ser um Delegado de Polícia no exercício da função (art. 129, §12, do CP).\nAnálise das alternativas:\nA – Incorreta. A lesão não é simples, mas sim qualificada em razão da debilidade permanente.\nB – Correta. Conforme explicado, o crime é qualificado pela debilidade permanente de membro e possui a causa de aumento de pena pelo fato de a vítima ser Delegado de Polícia no exercício da função.\nC – Incorreta. O fato de a vítima ser Delegado de Polícia no exercício da função não é qualificadora, mas sim uma causa de aumento de pena (art. 129, §12, CP). A alternativa inverte os conceitos.\nD –...", "annulled": false, "remark": null}, {"id": "Q6-C", "qn": 6, "tema": "Lesão corporal", "type": "mc", "letter": "C", "stem": "Durante o cumprimento de mandado de busca e apreensão, Marcos, Delegado de Polícia, foi atingido por um golpe de faca efetuado por Dexter, que buscava se evadir. Em razão dos eventos, a autoridade policial sofreu debilida RITO É LETRA E"}, {"id": "Q8-A", "qn": 8, "tema": "Crimes contra a família", "type": "mc", "letter": "A", "stem": "No que se refere aos crimes contra a família, assinale a opção correta.", "assertion": "O crime de entrega de filho menor a pessoa inidônea admite as modalidades dolosa e culposa.", "correct": false, "justification": "O gabarito oficial desta questão é a alternativa E. 8 - No que se refere aos crimes contra a família, assinale a opção correta.\nAlternativas\nA\nO crime de entrega de filho menor a pessoa inidônea admite as modalidades dolosa e culposa.\nB\nNos crimes de bigamia e de falsificação de registro civil, a prescrição começa a correr da data em que se consumou o assentamento.\nC\nNão configura o crime de bigamia, se ambos os contraentes souberem dessa condição depois de já estarem separados judicialmente por outros motivos.\nD\nA conduta de registrar como seu o filho de outrem configura crime de sonegação de estado de filiação.\nE\nA infração penal de abandono material se configura como crime omissivo próprio.\nCom vistas a responder à questão, impõe-se a análise das alternativas a fim de verificar-se qual delas está correta.\nItem (A) - O crime mencionado neste item está tipificado no artigo 245, do Código Penal. Não há previsão legal de sua modalidade culposa. Com efeito, diante do disposto no parágrafo único, do artigo 18, do Código Penal, a modalidade culposa não é admitida, sendo a presente alternativa incorreta.\nItem (B) - Nos termos do artigo 111, inciso IV, do Código Penal, a prescrição, antes de transitar em jugado a sentença final, começa a correr, em relação aos crimes de bigamia e de falsificação ou alteração de assentamento de do registro civil, da data em que o fato se tornou conhecido. A assertiva contida neste item diz que a prescrição começa a correr na data em que o crime se consumou, motivo pelo qual a presente alternativa está errada.\nItem (C) - A separação judicial, embora dissolva a sociedade conjugal, nos termos do inciso III, do artigo 1.571 do Código Civil, não dissolve o casamento, de acordo com o disposto no parágrafo primeiro do artigo mencionado. Sendo assim, aquele contrair novo casamento, ainda que separado judicialmente, incide nas penas do crime de bigamia. Neste sentido, veja-se a lição de Cleber Masson, em seu Direito Penal, Parte Especial, Volume III:\n\"A separação judicial também não impede a caracterização do delito, pois a legislação brasileira reclama, para a dissolução do vínculo matrimonial, a morte de um dos cônjuges ou então o divórcio, aplicando-se a presunção legal quanto ao ausente (CC, art. 1.571, § 1.º).\"\nAssim sendo, a presente alternativa está incorreta.\nItem (D) -  A conduta mencionada neste item está tipificada no artigo 242 do Código Penal e configura o delito de “Parto suposto. Supressão ou alteração de direito inerente ao estado civil de recém-nascido\". O crime de sonegação de estado de filiação está tipificado no artigo 243 do Código Penal, que tem a seguinte redação: \"Deixar em asilo de expostos ou outra instituição de assistência filho próprio ou alheio, ocultando-lhe a filiação ou atribuindo-lhe outra, com o fim de prejudicar direito inerente ao estado civil\". Assim sendo, a assertiva contida neste item está incorreta.\nItem (E) - O crime de abandono material está previsto no artigo 244, do Código Penal e classifica-se como um crime omissivo próprio no qual o agente abstém-se de agir quando a lei lhe obriga a uma conduta positiva. Assim sendo, a presente alternativa está correta.\nGabarito do professor: (E)", "annulled": false, "remark": null}, {"id": "Q8-B", "qn": 8, "tema": "Crimes contra a família", "type": "mc", "letter": "B", "stem": "No que se refere aos crimes contra a família, assinale a opção correta.", "assertion": "Nos crimes de bigamia e de falsificação de registro civil, a prescrição começa a correr da data em que se consumou o assentamento.", "correct": false, "justification": "O gabarito oficial desta questão é a alternativ lhe a filiação ou atribuindo-lhe outra, com o fim de prejudicar direito inerente ao estado civil\". Assim sendo, a assertiva contida neste item está incorreta.\nItem (E) - O crime de abandono material está previsto no artigo 244, do Código Penal e classifica-se como um crime omissivo próprio no qual o agente abstém-se de agir quando a lei lhe obriga a uma conduta positiva. Assim sendo, a presente alternativa está correta.\nGabarito do professor: (E)", "annulled": false, "remark": null}, {"id": "Q9-A", "qn": 9, "tema": "Sequestro e cárcere privado", "type": "mc", "letter": "A", "stem": "O crime de sequestro e cárcere privado do art. 148 do CP,", "assertion": "tem como bens jurídicos tutelados a liberdade individual e o patrimônio.", "correct": false, "justification": "O gabarito oficial desta questão é a alternativa E. 9 - O crime de sequestro e cárcere privado do art. 148 do CP,\nAlternativas\nA\ntem como bens jurídicos tutelados a liberdade individual e o patrimônio.\nB\né classificado como crime continuado, tendo em vista que a ação se protrai no tempo.\nC\napenas se consuma se o agente tem intenção de obter vantagem econômica.\nD\nnão admite tentativa.\nE\né qualificado se a vítima é cônjuge do agente, independentemente de serem, um(a) ou outro(a), homem ou mulher.\nCom vistas a responder à questão, impõe-se a análise das alternativas de modo a verificar-se qual delas está correta.\nItem (A) - O crime de sequestro e cárcere privado é crime contra a liberdade individual e está expressamente previsto no artigo 148, do Código Penal, que assim dispõe:\n\"Art. 148 - Privar alguém de sua liberdade, mediante seqüestro ou cárcere privado\".\nNão vulnera o patrimônio, motivo pelo qual a proposição contida neste item está incorreta.\nItem (B) - Trata-se de crime permanente, uma vez que a ação se protrai no tempo. A figura do crime continuado é uma ficção jurídica que trata a prática de diversos crimes como se um só fosse, em razão de suas circunstâncias e encontra-se disciplinado no artigo 71 do Código Penal, que assim dispõe:\n\"Art. 71 - Quando o agente, mediante mais de uma ação ou omissão, pratica dois ou mais crimes da mesma espécie e, pelas condições de tempo, lugar, maneira de execução e outras semelhantes, devem os subseqüentes ser havidos como continuação do primeiro, aplica-se-lhe a pena de um só dos crimes, se idênticas, ou a mais grave, se diversas, aumentada, em qualquer caso, de um sexto a dois terços\".\nAssim sendo, a presente alternativa está incorreta.\nItem (C) - A vantagem econômica não consubstancia o especial fim de agir do delito de sequestro e cárcere privado, razão pela qual a presente alternativa está incorreta.\nItem (D) -  É possível a forma tentada na medida em que é um crime plurissubsistente em que a conduta ativa é fracionável. Desta forma, uma vez praticados atos executórios e o resultado não ocorrer por circunstâncias alheias à vontade do agente, haverá o delito em sua forma tentada. Assim sendo, a presente alternativa está incorreta.\nItem (E) -  O § 1º do artigo 148, prevê diversas formas qualificadas do delito de sequestro e cárcere privado, dentre as quais a prática do referido delito contra o cônjuge. Confira-se, a esse teor, o que dispõe o inciso I, do § 1º, do artigo 148, do Código Penal:\n\" I – se a vítima é ascendente, descendente, cônjuge ou companheiro do agente ou maior de 60 (sessenta) anos\".\nO referido dispositivo não especifica se o cônjuge vítima tem que ser homem ou mulher para configurar a referida modalidade qualificada do delito, estando a presente alternativa correta.\nGabarito do professor: (E)", "annulled": false, "remark": null}, {"id": "Q9-B", "qn": 9, "tema": "Sequestro e cárcere privado", "type": "mc", "letter": "B", "stem": "O crime de sequestro e cárcere privado do art. 148 do CP,", "assertion": "é classificado como crime continuado, tendo em vista que a ação se protrai no tempo.", "correct": false, "justification": "O gabarito oficial desta questão é a alternativa E. nsuma se o agente tem intenção de obter vantagem econômica.\nD\nnão admite tentativa.\nE\né qualificado se a vítima é cônjuge do agente, independentemente de serem, um(a) ou outro(a), homem ou mulher.\nCom vistas a responder à questão, impõe-se a análise das alternativas de modo a verificar-se qual delas está correta.\nItem (A) - O crime de sequestro e cárcere privado é crime contra a liberdade individual e está expressamente previsto no artigo 148, do Código Penal, que assim dispõe:\n\"Art. 148 - Privar alguém de sua liberdade, mediante seqüestro ou cárcere privado\".\nNão vulnera o patrimônio, motivo pelo qual a proposição contida neste item está incorreta.\nItem (B) - Trata-se de crime permanente, uma vez que a ação se protrai no tempo. A figura do crime continuado é uma ficção jurídica que trata a prática de diversos crimes como se um só fosse, em razão de suas circunstâncias e encontra-se disciplinado no artigo 71 do Código Penal, que assim dispõe:\n\"Art. 71 - Quando o agente, mediante mais de uma ação ou omissão, pratica dois ou mais crimes da mesma espécie e, pelas condições de tempo, lugar, maneira de execução e outras semelhantes, devem os subseqüentes ser havidos como continuação do primeiro, aplica-se-lhe a pena de um só dos crimes, se idênticas, ou a mais grave, se diversas, aumentada, em qualquer caso, de um sexto a dois terços\".\nAssim sendo, a presente alternativa está incorreta.\nItem (C) - A vantagem econômica não consubstancia o especial fim de agir do delito de sequestro e cárcere privado, razão pela qual a presente alternativa está incorreta.\nItem (D) -  É possível a forma tentada na medida em que é um crime plurissubsistente em que a conduta ativa é fracionável. Desta forma, uma vez praticados atos executórios e o resultado não ocorrer por circunstâncias alheias à vontade do agente, haverá o delito em sua forma tentada. Assim sendo, a presente alternativa está incorreta.\nItem (E) -  O § 1º do artigo 148, prevê diversas formas qualificadas do delito de sequestro e cárcere privado, dentre as quais a prática do referido delito contra o cônjuge. Confira-se, a esse teor, o que dispõe o inciso I, do § 1º, do artigo 148, do Código Penal:\n\" I – se a vítima é ascendente, descendente, cônjuge ou companheiro do agente ou maior de 60 (sessenta) anos\".\nO referido dispositivo não especifica se o cônjuge vítima tem que ser homem ou mulher para configurar a referida modalidade qualificada do delito, estando a presente alternativa correta.\nGabarito do professor: (E)", "annulled": false, "remark": null}, {"id": "Q10-A", "qn": 10, "tema": "Crimes cibernéticos", "type": "mc", "letter": "A", "stem": "Sobre os crimes cibernéticos ou informáticos, é CORRETO afirmar:", "assertion": "A simples disponibilização de imagens ou vídeos com conteúdo pornográfico, envolvendo criança ou adolescente, na Internet, não é suficiente para a caracterização do tipo penal do art. 241-A do ECA, sendo imprescindível o efetivo acesso de pelo menos um usuário.", "correct": false, "justification": "(INCORRETA) O art. 241-A do ECA (Estatuto da Criança e do Adolescente) considera crime a disponibilização de imagens ou vídeos com conteúdo pornográfico envolvendo crianças ou adolescentes, independentemente do acesso efetivo por usuários. O simples ato de disponibilizar já configura o tipo penal.", "annulled": false, "remark": null}, {"id": "Q10-B", "qn": 10, "tema": "Crimes cibernéticos", "type": "mc", "letter": "B", "stem": "Sobre os crimes cibernéticos ou informáticos, é CORRETO afirmar:", "assertion": "Agente que se aproveita da ausência momentânea de colega de trabalho para, no computador alheio, ligado sem nenhum tipo de dispositivo de segurança, acessar fotos íntimas, copiando-as para si, pratica o crime de invasão de dispositivo informático do art. 154-A do Código Penal.", "correct": true, "justification": "(CORRETA) A alternativa B está correta porque o art. 154-A do Código Penal tipifica como crime a invasão de dispositivo informático, ainda que o computador esteja sem proteção de senha. O fato de um colega acessar e copiar fotos íntimas sem autorização configura a prática do crime, mesmo que o dispositivo estivesse desprotegido no momento do acesso.", "annulled": false, "remark": null}, {"id": "Q10-C", "qn": 10, "tema": "Crimes cibernéticos", "type": "mc", "letter": "C", "stem": "Sobre os crimes cibernéticos ou informáticos, é CORRETO afirmar:", "assertion": "É fraude eletrônica, figura qualificada do crime de estelionato, a utilização de informações fornecidas pela vítima induzida a erro presencialmente, se o agente obtém a vantagem, em prejuízo da vítima, passando-se por ela em uma compra em ambiente virtual.", "correct": false, "justification": "(INCORRETA) A fraude eletrônica, como forma qualificada do estelionato, requer que o engano seja realizado por meio eletrônico. Se o erro foi induzido presencialmente, não se configura o uso de meio eletrônico, caracterizando o estelionato simples.", "annulled": false, "remark": null}, {"id": "Q10-D", "qn": 10, "tema": "Crimes cibernéticos", "type": "mc", "letter": "D", "stem": "Sobre os crimes cibernéticos ou informáticos, é CORRETO afirmar:", "assertion": "Em razão da necessária segurança coletiva e proteção de dados, os crimes de invasão de dispositivos informáticos, definidos no art. 154-A do Código Penal, são de ação penal pública incondicionada. Tema da Questão: Crimes cibernéticos ou informáticos, especificamente relacionados à inviolabilidade de segredos e invasão de dispositivos informáticos. Legislação Aplicável: O tema central da questão refere-se ao crime de invasão de dispositivo informático, previsto no art. 154-A do Código Penal Brasileiro. Este artigo trata da invasão de dispositivos informáticos com o intuito de obter, adulterar ou destruir dados sem autorização do titular e destaca a proteção à privacidade e à segurança dos sistemas informáticos. Explicação do Tema Central: A questão avalia o conhecimento sobre o crime de invasão de dispositivos informáticos, uma modalidade de crime cibernético. Para compreender este tipo penal, é importante saber que ele protege a integridade e a confidencialidade dos dados contidos nos dispositivos informáticos, criminalizando o acesso não autorizado. Exemplo Prático: Imagine que você deixe seu computador desbloqueado no trabalho e um colega, sem sua permissão, acessa seus e-mails pessoais. Esta ação caracteriza uma invasão de dispositivo informático, mesmo que não haja proteção como senhas. Justificativa da Alternativa Correta (B): A alternativa B está correta porque o art. 154-A do Código Penal tipifica como crime a invasão de dispositivo informático, ainda que o computador esteja sem proteção de senha. O fato de um colega acessar e copiar fotos íntimas sem autorização configura a prática do crime, mesmo que o dispositivo estivesse desprotegido no momento do acesso. Análise das Alternativas Incorretas: Alternativa A: Está incorreta. O art. 241-A do ECA (Estatuto da Criança e do Adolescente) considera crime a disponibilização de imagens ou vídeos com conteúdo pornográfico envolvendo crianças ou adolescentes, independentemente do acesso efetivo por usuários. O simples ato de disponibilizar já configura o tipo penal. Alternativa C: Está incorreta. A fraude eletrônica, como forma qualificada do estelionato, requer que o engano seja realizado por meio eletrônico. Se o erro foi induzido presencialmente, não se configura o uso de meio eletrônico, caracterizando o estelionato simples. Alternativa D: Está incorreta. Os crimes de invasão de dispositivos informáticos são de ação penal pública condicionada à representação, conforme o art. 154-B do Código Penal, diferentemente do que a alternativa sugere. Dica para Evitar Pegadinhas: Esteja sempre atento aos detalhes das alternativas, como palavras que limitam ou expandem o entendimento do crime, como \"imprescindível\" ou \"necessária\". Elas podem alterar completamente o sentido legal da questão. Gostou do comentário? Deixe sua avaliação aqui embaixo!", "correct": false, "justification": "(INCORRETA) Os crimes de invasão de dispositivos informáticos são de ação penal pública condicionada à representação, conforme o art. 154-B do Código Penal, diferentemente do que a alternativa sugere.\nDica para Evitar Pegadinhas: Esteja sempre atento aos detalhes das alternativas, como palavras que limitam ou expandem o entendimento do crime, como \"imprescindível\" ou \"necessária\". Elas podem alterar completamente o sentido legal da questão.\nGostou do comentário? Deixe sua avaliação aqui embaixo!", "annulled": false, "remark": null}, {"id": "Q11-A", "qn": 11, "tema": "Tráfico de drogas", "type": "mc", "letter": "A", "stem": "Considerando que o processo de criminalização está intrinsecamente relacionado à noção de bem jurídico, assinale a alternativa correta.", "assertion": "A disponibilidade dos bens jurídicos coletivos é ilimitada e, por isso, a atipicidade material do fato poderá decorrer do consentimento de alguns de seus titulares.", "correct": false, "justification": "(INCORRETA) nos bens jurídicos coletivos, o consentimento de alguns titulares não tem relevância jurídica, mormente para configurar a atipicidade material de suas violações, uma vez que os titulares são indeterminados, carecendo de legitimidade o consentimento de parte deles.", "annulled": false, "remark": null}, {"id": "Q11-B", "qn": 11, "tema": "Tráfico de drogas", "type": "mc", "letter": "B", "stem": "Considerando que o processo de criminalização está intrinsecamente relacionado à noção de bem jurídico, assinale a alternativa correta.", "assertion": "A teoria da proteção penal proposta por Jakobs tem fundamento na Constituição e, como tal, refuta a ideia de que a missão do direito penal é a proteção da vigência da norma.", "correct": false, "justification": "(INCORRETA) Jakobs defende que não há defesa de bens jurídicos pressupostos. Ou seja, não são pré-jurídicos, mas o bem jurídico principal é a vigência da norma. Quando o direito penal age, ele já age atrasado (o suposto bem jurídico já foi violado). A missão do direito penal é a tutela da vigência e validade da norma.", "annulled": false, "remark": null}, {"id": "Q11-C", "qn": 11, "tema": "Tráfico de drogas", "type": "mc", "letter": "C", "stem": "Considerando que o processo de criminalização está intrinsecamente relacionado à noção de bem jurídico, assinale a alternativa correta.", "assertion": "O paternalismo constitui intervenção estatal na liberdade individual sempre de acordo com a vontade do titular do bem jurídico, podendo interferir, inclusive, em suas escolhas morais.", "correct": false, "justification": "(INCORRETA) o paternalismo penal incide justamente onde normalmente não há vontade do seu titular. É o ocorre com a incriminação do porte de drogas para consumo pessoal, onde o usuário só atinge sua própria saúde, mas a lei incrimina essa conduta com a justificativa de que o bem jurídico seja a saúde pública.", "annulled": false, "remark": null}, {"id": "Q11-D", "qn": 11, "tema": "Tráfico de drogas", "type": "mc", "letter": "D", "stem": "Considerando que o processo de criminalização está intrinsecamente relacionado à noção de bem jurídico, assinale a alternativa correta.", "assertion": "No tipo penal de incesto, previsto expressamente no Código Penal, o legislador buscou proteger não somente a autodeterminação sexual, senão igualmente a moral familiar e a saúde pública.", "correct": false, "justification": "(INCORRETA) o incesto (quando praticado por pessoas maiores e capazes, vale ressaltar) não é punido no Brasil, diferentemente da Alemanha, por exemplo. O legislador que pune o incesto não está protegendo a autodeterminação sexual, muito pelo contrário, estaria violando-a. A punibilidade do incesto visa proteger justamente o que se entende como moral e \"bons costumes\", que são conceitos vagos por natureza.", "annulled": false, "remark": null}, {"id": "Q11-E", "qn": 11, "tema": "Tráfico de drogas", "type": "mc", "letter": "E", "stem": "Considerando que o processo de criminalização está intrinsecamente relacionado à noção de bem jurídico, assinale a alternativa correta.", "assertion": "A incriminação da omissão de socorro revela a possibilidade, ainda que eventual, de a tutela de um bem jurídico nascer diretamente do poder punitivo. Questão aborda a Teoria do Bem Jurídico-Penal: a) ERRADO - nos bens jurídicos coletivos, o consentimento de alguns titulares não tem relevância jurídica, mormente para configurar a atipicidade material de suas violações, uma vez que os titulares são indeterminados, carecendo de legitimidade o consentimento de parte deles. b) ERRADO - Jakobs defende que não há defesa de bens jurídicos pressupostos. Ou seja, não são pré-jurídicos, mas o bem jurídico principal é a vigência da norma. Quando o direito penal age, ele já age atrasado (o suposto bem jurídico já foi violado). A missão do direito penal é a tutela da vigência e validade da norma. c) ERRADO - o paternalismo penal incide justamente onde normalmente não há vontade do seu titular. É o ocorre com a incriminação do porte de drogas para consumo pessoal, onde o usuário só atinge sua própria saúde, mas a lei incrimina essa conduta com a justificativa de que o bem jurídico seja a saúde pública. d) ERRADO - o incesto (quando praticado por pessoas maiores e capazes, vale ressaltar) não é punido no Brasil, diferentemente da Alemanha, por exemplo. O legislador que pune o incesto não está protegendo a autodeterminação sexual, muito pelo contrário, estaria violando-a. A punibilidade do incesto visa proteger justamente o que se entende como moral e \"bons costumes\", que são conceitos vagos por natureza. e) CERTO -  no delito de omissão de socorro (135 do CP), busca-se a tutela da vida, da saúde e da integridade corporal da pessoa, impondo-se um dever jurídico ( e não apenas ético) de assistência. Contudo, sabemos que da omissão nada pode ser produzido. Portanto, a tutela do bem jurídico nascerá diretamente do Poder Punitivo, porque o bem jurídico protegido só poderá ser verificado quando na incidência dos mecanismos de repressão estatal, dado que, ontologicamente, com a punibilidade da referida omissão, não se está protegendo bens jurídicos, uma vez que a omissão não causa resultados e não lesa bens jurídicos concretamente.", "correct": true, "justification": "(CORRETA) no delito de omissão de socorro (135 do CP), busca-se a tutela da vida, da saúde e da integridade corporal da pessoa, impondo-se um dever jurídico ( e não apenas ético) de assistência. Contudo, sabemos que da omissão nada pode ser produzido. Portanto, a tutela do bem jurídico nascerá diretamente do Poder Punitivo, porque o bem jurídico protegido só poderá ser verificado quando na incidência dos mecanismos de repressão estatal, dado que, ontologicamente, com a punibilidade da referida omissão, não se está protegendo bens jurídicos, uma vez que a omissão não causa resultados e não lesa bens jurídicos concretamente.", "annulled": false, "remark": null}, {"id": "Q12-A", "qn": 12, "tema": "Violação de domicílio", "type": "mc", "letter": "A", "stem": "Assinale a alternativa que contempla uma hipótese de violação de domicílio.", "assertion": "Pafúncio e Marocas, casados, em virtude de um desentendimento, resolvem se separar, após o que, conforme acordado entre ambos, Pafúncio deixa o lar conjugal para morar em outra casa. Semanas depois, embora já proposta a ação de divórcio, Pafúncio retorna ao imóvel e ali se instala sem a ciência de Marocas, que naquele momento viajava com o novo namorado.", "correct": true, "justification": "O gabarito oficial desta questão é a alternativa A. 12 - Assinale a alternativa que contempla uma hipótese de violação de domicílio.\nAlternativas\nA\nPafúncio e Marocas, casados, em virtude de um desentendimento, resolvem se separar, após o que, conforme acordado entre ambos, Pafúncio deixa o lar conjugal para morar em outra casa. Semanas depois, embora já proposta a ação de divórcio, Pafúncio retorna ao imóvel e ali se instala sem a ciência de Marocas, que naquele momento viajava com o novo namorado.\nB\nClarabela. ao passear pelas ruas internas de um condomínio de casas, no qual entrou regularmente, percebe um canteiro de rosas no jardim de um dos imóveis. Como o jardim não é murado, delimitado por cercas ou possui qualquer outro obstáculo ao livre acesso de pessoas, Clarabela nele ingressa, de lá colhendo uma muda de flor para levar consigo.\nC\nJeremias, após o trabalho, por volta das 18h, notando que não chegará a tempo para ver o jogo televisionado de seu time de coração, entra no saguão de um hotel, misturando-se a hóspedes e funcionários, pois ali há um telão transmitindo a partida.\nD\nFerdinando. fotógrafo, é contratado para trabalhar em um evento privado. No dia agendado, erra o endereço e ingressa - de forma não autorizada - no aniversário de Violeta. Instado pelos seguranças a deixar o local, ainda desconhecendo seu equívoco, Ferdinando se recusa a sair, o que só acontece com a chegada da polícia militar.\nE\nAcácio, andarilho, entra em um apartamento de propriedade de Nestor, o qual se encontra vazio e destinado à locação. Embora sua intenção inicial fosse apenas pernoitar no imóvel, Acácio decide fazer do local sua nova moradia.\nA) Art. 150 - Entrar ou permanecer, clandestina ou astuciosamente, ou contra a vontade expressa ou tácita de quem de direito, em casa alheia ou em suas dependências (...) | Trata-se de CRIME COMUM podendo ser praticado por qualquer pessoa, inclusive o PROPRIETÁRIO (marido) quando não estiver na posse direta do bem; por outro lado o sujeito passivo será o MORADOR (esposa), não precisando ser o proprietário do imóvel.\nB) Art. 150 - Entrar ou permanecer, clandestina [entrou com autorização] ou astuciosamente, ou contra a vontade expressa ou tácita de quem de direito [Não entrou contra a vontade de ninguém], em casa alheia ou em suas dependências [o local não se encaixa na definição penal de casa]: (...) § 4º - A expressão \"casa\" compreende: I - qualquer compartimento habitado; II - aposento ocupado de habitação coletiva; III - compartimento não aberto ao público, onde alguém exerce profissão ou atividade\nC) § 5º - Não se compreendem na expressão \"casa\": I - hospedaria, estalagem ou qualquer outra habitação coletiva, enquanto aberta, salvo a restrição do n.º II do parágrafo anterior;\nD) Art. 150 - Entrar ou permanecer, clandestina ou astuciosamente [não havia dolo], ou contra a vontade expressa ou tácita de quem de direito, em casa alheia ou em suas dependências:\nE) § 4º - A expressão \"casa\" compreende:I - qualquer compartimento habitado [lugar desabitado não entra na definição penal de casa].", "annulled": false, "remark": null}, {"id": "Q12-B", "qn": 12, "tema": "Violação de domicílio", "type": "mc", "letter": "B", "stem": "Assinale a alternativa que contempla uma hipótese de violação de domicílio.", "assertion": "Clarabela. ao passear pelas ruas internas de um condomínio de casas, no qual entrou regularmente, percebe um canteiro de rosas no jardim de um dos imóveis. Como o jardim não é murado, delimitado por cercas ou possui qualquer outro obstáculo ao livre acesso de pessoas, Clarabela nele ingressa, de lá colhendo uma muda de flor para levar consigo.", "correct": false, "justification": "O gabarito oficial desta questão é a alternativa A. 12 - Assinale a alternativa que contempla uma hipótese de violação de domicílio.\nAlternativas\nA\nPafúncio e Marocas, casados, em virtude de um desentendimento, resolvem se separar, após o que, conforme acordado entre ambos, Pafúncio deixa o lar conjugal para morar em outra casa. Semanas depois, embora já proposta a ação de divórcio, Pafúncio retorna ao imóvel e ali se instala sem a ciência de Marocas, que naquele momento viajava com o novo namorado.\nB\nClarabela. ao passear pelas ruas internas de um condomínio de casas, no qual entrou regularmente, percebe um canteiro de rosas no jardim de um dos imóveis. Como o jardi ento de pena em virtude da relação conjugal entre autor e vítima.\nA questão requer conhecimento sobre o delito de lesão corporal, previsto no Artigo 129, do Código Penal. De acordo com o enunciado a questão trata do \"erro sobre a execução\", definido no Artigo 73, do Código Penal. O agente sabia quem queria lesionar, porém, há um erro no momento da execução e ele acaba atingindo outra pessoa.Sendo assim, transferimos as características da vítima virtual para vítima real e desprezamos as características da vítima real. Então não há de se falar em delito culposo.E uma vez que sabemos estar diante da lesão corporal dolosa, note que o baço removido não é ele próprio um membro, sentido ou função, mas sua remoção vai causar debilidade permanente de uma função (visto que o baço atua na filtragem do sangue e na imunidade corporal), de modo que a lesão corporal deverá ser considerada GRAVE. Não o aumento de pena em virtude da relação conjugal pois o agente tinha o dolo de acertar terceiro e não há a própria esposa.\nNeste sentido, a alternativa correta é aquela da letra C.\nGABARITO DO PROFESSOR: LETRA C.", "annulled": false, "remark": null}, {"id": "Q13-B", "qn": 13, "tema": "Lesão corporal", "type": "mc", "letter": "B", "stem": "Amílcar, durante uma briga, tenta chutar seu adversário, mas sem querer acerta a própria esposa, que buscava apartar a contenda. Atingida no ventre, a mulher sofre ruptura do baço e é submetida a uma cirurgia de emergência, na qual tem o órgão extraído de seu corpo, medida que garante sua sobrevivência. Considerando que Amílcar em momento algum agiu com animus necandi, o comportamento do autor caracteriza crime de lesão corporal:", "assertion": "gravíssima com aumento de pena em virtude da relação conjugal entre autor e vítima.", "correct": false, "justification": "O gabarito oficial desta questão é a alternativa C. 13 - Amílcar, durante uma briga, tenta chutar seu adversário, mas sem querer acerta a própria esposa, que buscava apartar a contenda rnativa correta é aquela da letra C.", "correct": false, "justification": "O gabarito oficial desta questão é a alternativa C. 13 - Amílcar, durante uma briga, tenta chutar seu adversário, mas sem querer acerta a própria esposa, que buscava apartar a contenda. Atingida no ventre, a mulher sofre ruptura do baço e é submetida a uma cirurgia de emergência, na qual tem o órgão extraído de seu corpo, medida que garante sua sobrevivência. Considerando que Amílcar em momento algum agiu com animus necandi, o comportamento do autor caracteriza crime de lesão corporal:\nAlternativas\nA\nculposa.\nB\ngravíssima com aumento de pena em virtude da relação conjugal entre autor e vítima.\nC\ngrave.\nD\ngravíssima.\nE\ngrave com aumento de pena em virtude da relação conjugal entre autor e vítima.\nA questão requer conhecimento sobre o delito de lesão corporal, previsto no Artigo 129, do Código Penal. De acordo com o enunciado a questão trata do \"erro sobre a execução\", definido no Artigo 73, do Código Penal. O agente sabia quem queria lesionar, porém, há um erro no momento da execução e ele acaba atingindo outra pessoa.Sendo assim, transferimos as características da vítima virtual para vítima real e desprezamos as características da vítima real. Então não há de se falar em delito culposo.E uma vez que sabemos estar diante da lesão corporal dolosa, note que o baço removido não é ele próprio um membro, sentido ou função, mas sua remoção vai causar debilidade permanente de uma função (visto que o baço atua na filtragem do sangue e na imunidade corporal), de modo que a lesão corporal deverá ser considerada GRAVE. Não o aumento de pena em virtude da relação conjugal pois o agente tinha o dolo de acertar terceiro e não há a própria esposa.\nNeste sentido, a alternativa correta é aquela da letra C.\nGABARITO DO PROFESSOR: LETRA C.", "annulled": false, "remark": null}, {"id": "Q14-A", "qn": 14, "tema": "Lesão corporal", "type": "mc", "letter": "A", "stem": "O crime de maus-tratos tem pena aumentada de 1/3 (art. 136, §3o do CP) se", "assertion": "praticado contra ascendente, descendente, irmão ou cônjuge.", "correct": false, "justification": "O gabarito oficial desta questão é a alternativa D. 14 – O crime de maus-tratos tem pena aumentada de 1/3 (art. 136, §3o do CP) se\nAlternativas\nA\npraticado contra ascendente, descendente, irmão ou cônjuge.\nB\nresulta em lesão corporal, ainda que leve.\nC\no agente prevalece-se de relações familiares ou domésticas.\nD\npraticado contra pessoa menor de 14 anos.\nE\npraticado por agente público.\nA questão requer conhecimento sobre as causas de aumento de pena do crime de maus tratos do Artigo 136, do Código Penal.\nA forma qualificada do crime de maus tratos é prevista quando previsível um resultado mais grave que acaba se realizando (crime preterdoloso), a norma estabelece sanções mais severas do que aquelas previstas para o crime praticado sob a modalidade simples. Ou seja, quando a exposição a perigo resultar em lesão corporal de natureza grave a pena  (Artigo 136, parágrafo primeiro, do Código Penal) ou se resulta em morte (Artigo 136, parágrafo segundo, do Código Penal), teremos a forma qualificado do crime. Neste sentido, a opção B está incorreta porque ela fala de lesão corporal de natureza leve, o que não se enquadra nem no tipo qualificado, visto que o tipo penal fala em lesão corporal grave.\nA opção A e a opção C falam na verdade de circunstâncias agravantes da pena, aquelas previstas no Artigo 61,II, alíneas \"e\" e \"f\" do Código Penal. A única causa de aumento de pena para o crime de maus tratos se encontra no parágrafo terceiro, do Artigo 136, do Código Penal, que diz que \"aumenta-se a pena de um terço, se o crime é praticado contra pessoa menor de 14 (catorze) anos\". Neste sentido, a única opção correta é a letra D.\nGABARITO DO PROFESSOR: LETRA D.", "annulled": false, "remark": null}, {"id": "Q14-B", "qn": 14, "tema": "Lesão corporal", "type": "mc", "letter": "B", "stem": "O crime de maus-t maus-tratos tem pena aumentada de 1/3 (art. 136, §3o do CP) se", "assertion": "praticado por agente público. A questão requer conhecimento sobre as causas de aumento de pena do crime de maus tratos do Artigo 136, do Código Penal. A forma qualificada do crime de maus tratos é prevista quando previsível um resultado mais grave que acaba se realizando (crime preterdoloso), a norma estabelece sanções mais severas do que aquelas previstas para o crime praticado sob a modalidade simples. Ou seja, quando a exposição a perigo resultar em lesão corporal de natureza grave a pena  (Artigo 136, parágrafo primeiro, do Código Penal) ou se resulta em morte (Artigo 136, parágrafo segundo, do Código Penal), teremos a forma qualificado do crime. Neste sentido, a opção B está incorreta porque ela fala de lesão corporal de natureza leve, o que não se enquadra nem no tipo qualificado, visto que o tipo penal fala em lesão corporal grave. A opção A e a opção C falam na verdade de circunstâncias agravantes da pena, aquelas previstas no Artigo 61,II, alíneas \"e\" e \"f\" do Código Penal. A única causa de aumento de pena para o crime de maus tratos se encontra no parágrafo terceiro, do Artigo 136, do Código Penal, que diz que \"aumenta-se a pena de um terço, se o crime é praticado contra pessoa menor de 14 (catorze) anos\". Neste sentido, a única opção correta é a letra D.", "correct": false, "justification": "O gabarito oficial desta questão é a alternativa D. 14 – O crime de maus-tratos tem pena aumentada de 1/3 (art. 136, §3o do CP) se\nAlternativas\nA\npraticado contra ascendente, descendente, irmão ou cônjuge.\nB\nresulta em lesão corporal, ainda que leve.\nC\no agente prevalece-se de relações familiares ou domésticas.\nD\npraticado contra pessoa menor de 14 anos.\nE\npraticado por agente público.\nA questão requer conhecimento sobre as causas de aumento de pena do crime de maus tratos do Artigo 136, do Código Penal.\nA forma qualificada do crime de maus tratos é prevista quando previsível um resultado mais grave que acaba se realizando (crime preterdoloso), a norma estabelece sanções mais severas do que aquelas previstas para o crime praticado sob a modalidade simples. Ou seja, quando a exposição a perigo resultar em lesão corporal de natureza grave a pena  (Artigo 136, parágrafo primeiro, do Código Penal) ou se resulta em morte (Artigo 136, parágrafo segundo, do Código Penal), teremos a forma qualificado do crime. Neste sentido, a opção B está incorreta porque ela fala de lesão corporal de natureza leve, o que não se enquadra nem no tipo qualificado, visto que o tipo penal fala em lesão corporal grave.\nA opção A e a opção C falam na verdade de circunstâncias agravantes da pena, aquelas previstas no Artigo 61,II, alíneas \"e\" e \"f\" do Código Penal. A única causa de aumento de pena para o crime de maus tratos se encontra no parágrafo terceiro, do Artigo 136, do Código Penal, que diz que \"aumenta-se a pena de um terço, se o crime é praticado contra pessoa menor de 14 (catorze) anos\". Neste sentido, a única opção correta é a letra D.\nGABARITO DO PROFESSOR: LETRA D.", "annulled": false, "remark": null}, {"id": "Q15-A", "qn": 15, "tema": "Homicídio", "type": "mc", "letter": "A", "stem": "De acordo com o Código Penal assinale a alternativa correta.", "assertion": "A pena para quem pratica homicídio qualificado será aplicada de 12 (doze) a 20 (vinte) anos de reclusão.", "correct": false, "justification": "O gabarito oficial desta questão é a alternativa C. 15 – (ERREI – MARQUEI A LETRA D. MAS GABARITO É LETRA C) De acordo com o Código Penal assinale a alternativa correta.\nAlternativas\nA\nA pena para quem pratica homicídio qualificado será aplicada de 12 (doze) a 20 (vinte) anos de reclusão.\nB\nSe o agente comete o crime de homicídio impelido por motivo de relevante valor social ou moral, ou sob o domínio de violenta emoção, logo em seguida a injusta provocação da vítima, o juiz pode reduzir a pena de um terço até a metade.\nC\nA prescrição, depois da sentença condenatória com trânsito em julgado para a acusação ou depois de improvido seu recurso, regula-se pela pena aplicada, não podendo, em nenhuma hipótese, ter por termo inicial data anterior à da denúncia ou queixa.\nD\nA pena é aumentada de 1/6 (um sexto) até a metade se o crime de homicídio for praticado por milícia privada, sob o pretexto de prestação de serviço de segurança, ou por grupo de extermínio.\nE\nA sentença que conceder perdão judicial será considerada para efeitos de reincidência.\nA questão versa sobre temas diversos, determinando seja identificada a alternativa correta.\nA) Incorreta. As hipóteses de homicídio qualificado estão elencadas no artigo 121, § 2º, do Código Penal, para as quais está cominada pena de reclusão, de 12 a 30 anos.\nB) Incorreta. Se o crime de homicídio for praticado por motivo de relevante valor social ou moral, ou estando o agente sob o domínio de violenta emoção, logo em seguida a injusta provocação da vítima, configura a hipótese denominada na doutrina e na jurisprudência como “homicídio privilegiado\", para a qual a lei estabelece a redução da pena de um sexto a um terço, nos termos do § 1º do artigo 121 do Código Penal.\nC) Correta. É exatamente o que estabelece o § 1º do artigo 110 do Código Penal, tratando-se da chamada prescrição da pretensão punitiva pela pena em concreto na modalidade retroativa.\nD) Incorreta. Conforme estabelece o § 6º do artigo 121 do Código Penal, a pena é aumentada de 1/3 (um terço) até a metade se o crime for praticado por milícia privada, sob o pretexto de prestação de serviço de segurança, ou por grupo de extermínio.\nE) Incorreta. Ao contrário do afirmado, conforme estabelece o artigo 120 do Código Penal, “a sentença que conceder perdão judicial não será considerada para efeitos de reincidência\".\nGabarito do Professor: Letra C", "annulled": false, "remark": "ERREI – MARQUEI A LETRA D. MAS GABARITO É LETRA C"}, {"id": "Q15-B", "qn": 15, "tema": "Homicídio", "type": "mc", "letter": "B", "stem": "De acordo com o Código Penal assinale a alternativa correta.", "assertion": "Se o agente comete o crime de homicídio impelido por motivo de relevante valor social ou moral, ou sob o domínio de violenta emoção, logo em seguida a injusta provocação da vítima, o juiz pode reduzir a pena de um terço até a metade.", "correct": false, "justification": "O gabarito oficial desta questão é a alternativa C. 15 – (ERREI – MARQUEI A LETRA D. MAS GABARITO É LETRA C) De acordo com o Código Penal assinale a alternativa correta.\nAlternativas\nA\nA pena para quem pratica homicídio qualificado será aplicada de 12 (doze) a 20 (vinte) anos de reclusão.\nB\nSe o agente comete o crime de homicídio impelido por motivo de relevante valor social ou moral, ou sob o domínio de violenta emoção, logo em seguida a injusta provocação da vítima, o juiz pode reduzir a pena de um terço até a metade.\nC\nA prescrição, depois da sentença condenatória com trânsito em julgado para a acusação ou depois de improvido seu recurso, regula-se pela pena aplicada, não podendo, em nenhuma hipótese, ter por termo inicial data anterior à da denúncia ou queixa.\nD\nA pena é aumentada de 1/6 (um sexto) até a metade se o crime de homicídio for praticado por milícia privada, sob o pretexto de prestação de serviço de segurança, ou por grupo de extermínio.\nE\nA sentença que conceder perdão judicial será considerada para efeitos de reincidência.\nA questão versa sobre temas diversos, determinando seja identificada a alternativa correta.\nA) Incorreta. As hipóteses de homicídio qualificado estão elencadas no artigo 121, § 2º, do Código Penal, para as quais está cominada pena de reclusão, de 12 a 30 anos.\nB) Incorreta. Se o crime de homicídio for praticado por motivo de relevante valor social ou moral, ou estando o agente sob o domínio de violenta emoção, logo em seguida a injusta provocação da vítima, configura a hipótese denominada na doutrina e na jurisprudência como “homicídio privilegiado\", para a qual a lei estabelece a redução da pena de um sexto a um terço, nos termos do § 1º do artigo 121 do Código Penal.\nC) Correta. É exatamente o que estabelece o § 1º do artigo 110 do Código Penal, tratando-se da chamada prescrição da pretensão punitiva pela pena em concreto na modalidade retroativa.\nD) Incorreta. Conforme estabelece o § 6º do artigo 121 do Código Penal, a pena é aumentada de 1/3 (um terço) até a metade se o crime for praticado por milícia privada, sob o pretexto de prestação de serviço de segurança, ou por grupo de extermínio.\nE) Incorreta. Ao contrário do afirmado, conforme estabelece o artigo 120 do Código Penal, “a sentença que conceder perdão judicial não será considerada para efeitos de reincidência\".\nGabarito do Professor: Letra C", "annulled": false, "remark": "ERREI – MARQUEI A LETRA D. MAS GABARITO É LETRA C"}, {"id": "Q15-C", "qn": 15, "tema": "Homicídio", "type": "mc", "letter": "C", "stem": "De acordo com o Código Penal assinale a alternativa correta.", "assertion": "A prescrição, depois da sentença condenatória com trânsito em julgado para a acusação ou depois de improvido seu recurso, regula-se pela pena aplicada, não podendo, em nenhuma hipótese, ter por termo inicial data anterior à da denúncia ou queixa.", "correct": true, "justification": "O gabarito oficial desta questão é a alternativa C. 15 – (ERREI – MARQUEI A LETRA D. MAS GABARITO É LETRA C) De acordo com o Código Penal assinale a alternativa correta.\nAlternativas\nA\nA pena para quem pratica homicídio qualificado será aplicada de 12 (doze) a 20 (vinte) anos de reclusão.\nB\nSe o agente comete o crime de homicídio impelido por motivo de relevante valor social ou moral, ou sob o domínio de violenta emoção, logo em seguida a injusta provocação da vítima, o juiz pode reduzir a pena de um terço até a metade.\nC\nA prescrição, depois da sentença condenatória com trânsito em julgado para a acusação ou depois de improvido seu recurso, regula-se pela pena aplicada, não podendo
